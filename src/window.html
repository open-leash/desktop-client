      function overviewAgentInventory() {
        const detected = new Map((state.localProtections || []).map((agent) => [agent.kind, agent]));
        const skillCounts = new Map();
        for (const skill of state.skills || []) {
          const kind = skill.agent_kind || agentKindForName(skill.agent_name);
          if (!kind) continue;
          skillCounts.set(kind, (skillCounts.get(kind) || 0) + 1);
        }
        const catalog = [
          { kind: "claude-code", displayName: "Claude Code", icon: "claude" },
          { kind: "codex", displayName: "OpenAI Codex", icon: "openai" },
          { kind: "gemini", displayName: "Google Gemini CLI", icon: "gemini" },
          { kind: "cursor", displayName: "Cursor", icon: "cursor" },
          { kind: "windsurf", displayName: "Windsurf", icon: "windsurf" },
          { kind: "cline", displayName: "Cline", icon: "cline" },
          { kind: "opencode", displayName: "opencode", icon: "opencode" }
        ];
        const merged = catalog.map((definition) => {
          const detectedAgent = detected.get(definition.kind);
          const installed = Boolean(detectedAgent?.installed);
          const protectedAgent = Boolean(detectedAgent?.protected);
          return {
            ...definition,
            ...(detectedAgent || {}),
            installed,
            protected: protectedAgent,
            detail: installed
              ? protectedAgent ? "Protected on this Mac" : (detectedAgent?.detail || "Installed")
              : "Not installed",
            skillCount: skillCounts.get(definition.kind) || 0
          };
        });
        return merged.sort((a, b) =>
          Number(b.installed) - Number(a.installed) ||
          Number(b.protected) - Number(a.protected) ||
          b.skillCount - a.skillCount ||
          a.displayName.localeCompare(b.displayName)
        );
      }

      function agentKindForName(name) {
        const text = String(name || "").toLowerCase();
        if (text.includes("claude")) return "claude-code";
        if (text.includes("codex") || text.includes("openai")) return "codex";
        if (text.includes("gemini")) return "gemini";
        if (text.includes("cursor")) return "cursor";
        if (text.includes("windsurf")) return "windsurf";
        if (text.includes("cline")) return "cline";
        if (text.includes("opencode")) return "opencode";
        return "";
      }

      function agentHighlights() {
        const agentsByKind = new Map((state.localProtections || []).map((agent) => [agent.kind, agent]));
        const groups = new Map();
        for (const item of state.history || []) {
          const highlight = classifyHighlight(item);
          if (!highlight) continue;
          const key = item.agent_kind || item.agent_name || "unknown";
          const group = groups.get(key) || {
            agent: agentsByKind.get(item.agent_kind) || {
              kind: item.agent_kind,
              displayName: item.agent_name,
              icon: iconNameForAgent(item.agent_name)
            },
            project: projectTag(item.project_path),
            actions: []
          };
          if (group.actions.length < 5) {
            group.actions.push({
              ...highlight,
              date: formatTime(item.created_at)
            });
          }
          groups.set(key, group);
        }
        return [...groups.values()].slice(0, 8);
      }

      function currentAgentCards() {
        return (state.agents || []).slice(0, 8).map((agent) => {
          const pending = (state.pending || []).find((item) =>
            (item.agent_kind && item.agent_kind === agent.kind) ||
            (item.agent_name && item.agent_name === agent.display_name)
          );
          const source = pending || agent;
          const decision = pending ? "ask" : agent.resolution || agent.decision || "";
          const rule = firstPolicyName(source);
          const project = projectTag(source.project_path || agent.project_path) || "No project";
          const summary = pending
            ? pending.question || pending.summary || "Waiting for approval."
            : agent.short_summary || summarizeAgentNow(agent);
          const details = agentDetails(agent, source);
          return {
            kind: agent.kind,
            icon: iconNameForAgent(agent.display_name),
            displayName: agent.display_name || "AI agent",
            host: agent.hostname || "This computer",
            when: source.created_at ? formatTime(source.created_at) : source.activity_at ? formatTime(source.activity_at) : agent.activity_at ? formatTime(agent.activity_at) : "No recent activity",
            status: statusLabel(decision),
            statusClass: decision === "ask" ? "" : decision === "deny" || decision === "denied" ? "bad" : "good",
            summary: truncate(cleanAgentSummary(summary, decision), 160),
            project,
            action: friendlyAction(source.event_name || agent.event_name, source.tool_name || agent.tool_name),
            rule,
            details
          };
        });
      }

      function summarizeAgentNow(agent) {
        const action = friendlyAction(agent.event_name, agent.tool_name);
        const project = projectTag(agent.project_path);
        if (agent.decision_summary) return agent.decision_summary;
        if (agent.event_name || agent.tool_name) return `${agent.display_name || "Agent"} is ${action.toLowerCase()}${project ? ` in ${project}` : ""}.`;
        return `${agent.display_name || "Agent"} is connected and waiting.`;
      }

      function agentDetails(agent, source) {
        const quote = highlightQuote(source);
        const details = [];
        if (quote && quote !== "Action captured by OpenLeash") {
          details.push({ label: source.event_name === "UserPromptSubmit" ? "Prompt" : "Details", value: truncate(quote, 150) });
        }
        const latest = Array.isArray(agent.recent_activity)
          ? agent.recent_activity.find((item) => item.summary && item.summary !== source.summary)
          : undefined;
        if (latest?.summary) {
          details.push({ label: "Previous", value: truncate(`${friendlyAction(latest.event_name, latest.tool_name)} · ${cleanAgentSummary(latest.summary, latest.decision || "")}`, 140) });
        }
        return details.slice(0, 2);
      }

      function cleanAgentSummary(summary, decision = "") {
        const value = String(summary || "").trim()
          .replace(/^(Allowed|Denied|Blocked|Waiting|Needs approval|Active)\s*·\s*/i, "")
          .replace(/^Claude Code is /i, "")
          .replace(/^Agent is /i, "");
        if ((decision === "deny" || decision === "denied") && /^denied\b/i.test(value)) {
          return value.replace(/^denied\s*[·:-]?\s*/i, "");
        }
        if ((decision === "allow" || decision === "allowed") && /^allowed\b/i.test(value)) {
          return value.replace(/^allowed\s*[·:-]?\s*/i, "");
        }
        return value || "Action captured by OpenLeash.";
      }

      function firstPolicyName(item) {
        return (item.triggered_policies || []).map((policy) => policy.policy_name).find(Boolean) || "";
      }

      function statusLabel(value) {
        if (value === "ask") return "Waiting";
        if (value === "deny" || value === "denied") return "Denied";
        if (value === "allow" || value === "allowed") return "Allowed";
        return "Active";
      }

      function friendlyAction(eventName, toolName) {
        if (toolName) return `Using ${toolName}`;
        if (eventName === "UserPromptSubmit") return "Reading prompt";
        if (eventName === "PreToolUse") return "Preparing tool";
        if (eventName === "PostToolUse") return "Reviewing result";
        if (eventName === "Stop") return "Finishing session";
        return eventName || "Connected";
      }

      function classifyHighlight(item) {
        if (item.decision === "allow" && (!item.triggered_policies || item.triggered_policies.length === 0)) return null;
        const text = eventText(item).toLowerCase();
        const filePath = filePathForEvent(item);
        const quote = filePath ? compactPath(filePath) : highlightQuote(item);
        const policyLabel = labelFromPolicy(item);
        if (policyLabel) return { label: policyLabel, quote, filePath };
        const checks = [
          ["Git repo creation", /\bgit\s+init\b|gh repo create|create (a )?(new )?git repo|create (a )?(new )?repository|initialize (a )?(new )?(git )?repo/],
          ["Credential file read", /\bread\b.*\.env|\bcat\b.*\.env|\bopen\b.*\.env|\bshow\b.*\.env|\bprint\b.*\.env|find .*\.env|search .*\.env|\.env.*read|\.env.*search|\.env.*find/],
          ["Credential file change", /\bwrite\b.*\.env|\bcreate\b.*\.env|\btouch\b.*\.env|\bedit\b.*\.env|\.env.*write|\.env.*create|\.env.*edit/],
          ["Secrets exposure", /private key|api[_ -]?key|secret|token|password|kubeconfig|\.npmrc|id_rsa|id_ed25519|credentials/],
          ["External sharing", /curl|wget|upload|pastebin|gist|send .*code|post .*secret|external domain|webhook/],
          ["New MCP config", /mcp|model context protocol|mcp\.json|\.cursor\/mcp|claude_desktop_config/],
          ["New VS Code settings", /settings\.json|keybindings\.json|extensions\.json|\.vscode/],
          ["New cron jobs / launch agents", /crontab|cron job|launchagent|launchdaemon|plist|launchctl/],
          ["New background processes", /nohup|pm2|systemctl|brew services|background process|daemon|&\s*$|disown/],
          ["Shell profile changed", /\.zshrc|\.bashrc|\.bash_profile|\.profile|shell profile|path export/],
          ["Git config changed", /git config|\.gitconfig|insteadOf|credential.helper|core\.hooksPath/],
          ["Packages installed", /npm install|pnpm add|yarn add|pip install|brew install|cargo install|gem install/],
          ["Files created", /\btouch\b|new file|file created|create file|\bwrite\b.*\.(ts|tsx|js|jsx|py|go|rs|java|rb|php|html|css|md|json|yaml|yml)\b/],
          ["Files modified", /\bedit\b|\bmultiedit\b|\bmodify\b|\bpatch\b|file modified|changed file/]
        ];
        const match = checks.find(([, pattern]) => pattern.test(text));
        if (!match) return null;
        return { label: match[0], quote, filePath };
      }

      function labelFromPolicy(item) {
        const policyNames = (item.triggered_policies || []).map((policy) => String(policy.policy_name || "").toLowerCase()).join("\n");
        const text = `${policyNames}\n${eventText(item).toLowerCase()}`;
        if (!policyNames && !text.trim()) return null;
        const filePath = filePathForEvent(item).toLowerCase();
        const secretPath = /(^|\/)(\.env|\.npmrc|id_rsa|id_ed25519|credentials|kubeconfig)(\.|$|\/)/.test(filePath);
        if (/credential|secret|\.env|token|private key|kubeconfig|\.npmrc|id_rsa|id_ed25519/.test(text)) {
          if (/\b(read|cat|open|show|print|search|find|grep|scan|dump|copy)\b/.test(text)) return "Credential file read";
          if (/\b(write|create|edit|touch|generate|save)\b/.test(text)) return "Credential file change";
          return "Credential access";
        }
        if (secretPath) return "Credential file touched";
        if (/git repo|repository|git init/.test(text)) return "Git repo creation";
        if (/destructive|rm -rf|delete|terraform destroy|git reset/.test(text)) return "Destructive command";
        if (/personal data|pii|ssn|passport|credit card|customer/.test(text)) return "Personal data use";
        if (/external|exfiltrat|upload|webhook|pastebin|gist/.test(text)) return "External sharing";
        if (/package|npm install|pip install|brew install/.test(text)) return "Package installation";
        return null;
      }

      function eventText(item) {
        return [
          item.summary,
          item.question,
          item.event_name,
          item.tool_name,
          item.project_path,
          JSON.stringify(item.payload || {}),
          ...(item.triggered_policies || []).flatMap((policy) => [policy.policy_name, policy.explanation, ...(Array.isArray(policy.evidence) ? policy.evidence : [policy.evidence])])
        ].filter(Boolean).join("\n");
      }

      function highlightQuote(item) {
        const evidence = (item.triggered_policies || []).flatMap((policy) => Array.isArray(policy.evidence) ? policy.evidence : [policy.evidence]).find(Boolean);
        const payload = item.payload || {};
        const toolInput = payload.tool?.input;
        const command = typeof toolInput === "object" && toolInput ? (toolInput.command || toolInput.file_path || toolInput.path || toolInput.url) : toolInput;
        return truncate(String(evidence || command || payload.prompt || item.summary || "Action captured by OpenLeash"), 140);
      }

      function filePathForEvent(item) {
        if (item.file_path) return String(item.file_path);
        const payload = item.payload || {};
        const toolInput = payload.tool?.input;
        if (toolInput && typeof toolInput === "object") {
          const direct = toolInput.file_path || toolInput.path || toolInput.filename || toolInput.filepath;
          if (direct) return normalizePathForDisplay(String(direct), item.project_path);
        }
        if (typeof toolInput === "string") {
          const fromTool = pathFromText(toolInput);
          if (fromTool) return normalizePathForDisplay(fromTool, item.project_path);
        }
        const evidence = (item.triggered_policies || [])
          .flatMap((policy) => Array.isArray(policy.evidence) ? policy.evidence : [policy.evidence])
          .find(Boolean);
        const fromEvidence = pathFromText(String(evidence || ""));
        if (fromEvidence) return normalizePathForDisplay(fromEvidence, item.project_path);
        const fromPayload = pathFromText(JSON.stringify(payload || {}));
        return fromPayload ? normalizePathForDisplay(fromPayload, item.project_path) : "";
      }

      function pathFromText(text) {
        if (!text) return "";
        const jsonPath = text.match(/"file_path"\s*:\s*"([^"]+)"/i)?.[1] ||
          text.match(/"path"\s*:\s*"([^"]+)"/i)?.[1];
        if (jsonPath) return jsonPath;
        const absolute = text.match(/(?:^|[\s"'`])((?:~|\/Users\/|\/private\/|\/tmp\/|\/var\/|\/etc\/|\/opt\/)[^\s"'`,;)]{2,})/i)?.[1];
        if (absolute) return absolute;
        const relative = text.match(/(?:^|[\s"'`])((?:\.{1,2}\/)?[A-Za-z0-9_.-]*\.env(?:\.[A-Za-z0-9_.-]+)?|(?:\.{1,2}\/)?[A-Za-z0-9_./-]+\/(?:\.env|\.npmrc|id_rsa|id_ed25519|credentials|kubeconfig))(?:$|[\s"'`,;)])/i)?.[1];
        if (relative) return relative;
        return /\.env(?:\b|["'\\/\s])/.test(text) ? ".env" : "";
      }

      function normalizePathForDisplay(filePath, projectPath) {
        const value = String(filePath || "").trim().replace(/^['"`]+|['"`]+$/g, "");
        if (!value) return "";
        if (value === ".env" && projectPath) return `${String(projectPath).replace(/\/+$/, "")}/.env`;
        if ((value.startsWith("./") || value.startsWith("../")) && projectPath) return `${String(projectPath).replace(/\/+$/, "")}/${value}`;
        if (!value.startsWith("/") && !value.startsWith("~") && !value.includes("://") && projectPath && value.includes("/")) {
          return `${String(projectPath).replace(/\/+$/, "")}/${value}`;
        }
        return value.replace(/^file:\/\//, "");
      }

      function compactPath(filePath) {
        return String(filePath || "").replace(/^\/Users\/[^/]+/, "~");
      }

      function evidencePreview(item) {
        const text = prettyEvidence((item.triggered_policies || [])[0] || {}, item);
        return text ? `<div class="evidenceLine">${escapeHtml(truncate(text, 120))}</div>` : "";
      }

      function prettyEvidence(policy, item) {
        const evidence = Array.isArray(policy.evidence) ? policy.evidence.find(Boolean) : policy.evidence;
        const text = String(evidence || policy.explanation || "");
        const filePath = filePathForEvent(item);
        if (filePath && /"file_path"\s*:|"path"\s*:|\.env|kubeconfig|\.npmrc|id_rsa|id_ed25519|credentials/i.test(text)) {
          return filePath;
        }
        return text;
      }

      function fileLine(filePath) {
        const compact = compactPath(filePath);
        return `
          <span class="fileLine" title="${escapeHtml(filePath)}">
            <span class="fileTypeIcon">${fileIconForPath(filePath)}</span>
            <span class="fileName">${escapeHtml(compact)}</span>
          </span>
        `;
      }

      function fileIconForPath(filePath) {
        const value = String(filePath || "").toLowerCase();
        const name = value.split("/").pop() || "";
        if (name === ".env" || name.startsWith(".env.") || value.includes("secret") || value.includes("credential")) return "🔐";
        if (name === ".npmrc" || name.includes("token")) return "🔑";
        if (name.includes("kubeconfig") || name === "config") return "☸";
        if (name.endsWith(".json")) return "{}";
        if (name.endsWith(".yml") || name.endsWith(".yaml")) return "Y";
        if (name.endsWith(".py")) return "Py";
        if (name.endsWith(".ts") || name.endsWith(".tsx")) return "TS";
        if (name.endsWith(".js") || name.endsWith(".jsx")) return "JS";
        if (name.endsWith(".md")) return "Md";
        if (name.endsWith(".sh") || name.endsWith(".zsh") || name.endsWith(".bash")) return "$";
        if (name.includes("id_rsa") || name.includes("id_ed25519") || name.endsWith(".pem") || name.endsWith(".key")) return "🔑";
        return "📄";
      }

      function sharePayloadForEvent(item) {
        const rules = (item.triggered_policies || []).map((policy) => ({
          name: policy.policy_name,
          status: policy.status,
          severity: policy.severity,
          explanation: policy.explanation,
          evidence: Array.isArray(policy.evidence) ? policy.evidence : (policy.evidence ? [policy.evidence] : [])
        }));
        const transcript = (item.payload?.transcript || []).slice(-5).reverse().map((message) => ({
          role: message.role || "message",
          content: message.content || ""
        }));
        return {
          product: "OpenLeash",
          exported_at: new Date().toISOString(),
          event: {
            id: item.id,
            status: item.resolution || item.decision,
            summary: item.summary,
            agent: item.agent_name,
            agent_kind: item.agent_kind,
            project: projectTag(item.project_path) || "",
            project_path: item.project_path || "",
            file_path: filePathForEvent(item) || "",
            triggered_at: item.created_at,
            resolved_at: resolutionTime(item) || "",
            resolution_label: resolutionTime(item) ? resolutionLabel(item) : "",
            rules,
            conversation_context: transcript,
            raw_payload: item.payload || {}
          }
        };
      }

      function eventJson(item) {
        return JSON.stringify(sharePayloadForEvent(item), null, 2);
      }

      async function copyEventJson(item) {
        await window.openleash.copyText(eventJson(item));
      }

      async function shareEvent(item) {
        const data = sharePayloadForEvent(item);
        const text = eventJson(item);
        const title = `OpenLeash event - ${data.event.agent}`;
        if (navigator.share && (!navigator.canShare || navigator.canShare({ title, text }))) {
          try {
            await navigator.share({ title, text });
            return true;
          } catch (error) {
            if (error && error.name === "AbortError") return true;
          }
        }
        await copyEventJson(item);
        return false;
      }

      function showEventNotice(message) {
        const node = document.getElementById("eventActionNotice");
        if (!node) return;
        node.textContent = message;
        clearTimeout(showEventNotice.timer);
        showEventNotice.timer = setTimeout(() => {
          if (node) node.textContent = "";
        }, 2400);
      }

      function iconNameForAgent(name) {
        const text = String(name || "").toLowerCase();
        if (text.includes("claude")) return "claude";
        if (text.includes("codex") || text.includes("openai")) return "openai";
        if (text.includes("gemini")) return "gemini";
        if (text.includes("cline")) return "cline";
        if (text.includes("opencode")) return "opencode";
        if (text.includes("cursor")) return "cursor";
        if (text.includes("windsurf")) return "windsurf";
        return "";
      }

      function renderRules() {
        root.innerHTML = `
          <div class="head">
            <div><h1>Rules</h1><p>Choose which local safety rules OpenLeash enforces.</p></div>
          </div>
          <div class="grid">${importRulesPanel({ setup: false })}</div>
          <div class="grid ruleGroups">${ruleCards(state.rules, { grouped: true, managed: state.clientMode !== "personal" })}</div>
          <div class="actions"><button class="primary" id="save">Save rules</button></div>
        `;
        bindRuleImport({ setup: false });
        document.getElementById("save").onclick = async () => {
          const rules = (state.rules || []).map((rule) => {
            const input = root.querySelector(`[data-rule="${cssEscape(rule.id)}"]`);
            return { id: rule.id, enabled: rule.locked ? true : Boolean(input?.checked) };
          });
          await window.openleash.savePolicies(rules);
        };
      }

      function importRulesPanel({ setup }) {
        return `
          <div class="card importCard">
            <div class="row">
              <span>
                <strong>Import rules</strong>
                <small>${setup ? "Bring in a prepared rule set before finishing setup." : "Merge a prepared rule set into your local rules."}</small>
              </span>
              <label class="row" style="justify-content:flex-start;gap:10px">
                <input id="replaceRules" type="checkbox">
                <small>Replace existing rules</small>
              </label>
            </div>
            <div>
              <div class="actions left"><button class="secondary" id="importRules">Import rules</button></div>
              <div id="importRulesMessage" class="notice">${escapeHtml(importRulesMessage)}</div>
            </div>
          </div>
        `;
      }

      function bindRuleImport({ setup }) {
        const button = document.getElementById("importRules");
        if (!button) return;
        button.onclick = async () => {
          const replace = Boolean(document.getElementById("replaceRules")?.checked);
          const result = await window.openleash.importRules({ replace, save: !setup, currentRules: state.rules });
          const message = document.getElementById("importRulesMessage");
          if (!result || result.canceled) return;
          if (result.ok === false) {
            importRulesMessage = result.error || "Could not import that rules file.";
            if (message) message.textContent = importRulesMessage;
            return;
          }
          importedRules = result.policies || state.rules;
          state.rules = importedRules;
          selectedRules = new Map((state.rules || []).map((rule) => [rule.id, Boolean(rule.enabled)]));
          importRulesMessage = `Imported ${state.rules.length} rule${state.rules.length === 1 ? "" : "s"}.`;
          if (message) message.textContent = importRulesMessage;
          setup ? renderSetup() : renderRules();
        };
      }

      function renderAgentSessionDetail() {

        root.innerHTML = `
          <div class="head">
            <div><h1>${escapeHtml(session.title || "Agent session")}</h1><p>${escapeHtml(session.summary || "Session captured by OpenLeash.")}</p></div>
            <button class="secondary" id="backAgents">Back</button>
          </div>
          <div class="sessionHero card">
            <div class="projectLine"><span>Project</span><strong>${escapeHtml(projectTag(session.project_path) || "No project")}</strong></div>
            <div class="agentMeta">
              <span class="tag">${escapeHtml(formatTime(session.started_at))}</span>
              <span class="tag">${escapeHtml(formatDuration(session.duration_seconds))}</span>
              <span class="tag">${escapeHtml(formatDuration(session.subagent_seconds))} subagents</span>
              <span class="tag">${escapeHtml(formatDuration(session.orchestrator_seconds))} orchestrator</span>
              <span class="tag">${escapeHtml(session.event_count || 0)} events</span>
              <span class="tag">${escapeHtml(session.approval_count || 0)} approvals</span>
              ${(session.mcp_servers || []).map((server) => `<span class="tag">MCP: ${escapeHtml(server)}</span>`).join("")}
            </div>
          </div>
          <div class="history">
            ${events.map((item) => `
              <article data-session-event="${escapeHtml(item.id || "")}">
                <div class="eventBody">
                  <strong>${escapeHtml(item.summary || friendlyAction(item.event_name, item.tool_name))}</strong>
                  <small>${escapeHtml(friendlyAction(item.event_name, item.tool_name))} · ${escapeHtml(formatTime(item.created_at))}${item.mcp_server ? ` · MCP ${escapeHtml(item.mcp_server)}` : ""}</small>
                  ${item.prompt ? `<span class="quote">${escapeHtml(truncate(item.prompt, 180))}</span>` : evidencePreview(item)}
                </div>
                <span class="tag statusTag ${item.resolution === "deny" || item.decision === "deny" ? "bad" : "good"}">${escapeHtml(item.resolution || item.decision || "logged")}</span>
              </article>
            `).join("") || `<div class="empty">No events in this session.</div>`}
          </div>
        `;
        document.getElementById("backAgents").onclick = () => {
          view = "agents";
          renderView();
        };
        root.querySelectorAll("[data-session-event]").forEach((row) => {
          row.onclick = () => {
            const id = row.dataset.sessionEvent;
            if (!id || !(state.history || []).some((entry) => entry.id === id)) return;
            selectedEventId = id;
            view = "event";
            renderView();
          };
        });
      }

      function renderSettings() {
        root.innerHTML = `
          <div class="head">
            <div><h1>Settings</h1><p>Manage the model key OpenLeash uses for local rule checks.</p></div>
          </div>
          ${state.desktopMessage ? `<div class="desktopToast">${escapeHtml(state.desktopMessage)}</div>` : ""}
          <div class="grid">
            <div class="card">
              <div class="fieldRow">
                <strong>Provider</strong>
                <div class="segmented">
                  <label><input type="radio" name="settingsProvider" value="openai" ${state.apiProvider !== "anthropic" ? "checked" : ""}>OpenAI</label>
                  <label><input type="radio" name="settingsProvider" value="anthropic" ${state.apiProvider === "anthropic" ? "checked" : ""}>Claude</label>
                </div>
              </div>
              <div class="fieldRow" style="margin-top:14px">
                <strong>API key</strong>
                <input id="settingsApiKey" class="secret" type="password" placeholder="${state.apiKeySet ? "Saved key is set. Paste a new key to replace it." : "Paste your API key"}">
              </div>
              <p style="margin-top:12px">The key stays on this Mac and can be replaced any time.</p>
              <div id="settingsMessage" class="notice"></div>
            </div>
            <div class="card dangerZone">
              <div class="dangerGrid">
                <div>
                  <strong>Reset OpenLeash</strong>
                  <p>This restarts the desktop app after it finishes.</p>
                </div>
                <div class="dangerRow">
                  <div>
                    <strong>Delete data and settings</strong>
                    <p>Clear local history, approvals, recorded agent activity, setup, selected agents, rules, provider choice, and saved API key.</p>
                  </div>
                  <button class="secondary dangerButton" id="deleteDataAndSettings">Delete data and settings</button>
                </div>
              </div>
            </div>
          </div>
          <div class="actions"><button class="primary" id="saveSettings">Save settings</button></div>
        `;
        document.getElementById("saveSettings").onclick = async () => {
          const apiProvider = root.querySelector("[name=settingsProvider]:checked").value;
          const apiKey = document.getElementById("settingsApiKey").value.trim();
          const result = await window.openleash.saveSettings({ apiProvider, apiKey });
          if (result?.ok) {
            state.apiProvider = result.apiProvider;
            state.apiKeySet = result.apiKeySet;
            document.getElementById("settingsApiKey").value = "";
            document.getElementById("settingsMessage").textContent = "Settings saved.";
          }
        };
        document.getElementById("deleteDataAndSettings").onclick = async () => {
          const result = await window.openleash.deleteDataAndSettings();
          if (result?.restarting) document.getElementById("settingsMessage").textContent = "Deleting data and settings and restarting OpenLeash...";
        };
      }

      function agentCards({ selectable }) {
        const agents = state.localProtections || [];
        if (agents.length === 0) return `<div class="card empty">No supported local agents were detected yet.</div>`;
        return `
          <div class="cardList">
            ${agents.map((agent) => {
              const checked = isSetupLocked() ? selectedAgents?.has(agent.kind) : agent.protected;
              return `
              <label class="card agentLine">
                <span class="agentIcon">${agentIcon(agent)}</span>
                <span><strong>${escapeHtml(agent.displayName)}</strong></span>
                <span class="switch"><input data-agent="${agent.kind}" type="checkbox" ${checked ? "checked" : ""} ${agent.installed && agent.supportsInstall ? "" : "disabled"} ${selectable ? "" : "disabled"}><span></span></span>
              </label>
            `}).join("")}
          </div>
        `;
      }

      function bindAgentSelection() {
        root.querySelectorAll("[data-agent]").forEach((input) => {
          input.onchange = () => {
            if (!selectedAgents) selectedAgents = new Set();
            input.checked ? selectedAgents.add(input.dataset.agent) : selectedAgents.delete(input.dataset.agent);
          };
        });
      }

      function bindRuleSelection() {
        root.querySelectorAll("[data-rule]").forEach((input) => {
          input.onchange = () => {
            if (!selectedRules) selectedRules = new Map();
            selectedRules.set(input.dataset.rule, Boolean(input.checked));
          };
        });
      }

      function bindModelSelection() {
        root.querySelectorAll("[name=provider]").forEach((input) => {
          input.onchange = () => {
            setupProvider = input.value;
          };
        });
        const key = document.getElementById("apiKey");
        if (key) key.oninput = () => {
          setupApiKey = key.value;
        };
      }

      function setupRuleGroups(rules) {
        const list = rules || [];
        const defs = [
          {
            title: "Security rules",
            description: "Secrets, credentials, personal data, and sensitive staged content.",
            ids: ["credentials", "committing-secrets", "personal-data"]
          },
          {
            title: "Git rules",
            description: "Publishing, protected branches, force pushes, and history rewrites.",
            ids: ["git-publish", "protected-branch-push", "git-history-rewrite"]
          },
          {
            title: "Package rules",
            description: "Dependency changes, lockfiles, and global package installs.",
            ids: ["supply-chain-change", "global-package-install"]
          },
          {
            title: "Infrastructure rules",
            description: "Cloud resources, Kubernetes, Terraform, and local destruction.",
            ids: ["cloud-resource-deletion", "infra-destruction", "filesystem-destruction"]
          },
          {
            title: "Data rules",
            description: "Databases, broad mutations, and external data sharing.",
            ids: ["database-destruction", "database-mass-update", "exfiltration"]
          }
        ];
        const used = new Set();
        const groups = defs.map((def, index) => {
          const groupRules = def.ids.map((id) => list.find((rule) => rule.id === id)).filter(Boolean);
          groupRules.forEach((rule) => used.add(rule.id));
          return { ...def, first: index === 0, rules: groupRules };
        }).filter((group) => group.rules.length > 0);
        const other = list.filter((rule) => !used.has(rule.id));
        if (other.length > 0) {
          groups.push({
            title: "Custom rules",
            description: "Rules imported locally or added by your OpenLeash administrator.",
            ids: other.map((rule) => rule.id),
            first: groups.length === 0,
            rules: other
          });
        }
        return groups;
      }

      function ruleCards(rules, options = {}) {
        const managed = Boolean(options.managed);
        const grouped = Boolean(options.grouped);
        const groups = {};
        for (const rule of rules || []) (groups[grouped ? rule.category : ""] ||= []).push(rule);
        return Object.entries(groups).map(([category, items]) => `
          <div>
            ${category ? `<div class="category">${escapeHtml(category)}</div>` : ""}
            <div class="ruleGroup">
              ${items.map((rule) => `
                <label class="card row ruleLine ${rule.locked ? "lockedRule" : ""}">
                  <span>
                    <strong>${escapeHtml(rule.name)}${ruleBadge(rule, managed)}</strong>
                    <small>${escapeHtml(rule.description)}</small>
                  </span>
                  <span class="switch"><input data-rule="${rule.id}" type="checkbox" ${ruleEnabled(rule) ? "checked" : ""} ${rule.locked ? "disabled" : ""}><span></span></span>
                </label>
              `).join("")}
            </div>
          </div>
        `).join("");
      }

      function ruleBadge(rule, managedContext) {
        if (rule.locked) return `<span class="managedBadge">Mandatory</span>`;
        if (managedContext && (rule.managedByOrganization || rule.managed_by_organization || rule.managed)) {
          return `<span class="managedBadge soft">Managed</span>`;
        }
        return "";
      }

      function ruleEnabled(rule) {
        if (rule.locked) return true;
        if (isSetupLocked() && selectedRules) return selectedRules.get(rule.id) ?? Boolean(rule.enabled);
        return Boolean(rule.enabled);
      }

      function projectTag(value) {
        return value ? String(value).replace(/\\/g, "/").replace(/\/+$/, "").split("/").filter(Boolean).pop() : "";
      }

      function formatTime(value) {
        return value ? new Date(value).toLocaleString() : "";
      }

      function formatDuration(seconds) {
        const total = Math.max(0, Number(seconds || 0));
        if (total < 60) return total ? `${total}s` : "0s";
        const minutes = Math.floor(total / 60);
        if (minutes < 60) return `${minutes}m`;
        const hours = Math.floor(minutes / 60);
        const rest = minutes % 60;
        return rest ? `${hours}h ${rest}m` : `${hours}h`;
      }

      function sessionStat(label, metric) {
        const count = Number(metric?.session_count || 0);
        return `<div class="sessionStat"><strong>${escapeHtml(formatDuration(metric?.duration_seconds || 0))}</strong><small>${escapeHtml(label)} · ${count} session${count === 1 ? "" : "s"}</small></div>`;
      }

      function allAgentSessions() {
        return (state.agents || [])
          .flatMap((agent) => (agent.sessions || []).map((session) => ({ ...session, agent_name: agent.display_name, agent_kind: agent.kind, user_name: agent.user_name, hostname: agent.hostname })))
          .sort((a, b) => new Date(b.last_activity_at || 0).getTime() - new Date(a.last_activity_at || 0).getTime());
      }

      function usageByPerson(sessions) {
        const grouped = new Map();
        for (const session of sessions) {
          const key = session.user_name || session.hostname || "This Mac";
          const item = grouped.get(key) || { name: key, sessions: 0, duration_seconds: 0, subagent_seconds: 0, last_activity_at: "" };
          item.sessions += 1;
          item.duration_seconds += Number(session.duration_seconds || 0);
          item.subagent_seconds += Number(session.subagent_seconds || 0);
          if (!item.last_activity_at || new Date(session.last_activity_at || 0) > new Date(item.last_activity_at || 0)) item.last_activity_at = session.last_activity_at;
          grouped.set(key, item);
        }
        return [...grouped.values()].sort((a, b) => b.duration_seconds - a.duration_seconds);
      }

      function resolutionTime(item) {
        return item.resolved_at || (item.resolution === "allow" && item.decision === "allow" ? item.created_at : "");
      }

      function resolutionLabel(item) {
        const value = item.resolution || item.decision;
        if (value === "allow") return "Allowed at";
        if (value === "deny") return "Denied at";
        return "Resolved at";
      }

      function agentIcon(agent) {
        if (agent.icon) return `<img src="agent-icons/${escapeHtml(agent.icon)}.svg" alt="">`;
        return escapeHtml(String(agent.displayName || "AI").split(/\s+/).slice(0, 2).map((part) => part[0]).join("").toUpperCase());
      }

      function escapeHtml(value) {
        return String(value ?? "").replace(/[&<>"']/g, (char) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;" }[char]));
      }

      function truncate(value, max) {
        return value.length <= max ? value : `${value.slice(0, max - 1)}…`;
      }

      function cssEscape(value) {
        if (window.CSS?.escape) return window.CSS.escape(String(value));
        return String(value).replace(/["\\]/g, "\\$&");
      }

      function isPersonalEmail(email) {
        const domain = String(email || "").split("@")[1]?.toLowerCase() || "";
        return new Set([
          "gmail.com",
          "googlemail.com",
          "outlook.com",
          "hotmail.com",
          "live.com",
          "msn.com",
          "icloud.com",
          "me.com",
          "mac.com",
          "yahoo.com",
          "proton.me",
          "protonmail.com",
          "aol.com"
        ]).has(domain);
      }

      nav.forEach((button) => button.onclick = () => {
        if (isSetupLocked()) return renderSetup();
        view = button.dataset.view;
        renderView();
      });
      window.openleash.onUpdate(render);
      window.openleash.onAuth((payload) => {
        if (payload?.ok) {
          if (setupClientMode === "cloud" && setupAudience === "organization" && isPersonalEmail(payload.userEmail)) {
            setupRemoteAuth = undefined;
            setupRemoteError = "Use your company Google Workspace or Microsoft 365 account, not a personal email address.";
            setupRemoteNotice = "";
            setupRemoteBusy = false;
            renderSetup();
            return;
          }
          setupRemoteAuth = payload;
          setupRemoteError = "";
          setupRemoteNotice = "";
          setupRemoteBusy = false;
          setupStep = Math.max(setupStep, setupClientMode === "cloud" && setupAudience === "organization" ? 3 : 1);
          void loadManagedRules().then(() => renderSetup());
        } else {
          setupRemoteBusy = false;
          setupRemoteNotice = "";
          setupRemoteError = payload?.error || "Sign-in did not complete.";
        }
        renderSetup();
      });
      window.openleash.list().then(render);
    </script>
  </body>
</html>
