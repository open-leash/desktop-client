            selectedEventId = row.dataset.mcpCall;
            view = "event";
            renderView();
          };
        });
      }

      function renderSkills() {
        const skills = state.skills || [];
        root.innerHTML = `
          <div class="head">
            <div><h1>Skills</h1><p>Agent skills discovered in user and project skill folders.</p></div>
            ${modeTag()}
          </div>
          <div class="history">
            ${skills.map((skill) => `
              <article data-skill-path="${escapeHtml(skill.skill_path)}">
                <div class="eventBody">
                  <strong>${escapeHtml(skill.skill_name)}</strong>
                  <small>${escapeHtml(skill.purpose_summary || skill.agent_name)} · ${escapeHtml(skill.scope)}${skill.project_path ? ` · ${escapeHtml(projectTag(skill.project_path) || "No project")}` : ""} · ${formatTime(skill.content_updated_at || skill.updated_at)}</small>
                  <div class="filePathPill" title="${escapeHtml(skill.skill_path)}"><span>Path</span><code>${escapeHtml(compactPath(skill.skill_path))}</code></div>
                </div>
                <span class="tag ${skill.status === "suspicious" ? "bad" : "good"}">${escapeHtml(skill.status === "suspicious" ? "review" : "scanned")}</span>
              </article>
            `).join("") || `<div class="empty">No skills detected yet.</div>`}
          </div>
        `;
        root.querySelectorAll("[data-skill-path]").forEach((row) => {
          row.onclick = () => {
            selectedSkillPath = row.dataset.skillPath;
            view = "skill-detail";
            renderView();
          };
        });
      }

      function renderSkillDetailView() {
        rememberSkillDocScroll();
        const skills = state.skills || [];
        const selected = skills.find((skill) => skill.skill_path === selectedSkillPath) || skills[0];
        selectedSkillPath = selected?.skill_path || "";
        root.innerHTML = `
          <div class="head">
            <div>
              <button id="backSkills" class="secondary">Back</button>
              <h1>${escapeHtml(selected?.skill_name || "Skill")}</h1>
              <p>${escapeHtml(selected?.purpose_summary || "Skill content scanned by OpenLeash.")}</p>
            </div>
            ${selected ? `<span class="tag ${selected.status === "suspicious" ? "bad" : "good"}">${escapeHtml(selected.status === "suspicious" ? "review" : "scanned")}</span>` : modeTag()}
          </div>
          <div class="card skillDetailPanel">
            ${selected ? renderSkillDetail(selected) : `<p>Skill details appear here after OpenLeash detects local agent skills.</p>`}
          </div>
        `;
        restoreSkillDocScroll();
        document.getElementById("backSkills").onclick = () => {
          rememberSkillDocScroll();
          view = "skills";
          renderView();
        };
      }

      function rememberSkillDocScroll() {
        if (!selectedSkillPath) return;
        const doc = root.querySelector(".skillDoc");
        if (doc) skillDocScrollTops.set(selectedSkillPath, doc.scrollTop);
      }

      function restoreSkillDocScroll() {
        if (!selectedSkillPath) return;
        const doc = root.querySelector(".skillDoc");
        if (!doc) return;
        const top = skillDocScrollTops.get(selectedSkillPath) || 0;
        doc.scrollTop = top;
        requestAnimationFrame(() => {
          doc.scrollTop = top;
        });
        doc.onscroll = () => {
          skillDocScrollTops.set(selectedSkillPath, doc.scrollTop);
        };
      }

      function renderSkillDetail(skill) {
        const content = skill.content || skill.content_preview || "";
        return `
          <div class="skillDetailHeader">
            <div>
              <h2>${escapeHtml(skill.skill_name)}</h2>
              <p class="skillSummary">${escapeHtml(skill.purpose_summary || "Scanned skill")}</p>
            </div>
            <span class="tag ${skill.status === "suspicious" ? "bad" : "good"}">${escapeHtml(skill.status === "suspicious" ? "review" : "scanned")}</span>
          </div>
          <div class="skillDetailMeta">
            <div class="kv"><small>Agent</small><strong>${escapeHtml(skill.agent_name)}</strong></div>
            <div class="kv"><small>Last update</small><strong>${formatTime(skill.content_updated_at || skill.updated_at)}</strong></div>
            <div class="kv"><small>Scope</small><strong>${escapeHtml(skill.scope || "user")}</strong></div>
            <div class="kv"><small>Project</small><strong>${escapeHtml(projectTag(skill.project_path) || "User-level")}</strong></div>
          </div>
          <div class="filePathPill" title="${escapeHtml(skill.skill_path)}"><span>Path</span><code>${escapeHtml(skill.skill_path)}</code></div>
          <div class="skillDoc">
            ${content ? renderSkillMarkdown(content) : `<p>No skill content was synced yet.</p>`}
          </div>
        `;
      }

      function renderSkillMarkdown(content) {
        const lines = String(content || "").replace(/\r\n/g, "\n").split("\n");
        const parts = [];
        let paragraph = [];
        let list = [];
        let inCode = false;
        let code = [];

        const flushParagraph = () => {
          if (!paragraph.length) return;
          parts.push(`<p>${escapeHtml(paragraph.join(" "))}</p>`);
          paragraph = [];
        };
        const flushList = () => {
          if (!list.length) return;
          parts.push(`<ul>${list.map((item) => `<li>${escapeHtml(item)}</li>`).join("")}</ul>`);
          list = [];
        };
        const flushCode = () => {
          parts.push(`<pre><code>${escapeHtml(code.join("\n"))}</code></pre>`);
          code = [];
        };

        for (const line of lines) {
          if (line.trim().startsWith("```")) {
            if (inCode) {
              flushCode();
              inCode = false;
            } else {
              flushParagraph();
              flushList();
              inCode = true;
            }
            continue;
          }
          if (inCode) {
            code.push(line);
            continue;
          }
          const trimmed = line.trim();
          if (!trimmed) {
            flushParagraph();
            flushList();
            continue;
          }
          if (trimmed.startsWith("### ")) {
            flushParagraph();
            flushList();
            parts.push(`<h3>${escapeHtml(trimmed.slice(4))}</h3>`);
            continue;
          }
          if (trimmed.startsWith("## ")) {
            flushParagraph();
            flushList();
            parts.push(`<h2>${escapeHtml(trimmed.slice(3))}</h2>`);
            continue;
          }
          if (trimmed.startsWith("# ")) {
            flushParagraph();
            flushList();
            parts.push(`<h2>${escapeHtml(trimmed.slice(2))}</h2>`);
            continue;
          }
          const bullet = trimmed.match(/^[-*]\s+(.+)$/);
          if (bullet) {
            flushParagraph();
            list.push(bullet[1]);
            continue;
          }
          paragraph.push(trimmed);
        }
        if (inCode) flushCode();
        flushParagraph();
        flushList();
        return parts.join("") || `<p>No readable content.</p>`;
      }

      function overviewAgentInventory() {
        const detected = new Map((state.localProtections || []).map((agent) => [agent.kind, agent]));
        const catalog = [
          { kind: "claude-code", displayName: "Claude Code", icon: "claude.png" },
          { kind: "github-copilot", displayName: "GitHub Copilot", icon: "githubcopilot.svg" },
          { kind: "gemini", displayName: "Google Gemini CLI", icon: "googlegemini.svg" },
          { kind: "opencode", displayName: "OpenCode", icon: "opencode.png" },
          { kind: "codex", displayName: "OpenAI Codex", icon: "codex.png" },
          { kind: "cline", displayName: "Cline", icon: "cline.png" },
          { kind: "cursor", displayName: "Cursor", icon: "cursor.png" },
          { kind: "windsurf", displayName: "Windsurf", icon: "windsurf.svg" }
        ];
        const merged = catalog.map((definition) => {
          const detectedAgent = detected.get(definition.kind);
          const installed = Boolean(detectedAgent?.installed);
          const protectedAgent = Boolean(detectedAgent?.protected);
          return {
            ...definition,
            ...(detectedAgent || {}),
            installed,
            protected: protectedAgent,
            desiredMonitored: typeof detectedAgent?.desiredMonitored === "boolean" ? detectedAgent.desiredMonitored : protectedAgent,
            detail: installed
              ? protectedAgent ? "Active" : "Unmonitored"
              : "Not installed"
          };
        });
        return merged;
      }

      function agentKindForName(name) {
        const text = String(name || "").toLowerCase();
        if (text.includes("claude")) return "claude-code";
        if (text.includes("codex") || text.includes("openai")) return "codex";
        if (text.includes("gemini")) return "gemini";
        if (text.includes("cursor")) return "cursor";
        if (text.includes("windsurf")) return "windsurf";
        if (text.includes("cline")) return "cline";
        if (text.includes("opencode")) return "opencode";
        return "";
      }

      function agentHighlights() {
        const agentsByKind = new Map((state.localProtections || []).map((agent) => [agent.kind, agent]));
        const groups = new Map();
        for (const item of visibleHistoryItems()) {
          const highlight = classifyHighlight(item);
          if (!highlight) continue;
          const key = item.agent_kind || item.agent_name || "unknown";
          const group = groups.get(key) || {
            agent: agentsByKind.get(item.agent_kind) || {
              kind: item.agent_kind,
              displayName: item.agent_name,
              icon: iconNameForAgent(item.agent_name)
            },
            project: projectTag(item.project_path),
            actions: []
          };
          if (group.actions.length < 5) {
            group.actions.push({
              ...highlight,
              date: formatTime(item.created_at)
            });
          }
          groups.set(key, group);
        }
        return [...groups.values()].slice(0, 8);
      }

      function currentAgentCards() {
        return (state.agents || []).slice(0, 8).map((agent) => {
          const pending = (state.pending || []).find((item) =>
            (item.agent_kind && item.agent_kind === agent.kind) ||
            (item.agent_name && item.agent_name === agent.display_name)
          );
          const source = pending || agent;
          const decision = pending ? "ask" : agent.resolution || agent.decision || "";
          const rule = firstPolicyName(source);
          const project = projectTag(source.project_path || agent.project_path) || "No project";
          const summary = pending
            ? pending.question || pending.summary || "Waiting for approval."
            : agent.short_summary || summarizeAgentNow(agent);
          const details = agentDetails(agent, source);
          return {
            kind: agent.kind,
            icon: iconNameForAgent(agent.display_name),
            displayName: agent.display_name || "AI agent",
            host: agent.hostname || "This computer",
            when: source.created_at ? formatTime(source.created_at) : source.activity_at ? formatTime(source.activity_at) : agent.activity_at ? formatTime(agent.activity_at) : "No recent activity",
            status: statusLabel(decision),
            statusClass: decision === "ask" ? "" : decision === "deny" || decision === "denied" ? "bad" : "good",
            summary: truncate(cleanAgentSummary(summary, decision), 160),
            project,
            action: friendlyAction(source.event_name || agent.event_name, source.tool_name || agent.tool_name),
            rule,
            details
          };
        });
      }

      function summarizeAgentNow(agent) {
        const action = friendlyAction(agent.event_name, agent.tool_name);
        const project = projectTag(agent.project_path);
        if (agent.decision_summary) return agent.decision_summary;
        if (agent.event_name || agent.tool_name) return `${agent.display_name || "Agent"} is ${action.toLowerCase()}${project ? ` in ${project}` : ""}.`;
        return `${agent.display_name || "Agent"} is connected and waiting.`;
      }

      function agentDetails(agent, source) {
        const quote = highlightQuote(source);
        const details = [];
        if (quote && quote !== "Action captured by OpenLeash") {
          details.push({ label: source.event_name === "UserPromptSubmit" ? "Prompt" : "Details", value: truncate(quote, 150) });
        }
        const latest = Array.isArray(agent.recent_activity)
          ? agent.recent_activity.find((item) => item.summary && item.summary !== source.summary)
          : undefined;
        if (latest?.summary) {
          details.push({ label: "Previous", value: truncate(`${friendlyAction(latest.event_name, latest.tool_name)} · ${cleanAgentSummary(latest.summary, latest.decision || "")}`, 140) });
        }
        return details.slice(0, 2);
      }

      function cleanAgentSummary(summary, decision = "") {
        const value = String(summary || "").trim()
          .replace(/^(Allowed|Denied|Blocked|Waiting|Needs approval|Active)\s*·\s*/i, "")
          .replace(/^Using Write on\s+/i, "Editing ")
          .replace(/^Claude Code is /i, "")
          .replace(/^Agent is /i, "");
        if ((decision === "deny" || decision === "denied") && /^denied\b/i.test(value)) {
          return value.replace(/^denied\s*[·:-]?\s*/i, "");
        }
        if ((decision === "allow" || decision === "allowed") && /^allowed\b/i.test(value)) {
          return value.replace(/^allowed\s*[·:-]?\s*/i, "");
        }
        return value || "Action captured by OpenLeash.";
      }

      function visibleHistoryItems() {
        return (state.history || []).filter((item) => !isPassOnlyEvent(item));
      }

      function isPassOnlyEvent(item) {
        return item.decision === "allow"
          && (!item.resolution || item.resolution === "allow")
          && !item.tool_name
          && !(item.triggered_policies || []).length
          && /all active policies passed/i.test(item.summary || "");
      }

      function displayEventSummary(item) {
        const filePath = filePathForEvent(item);
        if (/^Write$/i.test(item.tool_name || "") && filePath) return `Editing ${filePath}`;
        return cleanAgentSummary(item.summary, item.resolution || item.decision);
      }

      function firstPolicyName(item) {
        return (item.triggered_policies || []).map((policy) => policy.policy_name).find(Boolean) || "";
      }

      function statusLabel(value) {
        if (value === "ask") return "Waiting";
        if (value === "deny" || value === "denied") return "Denied";
        if (value === "allow" || value === "allowed") return "Allowed";
        return "Active";
      }

      function friendlyAction(eventName, toolName) {
        if (/^Write$/i.test(toolName || "")) return "Editing";
        if (/^MultiEdit$/i.test(toolName || "")) return "Editing";
        if (toolName) return `Using ${toolName}`;
        if (eventName === "UserPromptSubmit") return "Reading prompt";
        if (eventName === "PreToolUse") return "Preparing tool";
        if (eventName === "PostToolUse") return "Reviewing result";
        if (eventName === "Stop") return "Finishing session";
        return eventName || "Connected";
      }

      function classifyHighlight(item) {
        if (item.decision === "allow" && (!item.triggered_policies || item.triggered_policies.length === 0)) return null;
        const text = eventText(item).toLowerCase();
        const filePath = filePathForEvent(item);
        const quote = filePath ? compactPath(filePath) : highlightQuote(item);
        const policyLabel = labelFromPolicy(item);
        if (policyLabel) return { label: policyLabel, quote, filePath };
        const checks = [
          ["Git repo creation", /\bgit\s+init\b|gh repo create|create (a )?(new )?git repo|create (a )?(new )?repository|initialize (a )?(new )?(git )?repo/],
          ["Credential file read", /\bread\b.*\.env|\bcat\b.*\.env|\bopen\b.*\.env|\bshow\b.*\.env|\bprint\b.*\.env|find .*\.env|search .*\.env|\.env.*read|\.env.*search|\.env.*find/],
          ["Credential file change", /\bwrite\b.*\.env|\bcreate\b.*\.env|\btouch\b.*\.env|\bedit\b.*\.env|\.env.*write|\.env.*create|\.env.*edit/],
          ["Secrets exposure", /private key|api[_ -]?key|secret|token|password|kubeconfig|\.npmrc|id_rsa|id_ed25519|credentials/],
          ["External sharing", /curl|wget|upload|pastebin|gist|send .*code|post .*secret|external domain|webhook/],
          ["New MCP config", /mcp|model context protocol|mcp\.json|\.cursor\/mcp|claude_desktop_config/],
          ["New VS Code settings", /settings\.json|keybindings\.json|extensions\.json|\.vscode/],
          ["New cron jobs / launch agents", /crontab|cron job|launchagent|launchdaemon|plist|launchctl/],
          ["New background processes", /nohup|pm2|systemctl|brew services|background process|daemon|&\s*$|disown/],
          ["Shell profile changed", /\.zshrc|\.bashrc|\.bash_profile|\.profile|shell profile|path export/],
          ["Git config changed", /git config|\.gitconfig|insteadOf|credential.helper|core\.hooksPath/],
          ["Packages installed", /npm install|pnpm add|yarn add|pip install|brew install|cargo install|gem install/],
          ["Files created", /\btouch\b|new file|file created|create file|\bwrite\b.*\.(ts|tsx|js|jsx|py|go|rs|java|rb|php|html|css|md|json|yaml|yml)\b/],
          ["Files modified", /\bedit\b|\bmultiedit\b|\bmodify\b|\bpatch\b|file modified|changed file/]
        ];
        const match = checks.find(([, pattern]) => pattern.test(text));
        if (!match) return null;
        return { label: match[0], quote, filePath };
      }

      function labelFromPolicy(item) {
        const policyNames = (item.triggered_policies || []).map((policy) => String(policy.policy_name || "").toLowerCase()).join("\n");
        const text = `${policyNames}\n${eventText(item).toLowerCase()}`;
        if (!policyNames && !text.trim()) return null;
        const filePath = filePathForEvent(item).toLowerCase();
        const secretPath = /(^|\/)(\.env|\.npmrc|id_rsa|id_ed25519|credentials|kubeconfig)(\.|$|\/)/.test(filePath);
        if (/credential|secret|\.env|token|private key|kubeconfig|\.npmrc|id_rsa|id_ed25519/.test(text)) {
          if (/\b(read|cat|open|show|print|search|find|grep|scan|dump|copy)\b/.test(text)) return "Credential file read";
          if (/\b(write|create|edit|touch|generate|save)\b/.test(text)) return "Credential file change";
          return "Credential access";
        }
        if (secretPath) return "Credential file touched";
        if (/git repo|repository|git init/.test(text)) return "Git repo creation";
        if (/destructive|rm -rf|delete|terraform destroy|git reset/.test(text)) return "Destructive command";
        if (/personal data|pii|ssn|passport|credit card|customer/.test(text)) return "Personal data use";
        if (/external|exfiltrat|upload|webhook|pastebin|gist/.test(text)) return "External sharing";
        if (/package|npm install|pip install|brew install/.test(text)) return "Package installation";
        return null;
      }

      function eventText(item) {
        return [
          item.summary,
          item.question,
          item.event_name,
          item.tool_name,
          item.project_path,
          JSON.stringify(item.payload || {}),
          ...(item.triggered_policies || []).flatMap((policy) => [policy.policy_name, policy.explanation, ...(Array.isArray(policy.evidence) ? policy.evidence : [policy.evidence])])
        ].filter(Boolean).join("\n");
      }

      function highlightQuote(item) {
        const evidence = (item.triggered_policies || []).flatMap((policy) => Array.isArray(policy.evidence) ? policy.evidence : [policy.evidence]).find(Boolean);
        const payload = item.payload || {};
        const toolInput = payload.tool?.input;
        const command = typeof toolInput === "object" && toolInput ? (toolInput.command || toolInput.file_path || toolInput.path || toolInput.url) : toolInput;
        return truncate(String(evidence || command || payload.prompt || item.summary || "Action captured by OpenLeash"), 140);
      }

      function filePathForEvent(item) {
        if (item.file_path) return String(item.file_path);
        const payload = item.payload || {};
        const toolInput = payload.tool?.input;
        if (toolInput && typeof toolInput === "object") {
          const direct = toolInput.file_path || toolInput.path || toolInput.filename || toolInput.filepath;
          if (direct) return normalizePathForDisplay(String(direct), item.project_path);
        }
        if (typeof toolInput === "string") {
          const fromTool = pathFromText(toolInput);
          if (fromTool) return normalizePathForDisplay(fromTool, item.project_path);
        }
        const evidence = (item.triggered_policies || [])
          .flatMap((policy) => Array.isArray(policy.evidence) ? policy.evidence : [policy.evidence])
          .find(Boolean);
        const fromEvidence = pathFromText(String(evidence || ""));
        if (fromEvidence) return normalizePathForDisplay(fromEvidence, item.project_path);
        const fromPayload = pathFromText(JSON.stringify(payload || {}));
        return fromPayload ? normalizePathForDisplay(fromPayload, item.project_path) : "";
      }

      function pathFromText(text) {
        if (!text) return "";
        const jsonPath = text.match(/"file_path"\s*:\s*"([^"]+)"/i)?.[1] ||
          text.match(/"path"\s*:\s*"([^"]+)"/i)?.[1];
        if (jsonPath) return jsonPath;
        const absolute = text.match(/(?:^|[\s"'`])((?:~|\/Users\/|\/private\/|\/tmp\/|\/var\/|\/etc\/|\/opt\/)[^\s"'`,;)]{2,})/i)?.[1];
        if (absolute) return absolute;
        const relative = text.match(/(?:^|[\s"'`])((?:\.{1,2}\/)?[A-Za-z0-9_.-]*\.env(?:\.[A-Za-z0-9_.-]+)?|(?:\.{1,2}\/)?[A-Za-z0-9_./-]+\/(?:\.env|\.npmrc|id_rsa|id_ed25519|credentials|kubeconfig))(?:$|[\s"'`,;)])/i)?.[1];
        if (relative) return relative;
        return /\.env(?:\b|["'\\/\s])/.test(text) ? ".env" : "";
      }

      function normalizePathForDisplay(filePath, projectPath) {
        const value = String(filePath || "").trim().replace(/^['"`]+|['"`]+$/g, "");
        if (!value) return "";
        if (value === ".env" && projectPath) return `${String(projectPath).replace(/\/+$/, "")}/.env`;
        if ((value.startsWith("./") || value.startsWith("../")) && projectPath) return `${String(projectPath).replace(/\/+$/, "")}/${value}`;
        if (!value.startsWith("/") && !value.startsWith("~") && !value.includes("://") && projectPath && value.includes("/")) {
          return `${String(projectPath).replace(/\/+$/, "")}/${value}`;
        }
        return value.replace(/^file:\/\//, "");
      }

      function compactPath(filePath) {
        return String(filePath || "").replace(/^\/Users\/[^/]+/, "~");
      }

      function evidencePreview(item) {
        const text = prettyEvidence((item.triggered_policies || [])[0] || {}, item);
        return text ? `<div class="evidenceLine">${escapeHtml(truncate(text, 120))}</div>` : "";
      }

      function prettyEvidence(policy, item) {
        const evidence = Array.isArray(policy.evidence) ? policy.evidence.find(Boolean) : policy.evidence;
        const text = String(evidence || policy.explanation || "");
        const filePath = filePathForEvent(item);
        if (filePath && /"file_path"\s*:|"path"\s*:|\.env|kubeconfig|\.npmrc|id_rsa|id_ed25519|credentials/i.test(text)) {
          return filePath;
        }
        return text;
      }

      function fileLine(filePath) {
        const compact = compactPath(filePath);
        return `
          <span class="fileLine" title="${escapeHtml(filePath)}">
            <span class="fileTypeIcon">${fileIconForPath(filePath)}</span>
            <span class="fileName">${escapeHtml(compact)}</span>
          </span>
        `;
      }

      function fileIconForPath(filePath) {
        const value = String(filePath || "").toLowerCase();
        const name = value.split("/").pop() || "";
        if (name === ".env" || name.startsWith(".env.") || value.includes("secret") || value.includes("credential")) return "🔐";
        if (name === ".npmrc" || name.includes("token")) return "🔑";
        if (name.includes("kubeconfig") || name === "config") return "☸";
        if (name.endsWith(".json")) return "{}";
        if (name.endsWith(".yml") || name.endsWith(".yaml")) return "Y";
        if (name.endsWith(".py")) return "Py";
        if (name.endsWith(".ts") || name.endsWith(".tsx")) return "TS";
        if (name.endsWith(".js") || name.endsWith(".jsx")) return "JS";
        if (name.endsWith(".md")) return "Md";
        if (name.endsWith(".sh") || name.endsWith(".zsh") || name.endsWith(".bash")) return "$";
        if (name.includes("id_rsa") || name.includes("id_ed25519") || name.endsWith(".pem") || name.endsWith(".key")) return "🔑";
        return "📄";
      }

      function sharePayloadForEvent(item) {
        const rules = (item.triggered_policies || []).map((policy) => ({
          name: policy.policy_name,
          status: policy.status,
          severity: policy.severity,
          explanation: policy.explanation,
          evidence: Array.isArray(policy.evidence) ? policy.evidence : (policy.evidence ? [policy.evidence] : [])
        }));
        const transcript = (item.payload?.transcript || []).slice(-5).reverse().map((message) => ({
          role: message.role || "message",
          content: message.content || ""
        }));
        return {
          product: "OpenLeash",
          exported_at: new Date().toISOString(),
          event: {
            id: item.id,
            status: item.resolution || item.decision,
            summary: displayEventSummary(item),
            agent: item.agent_name,
            agent_kind: item.agent_kind,
            project: projectTag(item.project_path) || "",
            project_path: item.project_path || "",
            file_path: filePathForEvent(item) || "",
            triggered_at: item.created_at,
            resolved_at: resolutionTime(item) || "",
            resolution_label: resolutionTime(item) ? resolutionLabel(item) : "",
            rules,
            conversation_context: transcript,
            raw_payload: item.payload || {}
          }
        };

      function eventJson(item) {
        return JSON.stringify(sharePayloadForEvent(item), null, 2);
      }

      async function copyEventJson(item) {
        await window.openleash.copyText(eventJson(item));
      }

      async function shareEvent(item) {
        const data = sharePayloadForEvent(item);
        const text = eventJson(item);
        const title = `OpenLeash event - ${data.event.agent}`;
        if (navigator.share && (!navigator.canShare || navigator.canShare({ title, text }))) {
          try {
            await navigator.share({ title, text });
            return true;
          } catch (error) {
            if (error && error.name === "AbortError") return true;
          }
        }
        await copyEventJson(item);
        return false;
      }

      function initializePluginSetupState(force = false) {
        const plugins = state.plugins || [];
        if ((force || !selectedPlugins) && plugins.length > 0) {
          selectedPlugins = new Set(plugins.filter((plugin) => plugin.organizationPolicy?.mandatory || plugin.settings?.enabled === true).map((plugin) => plugin.id));
        }
        for (const plugin of plugins) {
          if (!pluginSetupConfigs[plugin.id] || force) {
            pluginSetupConfigs[plugin.id] = {
              ...(plugin.defaultConfig || {}),
              ...(plugin.settings?.config || {}),
              enabled: plugin.organizationPolicy?.mandatory || plugin.settings?.enabled === true
            };
          }
        }
      }

      function pluginEvents(plugin) {
        return plugin.events || plugin.stages || [];
      }

      function pluginName(plugin) {
        return plugin.slug || plugin.marketplace?.slug || plugin.name || String(plugin.id || "").split(".").pop() || plugin.id;
      }

      function pluginPackageName(plugin) {
        return plugin.slug || plugin.marketplace?.slug || String(plugin.id || "").split(".").pop() || pluginName(plugin);
      }

      function compactNumber(value) {
        const count = Number(value || 0);
        if (count >= 1000) {
          const rounded = Math.round(count / 100) / 10;
          return `${Number.isInteger(rounded) ? rounded.toFixed(0) : rounded}k`;
        }
        return String(count);
      }

      function pluginValueLine(plugin) {
        return plugin.marketplace?.shortDescription || plugin.description || "";
      }

      function pluginIconText(plugin) {
        const marketplaceIcon = String(plugin.marketplace?.iconText || "").trim();
        if (marketplaceIcon && !/^[A-Z0-9]{1,3}$/.test(marketplaceIcon)) return marketplaceIcon;
        const directIcon = String(plugin.iconText || "").trim();
        if (directIcon && !/^[A-Z0-9]{1,3}$/.test(directIcon)) return directIcon;
        const selectedIcons = {
          "token-saver": "✂️",
          "blast-radius": "💥",
          "data-leakage-prevention": "🤫",
          "mcp-scanner": "📡",
          "rules-enforcer": "📏",
          "sensitive-access": "🔐",
          "siem-exporter": "📤",
          "skill-scanner": "🕵️",
          "code-scanner": "☣️"
        };
        const selected = selectedIcons[pluginPackageName(plugin)];
        if (selected) return selected;
        if (marketplaceIcon) return marketplaceIcon;
        if (directIcon) return directIcon;
        const source = pluginPackageName(plugin) || pluginName(plugin) || plugin.id || "plugin";
        const parts = String(source).split(/[^a-z0-9]+/i).filter(Boolean);
        return (parts.length > 1 ? parts.slice(0, 2).map((part) => part[0]).join("") : String(source).slice(0, 2)).toUpperCase();
      }

      function pluginIconHtml(plugin) {
        const image = String(plugin.marketplace?.visualPng || plugin.visualPng || "").trim();
        if (/^https:\/\//i.test(image) || /^data:image\/(png|jpeg|webp);base64,/i.test(image)) {
          return `<img src="${escapeHtml(image)}" alt="">`;
        }
        return escapeHtml(pluginIconText(plugin));
      }

      function ensurePluginSetupConfig(pluginId) {
        if (!pluginSetupConfigs[pluginId]) {
          const plugin = (state.plugins || []).find((item) => item.id === pluginId) || {};
          pluginSetupConfigs[pluginId] = {
            ...(plugin.defaultConfig || {}),
            ...(plugin.settings?.config || {}),
            enabled: plugin.organizationPolicy?.mandatory || plugin.settings?.enabled === true
          };
        }
        return pluginSetupConfigs[pluginId];
      }

      function pluginPopularity(plugin) {
        return Number(plugin.marketplace?.installCount || plugin.marketplace?.downloadCount || plugin.marketplace?.weeklyDownloadCount || 0);
      }

      function comparePluginPopularity(left, right) {
        return pluginPopularity(right) - pluginPopularity(left)
          || Number(left.marketplace?.featuredRank ?? left.featuredRank ?? 9999) - Number(right.marketplace?.featuredRank ?? right.featuredRank ?? 9999)
          || pluginPackageName(left).localeCompare(pluginPackageName(right));
      }

      function setupPluginInstallCards() {
        const query = setupPluginSearch.trim().toLowerCase();
        const allPlugins = [...(state.plugins || [])].sort(comparePluginPopularity);
        const category = setupPluginCategory || "all";
        const categoryFiltered = category === "all"
          ? allPlugins
          : allPlugins.filter((plugin) => pluginCategory(plugin).toLowerCase() === category);
        const plugins = query
          ? categoryFiltered.filter((plugin) => pluginSearchText(plugin).includes(query))
          : categoryFiltered;
        if (allPlugins.length === 0) return `<div class="card empty">No plugin catalog has been received yet.</div>`;
        const categories = pluginCategorySummary(allPlugins);
        return `
          <div class="pluginCategoryFilters">
            ${categories.map((item) => `
              <button type="button" data-plugin-category="${escapeHtml(item.id)}" class="${escapeHtml(item.id)} ${category === item.id ? "active" : ""}">
                ${categoryIcon(item.label)}
                <span>${escapeHtml(item.label)} ${escapeHtml(String(item.count))}</span>
              </button>
            `).join("")}
          </div>
          <div class="pluginMarketplaceTools">
            <input id="pluginMarketplaceSearch" value="${escapeHtml(setupPluginSearch)}" placeholder="Search plugins, categories, developers, tags...">
            ${canAddLocalPluginFolder() ? `<button type="button" class="secondary" data-add-local-plugin-folder>Add local folder</button>` : ""}
            <span>${plugins.length} of ${categoryFiltered.length} shown</span>
          </div>
          <div class="cardList">
            ${plugins.map((plugin) => {
              const checked = selectedPlugins?.has(plugin.id) ?? Boolean(plugin.organizationPolicy?.mandatory || plugin.settings?.enabled === true);
              const mandatory = Boolean(plugin.organizationPolicy?.mandatory);
              const developer = plugin.marketplace?.developerName || (plugin.publisher === "openleash" ? "OpenLeash" : plugin.publisher || "Unknown");
              const downloadCount = Number(plugin.marketplace?.downloadCount || 0);
              const expanded = expandedSetupPlugins.has(plugin.id);
              const category = pluginCategory(plugin);
              const categoryClass = pluginCategoryClass(category);
              return `
                <article class="card pluginInstallLine ${checked ? "selected" : ""} ${expanded ? "expanded" : ""}">
                  <span class="agentIcon" data-plugin-expand="${escapeHtml(plugin.id)}">${pluginIconHtml(plugin)}</span>
                  <span class="pluginCopy" data-plugin-expand="${escapeHtml(plugin.id)}">
                    <strong>${escapeHtml(pluginPackageName(plugin))}</strong>
                    <small>${escapeHtml(pluginName(plugin))}</small>
                    <span>${escapeHtml(plugin.marketplace?.shortDescription || pluginValueLine(plugin))}</span>
                    <span class="pluginStats">
                      <span class="pluginMetaPill">${metaIcon("author")} ${escapeHtml(developer)}</span>
                      <span class="pluginMetaPill">${metaIcon("downloads")} ${escapeHtml(compactNumber(downloadCount))} downloads</span>
                      <span class="pluginCategoryTag ${categoryClass}">${categoryIcon(category)} ${escapeHtml(category)}</span>
                    </span>
                    ${expanded ? `
                      <span class="pluginDetails">
                        <p>${escapeHtml(plugin.marketplace?.longDescription || plugin.description || pluginValueLine(plugin))}</p>
                      </span>
                    ` : ""}
                    <small>${expanded ? "Click to collapse" : "Click for details"}</small>
                  </span>
                  <span class="pluginChoice">
                    <label>
                      <input data-plugin-install="${escapeHtml(plugin.id)}" aria-label="Install ${escapeHtml(pluginName(plugin))}" title="${escapeHtml(plugin.settings?.runtimeError || "")}" type="checkbox" ${checked ? "checked" : ""} ${mandatory || plugin.settings?.runtimeAvailable === false ? "disabled" : ""}>
                      <span class="pluginAction" aria-hidden="true">
                        <span class="pluginActionIcon">${checked ? "-" : "+"}</span>
                        <span class="pluginActionText">${plugin.settings?.runtimeAvailable === false ? "Unavailable" : mandatory ? "Required" : checked ? "Remove" : "Add"}</span>
                      </span>
                    </label>
                  </span>
                </article>
              `;
            }).join("") || `<div class="card empty">No plugins match this filter.</div>`}
          </div>
        `;
      }

      function pluginSearchText(plugin) {
        return [
          plugin.id,
          plugin.slug,
          plugin.name,
          plugin.description,
          pluginCategory(plugin),
          plugin.marketplace?.developerName,
          plugin.marketplace?.shortDescription,
          plugin.marketplace?.longDescription,
          ...(plugin.marketplace?.tags || []),
          ...(plugin.tags || [])
        ].filter(Boolean).join(" ").toLowerCase();
      }

      function pluginCategory(plugin) {
        const raw = plugin.marketplace?.category || plugin.category || plugin.manifest?.category || "";
        const text = String(raw || `${plugin.id || ""} ${plugin.name || ""} ${plugin.description || ""} ${(plugin.marketplace?.tags || []).join(" ")} ${(plugin.tags || []).join(" ")}`).toLowerCase();
        if (/siem-exporter/.test(text)) return "Other";
        if (/mcp-scanner|skill-scanner/.test(text)) return "Security";
        if (/security|policy|guard|skill|prompt-injection|risk|approval|dlp|leak|sensitive|secret|credential/.test(text)) return "Security";
        if (/visibility|observability|observe|log|mcp|siem|audit|telemetry|monitor/.test(text)) return "Visibility";
        if (/cost|token|compression|usage|budget|spend/.test(text)) return "Cost";
        return "Other";
      }

      function pluginCategorySummary(plugins) {
        const counts = new Map([["all", plugins.length]]);
        for (const plugin of plugins) {
          const key = pluginCategory(plugin).toLowerCase();
          counts.set(key, (counts.get(key) || 0) + 1);
        }
        return [
          { id: "all", label: "All", count: counts.get("all") || 0 },
          { id: "cost", label: "Cost", count: counts.get("cost") || 0 },
          { id: "security", label: "Security", count: counts.get("security") || 0 },
          { id: "observability", label: "Visibility", count: counts.get("observability") || 0 },
          { id: "utility", label: "Other", count: counts.get("utility") || 0 }
        ];
      }

      function pluginCategoryClass(category) {
        return String(category || "utility").toLowerCase();
      }

      function categoryIcon(category) {
        const normalized = String(category || "").toLowerCase();
        if (normalized === "security") {
          return `<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3.5 19 6v5.2c0 4.4-2.8 7.7-7 9.3-4.2-1.6-7-4.9-7-9.3V6z"></path></svg>`;
        }
        if (normalized === "observability") {
          return `<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M2.8 12s3.4-6 9.2-6 9.2 6 9.2 6-3.4 6-9.2 6-9.2-6-9.2-6z"></path><circle cx="12" cy="12" r="2.8"></circle></svg>`;
        }
        if (normalized === "utility") {
          return `<svg viewBox="0 0 24 24" aria-hidden="true"><path d="m13 2-8 11h6l-1 9 9-12h-6z"></path></svg>`;
        }
        if (normalized === "all") {
          return `<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 5h16M4 12h16M4 19h16"></path></svg>`;
        }
        return `<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 7h5l2.5 10 2-7H20"></path></svg>`;
      }

      function metaIcon(kind) {
        if (kind === "downloads") {
          return `<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3v12"></path><path d="m7 10 5 5 5-5"></path><path d="M5 20h14"></path></svg>`;
        }
        return `<svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="8" r="3.5"></circle><path d="M5.5 20c1.1-4 3.3-6 6.5-6s5.4 2 6.5 6"></path></svg>`;
      }

      function setupPluginSettingsCards() {
        const plugins = (state.plugins || []).filter((plugin) => selectedPlugins?.has(plugin.id));
        if (plugins.length === 0) return `<div class="card empty">No plugins selected. OpenLeash will finish setup without adding pipeline plugins.</div>`;
        return `
          <div class="pluginSettingsGrid">
            ${plugins.sort(comparePluginPopularity).map((plugin) => setupPluginSettingsCard(plugin)).join("")}
          </div>
        `;
      }

      function setupPluginSettingsCard(plugin) {
        const config = ensurePluginSetupConfig(plugin.id);
        return `
          <article class="card pluginSettingCard">
            <div class="fieldRow">
              <div>
                <strong>${escapeHtml(pluginName(plugin))}</strong>
                <p>${escapeHtml(pluginValueLine(plugin))}</p>
              </div>
              <span class="tag good">OpenLeash</span>
            </div>
            <div class="pluginSettingFields">
              ${pluginSettingsFields(plugin, config)}
            </div>
          </article>
        `;
      }

      function pluginSettingsFields(plugin, config) {
        const fields = pluginSettingDefinitions(plugin, config);
        if (fields.length === 0) return `<p>No initial settings needed.</p>`;
        return fields.map((field) => pluginSettingField(plugin, config, field)).join("");
      }

      function pluginSettingDefinitions(plugin, config) {
        const properties = plugin.configSchema?.properties && typeof plugin.configSchema.properties === "object"
          ? plugin.configSchema.properties
          : {};
        const keys = new Set([
          ...Object.keys(plugin.defaultConfig || {}),
          ...Object.keys(config || {}),
          ...Object.keys(properties)
        ]);
        keys.delete("enabled");
        return [...keys].sort().map((key) => ({
          key,
          schema: properties[key] && typeof properties[key] === "object" ? properties[key] : {},
          defaultValue: plugin.defaultConfig?.[key]
        }));
      }

      function pluginSettingField(plugin, config, field) {
        const value = config[field.key] ?? field.defaultValue;
        const schema = field.schema || {};
        const label = settingLabel(field.key);
        if (Array.isArray(schema.enum)) {
          return `
            <div class="fieldRow">
              <strong>${escapeHtml(label)}</strong>
              <select data-plugin-setting="${escapeHtml(plugin.id)}" data-setting-key="${escapeHtml(field.key)}">
                ${schema.enum.map((option) => `<option value="${escapeHtml(option)}" ${String(value) === String(option) ? "selected" : ""}>${escapeHtml(settingLabel(option))}</option>`).join("")}
              </select>
            </div>
          `;
        }
        if (schema.type === "array" && Array.isArray(schema.items?.enum)) {
          const selected = Array.isArray(value) ? value.map(String) : [];
          return `
            <div>
              <strong>${escapeHtml(label)}</strong>
              <div class="checkboxGrid" style="margin-top:10px">
                ${schema.items.enum.map((option) => `
                  <label class="checkboxPill">
                    <input data-plugin-setting="${escapeHtml(plugin.id)}" data-setting-key="${escapeHtml(field.key)}" data-setting-kind="array" value="${escapeHtml(option)}" type="checkbox" ${selected.includes(String(option)) ? "checked" : ""}>
                    ${escapeHtml(settingLabel(option))}
                  </label>
                `).join("")}
              </div>
            </div>
          `;
        }
        if (plugin.id === "openleash.rules-enforcer" && field.key === "rules") {
          const rulesText = normalizeRuleEditorValues(value).map((rule) => rule.text).join("\n");
          return `
            <div>
              <strong>${escapeHtml(label)}</strong>
              <textarea class="detailSettingInput" style="margin-top:10px; width:100%" data-plugin-setting="${escapeHtml(plugin.id)}" data-setting-key="${escapeHtml(field.key)}" data-setting-kind="string-array">${escapeHtml(rulesText)}</textarea>
            </div>
          `;
        }
        if ((schema.type === "array" && schema.items?.type === "string") || isStringArraySetting(value) || field.key === "rules") {
          return `
            <div>
              <strong>${escapeHtml(label)}</strong>
              <textarea class="detailSettingInput" style="margin-top:10px; width:100%" data-plugin-setting="${escapeHtml(plugin.id)}" data-setting-key="${escapeHtml(field.key)}" data-setting-kind="string-array">${escapeHtml(Array.isArray(value) ? value.join("\n") : String(value ?? ""))}</textarea>
            </div>
          `;
        }
        if (schema.type === "boolean" || typeof value === "boolean") {
          return `
            <label class="fieldRow">
              <span><strong>${escapeHtml(label)}</strong></span>
              <span class="switch"><input data-plugin-setting="${escapeHtml(plugin.id)}" data-setting-key="${escapeHtml(field.key)}" type="checkbox" ${value ? "checked" : ""}><span></span></span>
            </label>
          `;
        }
        if (schema.type === "number" || schema.type === "integer" || typeof value === "number") {
          return `
            <div class="fieldRow">
              <strong>${escapeHtml(label)}</strong>
              <input data-plugin-setting="${escapeHtml(plugin.id)}" data-setting-key="${escapeHtml(field.key)}" type="number" value="${escapeHtml(value ?? 0)}">
            </div>
          `;
        }
        return `
          <div class="fieldRow">
            <strong>${escapeHtml(label)}</strong>
            <input data-plugin-setting="${escapeHtml(plugin.id)}" data-setting-key="${escapeHtml(field.key)}" value="${escapeHtml(value ?? "")}">
          </div>
        `;
      }

      function settingLabel(value) {
        return String(value || "")
          .replace(/[_-]+/g, " ")
          .replace(/([a-z0-9])([A-Z])/g, "$1 $2")
          .trim()
          .replace(/\b\w/g, (char) => char.toUpperCase());
      }

      function bindPluginSelection() {
        root.querySelectorAll("[data-plugin-install]").forEach((input) => {
          const label = input.closest("label");
          if (label) {
            label.onclick = (event) => {
              event.preventDefault();
              setPluginSelected(input, !input.checked, true);
            };
          };
          input.onchange = () => setPluginSelected(input, input.checked, true);
        });
      }

      function setPluginSelected(input, checked, flash = false) {
        if (!selectedPlugins) selectedPlugins = new Set();
        const pluginId = input.dataset.pluginInstall;
        if (!pluginId) return;
        const plugin = (state.plugins || []).find((item) => item.id === pluginId);
        if (plugin?.organizationPolicy?.mandatory) {
          input.checked = true;
          selectedPlugins.add(pluginId);
          return;
        }
        input.checked = Boolean(checked);
        input.checked ? selectedPlugins.add(pluginId) : selectedPlugins.delete(pluginId);
        ensurePluginSetupConfig(pluginId).enabled = Boolean(input.checked);
        const actionIcon = input.parentElement?.querySelector(".pluginActionIcon");
        const actionText = input.parentElement?.querySelector(".pluginActionText");
        if (actionIcon) actionIcon.textContent = input.checked ? "-" : "+";
        if (actionText) actionText.textContent = input.checked ? "Added" : "Add";
        const card = input.closest(".pluginInstallLine");
        card?.classList.toggle("selected", Boolean(input.checked));
        if (flash && card) {
          card.classList.add("justChanged");
          setTimeout(() => {
            card.classList.remove("justChanged");
            if (actionText) actionText.textContent = input.checked ? "Remove" : "Add";
          }, 650);
        } else if (actionText) {
          actionText.textContent = input.checked ? "Remove" : "Add";
        }
      }

      function bindPluginExpansion() {
        root.querySelectorAll("[data-plugin-expand]").forEach((element) => {
          element.onclick = () => {
            const pluginId = element.dataset.pluginExpand;
            if (!pluginId) return;
            if (expandedSetupPlugins.has(pluginId)) expandedSetupPlugins.delete(pluginId);
            else expandedSetupPlugins.add(pluginId);
            renderSetup();
          };
        });
      }

      function bindPluginMarketplaceSearch(target = "setup") {
        const search = document.getElementById("pluginMarketplaceSearch");
        if (search) {
          search.oninput = () => {
            setupPluginSearch = search.value;
            target === "marketplace" ? renderPluginMarketplace() : renderSetup();
            const nextSearch = document.getElementById("pluginMarketplaceSearch");
            if (nextSearch) {
              nextSearch.focus();
              nextSearch.setSelectionRange(nextSearch.value.length, nextSearch.value.length);
            }
          };
        };
        root.querySelectorAll("[data-plugin-category]").forEach((button) => {
          button.onclick = () => {
            setupPluginCategory = button.dataset.pluginCategory || "all";
            target === "marketplace" ? renderPluginMarketplace() : renderSetup();
          };
        });
        root.querySelectorAll("[data-add-local-plugin-folder]").forEach((button) => {
          button.onclick = async () => {
            button.disabled = true;
            const original = button.textContent;
            button.textContent = "Adding...";
            const result = await window.openleash.importLocalPluginFolder?.().catch((error) => ({ ok: false, error: error?.message || "Could not add local plugin." }));
            button.disabled = false;
            button.textContent = original || "Add local folder";
            if (result?.canceled) return;
            if (!result?.ok) {
              alert(result?.error || "Could not add local plugin.");
              return;
            }
            if (result.plugin && !state.plugins?.some((plugin) => plugin.id === result.plugin.id)) {
              state.plugins = [...(state.plugins || []), {
                ...result.plugin,
                marketplace: result.plugin,
                settings: result.settings || { enabled: true, config: result.plugin.defaultConfig || {}, availableVersion: result.plugin.version },
                organizationPolicy: { mandatory: false, defaultEnabled: false, userInstallAllowed: true, configLocked: false }
              }];
            }
            initializePluginSetupState(true);
            target === "marketplace" ? renderPluginMarketplace() : renderSetup();
          };
        });
      }

      function canAddLocalPluginFolder() {
        const url = String(setupRemoteApiUrl || state.remoteApiUrl || "");
        return setupClientMode === "custom" || state.clientMode === "custom" || /https?:\/\/(127\.0\.0\.1|localhost|\[::1\])(?::|\/)/i.test(url);
      }

      function bindPluginSettingInputs() {
        root.querySelectorAll("[data-plugin-setting]").forEach((input) => {
          input.onchange = () => updatePluginSettingFromInput(input);
          input.oninput = () => updatePluginSettingFromInput(input);
        });
      }

      function updatePluginSettingFromInput(input) {
        const pluginId = input.dataset.pluginSetting;
        const key = input.dataset.settingKey;
        if (!pluginId || !key) return;
        const config = ensurePluginSetupConfig(pluginId);
        if (input.dataset.settingKind === "array") {
          config[key] = [...root.querySelectorAll(`[data-plugin-setting="${cssEscape(pluginId)}"][data-setting-key="${cssEscape(key)}"]:checked`)].map((item) => item.value);
          return;
        }
        if (input.dataset.settingKind === "string-array") {
          config[key] = String(input.value || "")
            .split(/\r?\n/g)
            .map((line) => line.replace(/^[-*]\s+/, "").trim())
            .filter(Boolean);
          return;
        }
        if (input.type === "checkbox") {
          config[key] = Boolean(input.checked);
          return;
        }
        if (input.type === "number") {
          config[key] = Math.max(0, Math.min(100, Number(input.value || 0)));
          return;
        }
        config[key] = input.value;
      }

      function selectedPluginSettingsPayloads() {
        return (state.plugins || []).map((plugin) => {
          const enabled = Boolean(plugin.organizationPolicy?.mandatory || selectedPlugins?.has(plugin.id));
          return {
            pluginId: plugin.id,
            enabled,
            ...(enabled ? {
              config: {
                ...(plugin.defaultConfig || {}),
                ...(plugin.settings?.config || {}),
                ...ensurePluginSetupConfig(plugin.id),
                enabled
              },
              orderingPriority: plugin.settings?.orderingPriority ?? plugin.ordering?.priority ?? null
            } : {}),
            marketplace: plugin.marketplace || null
          };
        });
      }

      async function saveSelectedPluginSettings() {
        const payloads = selectedPluginSettingsPayloads();
        if (payloads.length === 0) return { ok: true };
        if (!setupRemoteAuth?.token && !canAddLocalPluginFolder()) return { ok: true };
        const updated = [];
        for (const payload of payloads) {
          const result = await window.openleash.savePluginSettings({
            apiUrl: setupRemoteApiUrl,
            token: setupRemoteAuth?.token,
            ...payload
          }).catch((error) => ({ ok: false, error: error?.message || "Could not save plugin settings." }));
          if (!result?.ok) return { ok: false, error: result?.error || `Could not save ${payload.pluginId}.`, pluginId: payload.pluginId };
          updated.push(result);
        }
        const settingsById = new Map(updated.map((item) => [item.pluginId, item.settings]));
        state.plugins = (state.plugins || []).map((plugin) => ({
          ...plugin,
          settings: settingsById.get(plugin.id) || plugin.settings
        }));
        initializePluginSetupState(true);
        return { ok: true };
      }

      function renderPlugins() {
        const category = pluginViewCategory || "all";
        const categories = clientPluginCategories();
        const viewPlugins = category === "all"
          ? categories.flatMap((item) => item.plugins || [])
          : (categories.find((item) => item.id === category)?.plugins || []);
        const filtered = (state.viewModel?.pluginCategories ? viewPlugins.map(clientPluginCatalogItem) : viewPlugins).filter(Boolean);
        const title = category === "all" ? "Plugins" : (categories.find((item) => item.id === category)?.label || categoryLabel(category));
        root.innerHTML = `
          <div class="head">
            <div><h1>${escapeHtml(title)}</h1><p>Installed plugins and the outcomes they report to OpenLeash.</p></div>
            ${modeTag()}
          </div>
          <div class="grid">
            ${filtered.map((plugin) => {
              const outcomes = pluginOutcomes(plugin.id);
              const latest = outcomes[0];
              const categoryLabel = pluginCategory(plugin);
              const categoryClass = pluginCategoryClass(categoryLabel);
              return `
              <article class="card pluginOutcomeCard" data-open-plugin="${escapeHtml(plugin.id)}">
                <div class="pluginOutcomeMain">
                  <span class="agentIcon">${pluginIconHtml(plugin)}</span>
                  <div class="pluginOutcomeCopy">
                    <strong>${escapeHtml(pluginPackageName(plugin))}</strong>
                    <p>${escapeHtml(plugin.marketplace?.shortDescription || plugin.description || "")}</p>
                    <span class="pluginOutcomeMeta">
                      <span class="pluginCategoryTag ${categoryClass}">${categoryIcon(categoryLabel)} ${escapeHtml(categoryLabel)}</span>
                      <span class="pluginMetaPill">${metaIcon("author")} ${escapeHtml(plugin.publisher === "openleash" ? "OpenLeash" : plugin.publisher || "Unknown")}</span>
                      <span class="pluginMetaPill">${metaIcon("downloads")} ${escapeHtml(compactNumber(Number(plugin.marketplace?.downloadCount || 0)))} downloads</span>
                    </span>
                  </div>
                  <span class="tag ${pluginInstalled(plugin) ? "good" : ""}">${escapeHtml(pluginStatusLabel(plugin))}</span>
                </div>
                <div class="eventMeta" style="margin-top:14px">
                  <span>${escapeHtml(String(outcomes.length))} outcomes</span>
                  <span>${escapeHtml(pluginEvents(plugin).slice(0, 2).join(", ") || "plugin events")}</span>
                  ${latest ? `<span>${escapeHtml(formatTime(latest.occurredAt || latest.createdAt))}</span>` : ""}
                </div>
                ${latest ? `
                  <div class="pluginOutcomeLatest">
                    <strong>${escapeHtml(latest.title || "Latest outcome")}</strong>
                    <p>${escapeHtml(latest.summary || latest.status || "")}</p>
                  </div>
                ` : `<div class="empty" style="margin-top:12px">No outcomes reported yet.</div>`}
              </article>
            `}).join("") || `<div class="card empty">No installed plugins in this category.</div>`}
          </div>
        `;
        bindPluginPageControls();
      }

      function renderPluginMarketplace() {
        const query = setupPluginSearch.trim().toLowerCase();
        const category = setupPluginCategory || "all";
        const allPlugins = availablePlugins().sort(comparePluginPopularity);
        const categoryFiltered = category === "all" ? allPlugins : allPlugins.filter((plugin) => pluginCategory(plugin).toLowerCase() === category);
        const plugins = query ? categoryFiltered.filter((plugin) => pluginSearchText(plugin).includes(query)) : categoryFiltered;
        const categories = pluginCategorySummary(allPlugins);
        root.innerHTML = `
          <div class="head">
            <div><h1>Add plugins</h1><p>Search the plugin marketplace and add pipeline plugins to this account.</p></div>
            ${modeTag()}
          </div>
          <div class="card">
            <div class="pluginCategoryFilters">
              ${categories.map((item) => `
                <button type="button" data-plugin-category="${escapeHtml(item.id)}" class="${escapeHtml(item.id)} ${category === item.id ? "active" : ""}">
                  ${categoryIcon(item.label)}
                  <span>${escapeHtml(item.label)} ${escapeHtml(String(item.count))}</span>
                </button>
              `).join("")}
            </div>
            <div class="pluginMarketplaceTools">
              <input id="pluginMarketplaceSearch" value="${escapeHtml(setupPluginSearch)}" placeholder="Search plugins, categories, developers, tags...">
              ${canAddLocalPluginFolder() ? `<button type="button" class="secondary" data-add-local-plugin-folder>Add local folder</button>` : ""}
              <span>${plugins.length} of ${categoryFiltered.length} shown</span>
            </div>
            <div class="cardList">
              ${plugins.map((plugin) => {
                const developer = plugin.marketplace?.developerName || (plugin.publisher === "openleash" ? "OpenLeash" : plugin.publisher || "Unknown");
                const categoryLabel = pluginCategory(plugin);
                const categoryClass = pluginCategoryClass(categoryLabel);
                return `
                  <article class="card pluginInstallLine">
                    <span class="agentIcon">${pluginIconHtml(plugin)}</span>
                    <span class="pluginCopy">
                      <strong>${escapeHtml(pluginPackageName(plugin))}</strong>
                      <small>${escapeHtml(pluginName(plugin))}</small>
                      <span>${escapeHtml(plugin.marketplace?.shortDescription || pluginValueLine(plugin))}</span>
                      <span class="pluginStats">
                        <span class="pluginMetaPill">${metaIcon("author")} ${escapeHtml(developer)}</span>
                        <span class="pluginCategoryTag ${categoryClass}">${categoryIcon(categoryLabel)} ${escapeHtml(categoryLabel)}</span>
                      </span>
                      ${plugin.settings?.runtimeError ? `<small>${escapeHtml(plugin.settings.runtimeError)}</small>` : ""}
                    </span>
                    <button type="button" class="pluginAction" data-install-marketplace-plugin="${escapeHtml(plugin.id)}" title="${escapeHtml(plugin.settings?.runtimeError || "")}" ${plugin.settings?.runtimeAvailable === false ? "disabled" : ""}>
                      <span class="pluginActionIcon">+</span>
                      <span class="pluginActionText">${plugin.settings?.runtimeAvailable === false ? "Unavailable" : "Install"}</span>
                    </button>
                  </article>
                `;
              }).join("") || `<div class="card empty">${allPlugins.length === 0 ? "All available plugins are installed." : "No plugins match this search."}</div>`}
            </div>
          </div>
        `;
        bindPluginMarketplaceSearch("marketplace");
        root.querySelectorAll("[data-install-marketplace-plugin]").forEach((button) => {
          button.onclick = () => {
            selectedPluginId = button.dataset.installMarketplacePlugin || "";
            const plugin = (state.plugins || []).find((item) => item.id === selectedPluginId);
            pluginViewCategory = plugin ? pluginCategory(plugin).toLowerCase() : "all";
            pluginDetailTab = "settings";
            view = "plugin-detail";
            renderView();
          };
        });
      }

      function renderPluginDetail() {
        const plugin = (state.plugins || []).find((item) => item.id === selectedPluginId) || (state.plugins || []).find((item) => item.settings?.enabled);
        if (!plugin) {
          view = "plugins";
          return renderPlugins();
        }
        selectedPluginId = plugin.id;
        const outcomes = pluginOutcomes(plugin.id);
        const categoryLabel = pluginCategory(plugin);
        const categoryClass = pluginCategoryClass(categoryLabel);
        const installed = pluginInstalled(plugin);
        const mandatory = Boolean(plugin.organizationPolicy?.mandatory);
        const locked = Boolean(plugin.organizationPolicy?.configLocked);
        const blocked = outcomes.filter((outcome) => String(outcome.decision || outcome.status || "").toLowerCase().includes("block")).length;
        const needsReview = outcomes.filter((outcome) => String(outcome.status || "").toLowerCase().includes("review")).length;
        root.innerHTML = `
          <div class="head">
            <div>
              <button id="backPlugins" class="secondary">Back</button>
              <div class="pluginDetailTitle">
                <span class="agentIcon">${pluginIconHtml(plugin)}</span>
                <h1>${escapeHtml(pluginPackageName(plugin))}</h1>
              </div>
              <p>${escapeHtml(plugin.marketplace?.shortDescription || plugin.description || "")}</p>
            </div>
            <div class="actions">
              <span class="pluginCategoryTag ${categoryClass}">${categoryIcon(categoryLabel)} ${escapeHtml(categoryLabel)}</span>
              <button id="togglePluginInstall" class="${installed ? "secondary" : "primary"}" title="${escapeHtml(plugin.settings?.runtimeError || "")}" ${mandatory || plugin.settings?.runtimeAvailable === false ? "disabled" : ""}>${escapeHtml(plugin.settings?.runtimeAvailable === false ? "Unavailable here" : mandatory ? "Required by org" : installed ? "Remove" : "Add")}</button>
            </div>
          </div>
          <div id="pluginDetailPageStatus" class="detailSettingStatus">${escapeHtml(plugin.settings?.runtimeError || "")}</div>
          <div class="eventMeta" style="margin-top:12px">
            <span class="pluginMetaPill">${metaIcon("author")} ${escapeHtml(plugin.publisher === "openleash" ? "OpenLeash" : plugin.publisher || "Unknown")}</span>
            <span>v${escapeHtml(plugin.version || "0.0.0")}</span>
            <span>${escapeHtml(pluginStatusLabel(plugin))}</span>
          </div>
          <div class="pluginDetailTabs" role="tablist" aria-label="${escapeHtml(pluginPackageName(plugin))} sections">
            <button type="button" data-plugin-detail-tab="insights" class="${pluginDetailTab === "insights" ? "active" : ""}">Insights</button>
            <button type="button" data-plugin-detail-tab="outcomes" class="${pluginDetailTab === "outcomes" ? "active" : ""}">Outcomes <span>${escapeHtml(String(outcomes.length))}</span></button>
            <button type="button" data-plugin-detail-tab="settings" class="${pluginDetailTab === "settings" ? "active" : ""}">Settings</button>
          </div>
          <div class="pluginDetailGrid">
            ${pluginDetailTab === "insights" ? `
            <div class="card">
              <div class="fieldRow">
                <div>
                  <strong>Insights</strong>
                  <p>Signals and trends reported by this plugin for this account.</p>
                </div>
                <span class="tag good">${escapeHtml(String(outcomes.length))}</span>
              </div>
              ${outcomes.length === 0 ? `<div class="empty" style="margin-top:14px">No insights reported yet.</div>` : `
                <div class="pluginInsightGrid" style="margin-top:14px">
                  <article class="pluginInsightMetric"><strong>${escapeHtml(String(outcomes.length))}</strong><span>Total outcomes</span></article>
                  <article class="pluginInsightMetric"><strong>${escapeHtml(String(blocked))}</strong><span>Blocked</span></article>
                  <article class="pluginInsightMetric"><strong>${escapeHtml(String(needsReview))}</strong><span>Needs review</span></article>
                </div>
              `}
            </div>
            ` : ""}
            ${pluginDetailTab === "outcomes" ? `
            <div class="card">
              <div class="fieldRow">
                <div>
                  <strong>Outcomes</strong>
                  <p>Events this plugin has reported for your account.</p>
                </div>
                <span class="tag good">${escapeHtml(String(outcomes.length))}</span>
              </div>
              <div class="cardList" style="margin-top:14px">
                ${outcomes.map((outcome) => pluginOutcomeCard(outcome)).join("") || `<div class="empty">No outcomes reported yet.</div>`}
              </div>
            </div>
            ` : ""}
            ${pluginDetailTab === "settings" ? `
            <div class="card">
              <div class="pluginDetailHeader">
                <div>
                  <strong>Settings</strong>
                  <p>${locked ? "Managed by your organization." : installed ? "Config applied to this user." : "Install this plugin before editing settings."}</p>
                </div>
                <span class="tag ${locked ? "" : "good"}">${escapeHtml(locked ? "locked" : "editable")}</span>
              </div>
              <div class="pluginDetailSettings" style="margin-top:18px">
                ${pluginDetailSettingsFields(plugin)}
              </div>
              ${pluginProfileSettings(plugin, locked || !installed)}
              <div class="actions">
                <span id="pluginDetailSaveStatus" class="detailSettingStatus"></span>
                <button id="savePluginDetailSettings" class="primary" ${locked || !installed ? "disabled" : ""}>Save settings</button>
              </div>
            </div>
            ` : ""}
          </div>
        `;
        document.getElementById("backPlugins").onclick = () => {
          view = installed ? "plugins" : "plugin-marketplace";
          renderView();
        };
        root.querySelectorAll("[data-plugin-detail-tab]").forEach((button) => {
          button.onclick = () => {
            pluginDetailTab = button.dataset.pluginDetailTab || "insights";
            renderPluginDetail();
          };
        });
        const toggleInstall = document.getElementById("togglePluginInstall");
        if (toggleInstall && !mandatory) {
          toggleInstall.onclick = async () => {
            if (installed && !confirm(`Remove ${pluginPackageName(plugin)} from this account?`)) return;
            toggleInstall.disabled = true;
            toggleInstall.textContent = installed ? "Removing..." : "Adding...";
            const result = await window.openleash.savePluginSettings({
              pluginId: plugin.id,
              enabled: !installed,
              config: effectivePluginConfig(plugin),
              orderingPriority: plugin.settings?.orderingPriority ?? plugin.ordering?.priority ?? null,
              marketplace: plugin.marketplace || null
            }).catch((error) => ({ ok: false, error: error?.message || "Could not update plugin." }));
            if (!result?.ok) {
              const status = document.getElementById("pluginDetailSaveStatus") || document.getElementById("pluginDetailPageStatus");
              if (status) status.textContent = result?.error || "Could not update plugin.";
              toggleInstall.disabled = false;
              toggleInstall.textContent = installed ? "Remove" : "Add";
              return;
            }
            state.plugins = (state.plugins || []).map((item) => item.id === plugin.id
              ? { ...item, settings: result.settings || { ...(item.settings || {}), enabled: !installed } }
              : item
            );
            pluginDetailTab = !installed ? "insights" : "settings";
            renderPluginDetail();
          };
        }
        if (pluginDetailTab === "settings") bindPluginDetailSettings(plugin);
      }

      function renderPluginRuleImport() {
        const plugin = (state.plugins || []).find((item) => item.id === selectedPluginId);
        if (!plugin || !pendingRuleImport || pendingRuleImport.pluginId !== selectedPluginId) {
          view = "plugin-detail";
          return renderPluginDetail();
        }
        const candidates = pendingRuleImport.candidates || [];
        const selectedCount = candidates.filter((candidate) => pendingRuleImport.selected.has(candidate.id)).length;
        const groups = ruleCandidateGroups(candidates);
        root.innerHTML = `
          <div class="head">
            <div>
              <button id="backPluginDetailFromImport" class="secondary">Back</button>
              <h1>Import instruction rules</h1>
              <p>Select the rules OpenLeash should enforce from scanned agent instruction files.</p>
            </div>
            <span class="tag good">${escapeHtml(String(selectedCount))} selected</span>
          </div>
          <div class="card ruleImportReview">
            <div class="fieldRow">
              <div>
                <strong>${escapeHtml(candidates.length)} candidate rules</strong>
                <p>Found across ${escapeHtml(String(pendingRuleImport.sourceCount || 0))} instruction file${pendingRuleImport.sourceCount === 1 ? "" : "s"}. Imported rules are added as unsaved settings until you press Save settings.</p>
              </div>
              <div class="actions">
                <button type="button" class="secondary" id="selectAllRuleCandidates">Select all</button>
                <button type="button" class="secondary" id="selectNoRuleCandidates">Select none</button>
              </div>
            </div>
            <div class="ruleCandidateList">
              ${groups.map((group) => `
                <section class="ruleCandidateGroup">
                  <div class="ruleCandidateGroupHead">
                    <span class="agentIcon">${agentIcon({ displayName: group.agent, icon: iconNameForAgent(group.agent) })}</span>
                    <span>
                      <strong>${escapeHtml(group.agent)}</strong>
                      <small>${escapeHtml(group.label)}${group.path ? ` · ${escapeHtml(shortPath(group.path))}` : ""}</small>
                    </span>
                    <em>${escapeHtml(String(group.rules.length))} rules</em>
                  </div>
                  <div class="ruleCandidateRows">
                    ${group.rules.map((candidate) => `
                      <label class="ruleCandidateRow ${pendingRuleImport.selected.has(candidate.id) ? "selected" : ""}">
                        <input type="checkbox" data-rule-candidate="${escapeHtml(candidate.id)}" ${pendingRuleImport.selected.has(candidate.id) ? "checked" : ""}>
                        <span>
                          <strong>${escapeHtml(candidate.text)}</strong>
                          <small>${escapeHtml(candidate.scope || "instruction file")}</small>
                        </span>
                        <select data-rule-candidate-action="${escapeHtml(candidate.id)}">
                          <option value="ask" ${candidate.action !== "block" ? "selected" : ""}>Ask</option>
                          <option value="block" ${candidate.action === "block" ? "selected" : ""}>Block</option>
                        </select>
                      </label>
                    `).join("")}
                  </div>
                </section>
              `).join("") || `<div class="empty">No instruction rules found.</div>`}
            </div>
            <div class="actions">
              <span id="ruleImportReviewStatus" class="detailSettingStatus"></span>
              <button type="button" class="secondary" id="cancelRuleImportReview">Cancel</button>
              <button type="button" class="primary" id="importSelectedRuleCandidates" ${selectedCount === 0 ? "disabled" : ""}>Next</button>
            </div>
          </div>
        `;
        bindPluginRuleImport(plugin);
      }

      function ruleCandidateGroups(candidates) {
        const groups = new Map();
        for (const candidate of candidates || []) {
          const key = [candidate.agent || "Agent instructions", candidate.path || candidate.label || ""].join("|");
          if (!groups.has(key)) {
            groups.set(key, {
              agent: candidate.agent || "Agent instructions",
              label: candidate.label || "Instruction file",
              path: candidate.path || "",
              rules: []
            });
          }
          groups.get(key).rules.push(candidate);
        }
        return [...groups.values()];
      }

      function shortPath(value) {
        const text = String(value || "").replace(/\\/g, "/");
        return text.replace(/^.*?([^/]+\/[^/]+\/[^/]+)$/, "$1");
      }

      function bindPluginRuleImport(plugin) {
        document.getElementById("backPluginDetailFromImport").onclick = () => {
          view = "plugin-detail";
          renderView();
        };
        document.getElementById("cancelRuleImportReview").onclick = () => {
          pendingRuleImport = null;
          view = "plugin-detail";
          renderView();
        };
        document.getElementById("selectAllRuleCandidates").onclick = () => {
          pendingRuleImport.selected = new Set((pendingRuleImport.candidates || []).map((candidate) => candidate.id));
          renderPluginRuleImport();
        };
        document.getElementById("selectNoRuleCandidates").onclick = () => {
          pendingRuleImport.selected = new Set();
          renderPluginRuleImport();
        };
        root.querySelectorAll("[data-rule-candidate]").forEach((input) => {
          input.onchange = () => {
            input.checked ? pendingRuleImport.selected.add(input.dataset.ruleCandidate) : pendingRuleImport.selected.delete(input.dataset.ruleCandidate);
            renderPluginRuleImport();
          };
        });
        root.querySelectorAll("[data-rule-candidate-action]").forEach((select) => {
          select.onchange = () => {
            const candidate = (pendingRuleImport.candidates || []).find((item) => item.id === select.dataset.ruleCandidateAction);
            if (candidate) candidate.action = select.value === "block" ? "block" : "ask";
          };
        });
        document.getElementById("importSelectedRuleCandidates").onclick = () => {
          const selected = (pendingRuleImport.candidates || [])
            .filter((candidate) => pendingRuleImport.selected.has(candidate.id))
            .map((candidate) => ({ text: candidate.text, action: candidate.action === "block" ? "block" : "ask" }));
          addRulesToPluginDraft(plugin, selected);
          pendingRuleImport = null;
          view = "plugin-detail";
          renderView();
        };
      }

      function bindPluginPageControls() {
        root.querySelectorAll("[data-open-plugin]").forEach((card) => {
          card.onclick = () => {
            selectedPluginId = card.dataset.openPlugin || "";
            const plugin = (state.plugins || []).find((item) => item.id === selectedPluginId);
            pluginViewCategory = plugin ? pluginCategory(plugin).toLowerCase() : pluginViewCategory;
            view = "plugin-detail";
            renderView();
          };
        });
      }

      function pluginOutcomes(pluginId) {
        return (state.outcomes || [])
          .filter((outcome) => outcome?.source?.pluginId === pluginId)
          .sort((a, b) => new Date(b.occurredAt || b.createdAt || 0) - new Date(a.occurredAt || a.createdAt || 0));
      }

      function pluginOutcomeCard(outcome) {
        const severity = String(outcome.severity || "info").toLowerCase();
        const statusClass = severity === "critical" || severity === "high" || outcome.status === "blocked" ? "bad" : outcome.status === "resolved" || outcome.status === "allowed" ? "good" : "";
        const context = [outcome.agent?.name, outcome.context?.toolName, outcome.context?.projectPath ? projectTag(outcome.context.projectPath) : ""].filter(Boolean).join(" · ");
        return `
          <article class="card">
            <div class="fieldRow">
              <div>
                <strong>${escapeHtml(outcome.title || "Plugin outcome")}</strong>
                <p>${escapeHtml(outcome.summary || context || "")}</p>
              </div>
              <span class="tag ${statusClass}">${escapeHtml(outcome.status || severity)}</span>
            </div>
            <div class="eventMeta" style="margin-top:10px">
              <span>${escapeHtml(formatTime(outcome.occurredAt || outcome.createdAt))}</span>
              ${context ? `<span>${escapeHtml(context)}</span>` : ""}
            </div>
          </article>
        `;
      }

      function pluginDetailSettingsFields(plugin) {
        const config = effectivePluginConfig(plugin);
        const fields = pluginSettingDefinitions(plugin, config);
        if (fields.length === 0) return `<div class="empty">No settings exposed.</div>`;
        return fields.map((field) => pluginDetailSettingField(plugin, config, field)).join("");
      }

      const profileAgentKinds = [
        "codex", "claude-code", "cursor", "github-copilot", "gemini", "opencode",
        "cline", "continue", "windsurf", "kiro", "aider", "zed", "openclaw",
        "nanoclaw", "salesforce-agentforce", "azure-ai-foundry", "microsoft-copilot-studio",
        "aws-bedrock-agentcore", "google-vertex-ai", "n8n", "zapier-agents",
        "openai-codex-cloud", "unknown"
      ];

      function pluginProfileSettings(plugin, disabled) {
        const inherited = plugin.settings?.inheritedProfiles || [];
        const profiles = plugin.settings?.profiles || [];
        return `
