          <div class="pluginDetailHeader" style="margin-top:24px">
            <div><strong>Agent-specific settings</strong><p>Override this plugin for an agent type or one enrolled agent. The same container handles every profile.</p></div>
            ${disabled ? "" : `<button type="button" class="secondary" id="addPluginProfile">Add profile</button>`}
          </div>
          ${inherited.length ? `<div class="empty" style="margin-top:12px">${escapeHtml(String(inherited.length))} organization profile${inherited.length === 1 ? "" : "s"} will apply before your profiles.</div>` : ""}
          <div class="cardList" id="pluginProfileList" style="margin-top:12px">
            ${profiles.map((profile) => pluginProfileCard(plugin, profile, disabled)).join("") || `<div class="empty">No agent-specific overrides.</div>`}
          </div>
        `;
      }

      function pluginProfileCard(plugin, profile, disabled) {
        const safeId = escapeHtml(profile.id);
        const knownAgents = (state.agents || []).filter((agent) => agent.id || agent.instanceId);
        return `
          <article class="card" data-plugin-profile="${safeId}">
            <div class="fieldRow">
              <label><strong>Profile name</strong><input class="detailSettingInput" data-profile-name value="${escapeHtml(profile.name || profile.id)}" ${disabled ? "disabled" : ""}></label>
              ${disabled ? "" : `<button type="button" class="secondary" data-remove-plugin-profile="${safeId}">Remove</button>`}
            </div>
            <div class="fieldRow" style="margin-top:12px">
              <label><strong>Agent types</strong><select class="detailSettingInput" data-profile-agent-kinds multiple size="5" ${disabled ? "disabled" : ""}>${profileAgentKinds.map((kind) => `<option value="${kind}" ${(profile.agentKinds || []).includes(kind) ? "selected" : ""}>${escapeHtml(settingLabel(kind))}</option>`).join("")}</select></label>
              <label><strong>Exact enrolled agents (optional)</strong><select class="detailSettingInput" data-profile-agent-ids multiple size="5" ${disabled ? "disabled" : ""}>${knownAgents.map((agent) => { const id = String(agent.instanceId || agent.id); return `<option value="${escapeHtml(id)}" ${(profile.agentIds || []).includes(id) ? "selected" : ""}>${escapeHtml(agent.displayName || agent.name || id)}</option>`; }).join("")}</select></label>
              <label><strong>Enabled override</strong><select class="detailSettingInput" data-profile-enabled ${disabled || plugin.organizationPolicy?.mandatory ? "disabled" : ""}><option value="inherit" ${plugin.organizationPolicy?.mandatory || typeof profile.enabled !== "boolean" ? "selected" : ""}>${plugin.organizationPolicy?.mandatory ? "Required by organization" : "Use base setting"}</option><option value="true" ${!plugin.organizationPolicy?.mandatory && profile.enabled === true ? "selected" : ""}>Enabled</option><option value="false" ${!plugin.organizationPolicy?.mandatory && profile.enabled === false ? "selected" : ""}>Disabled</option></select></label>
              <label><strong>Priority</strong><input class="detailSettingInput" data-profile-priority type="number" value="${escapeHtml(String(profile.priority ?? 0))}" ${disabled ? "disabled" : ""}></label>
            </div>
            <label style="display:block;margin-top:12px"><strong>Setting overrides (JSON)</strong><textarea class="detailSettingInput" data-profile-config ${disabled ? "disabled" : ""}>${escapeHtml(JSON.stringify(profile.config || {}, null, 2))}</textarea></label>
          </article>
        `;
      }

      function collectPluginProfiles(plugin) {
        return [...root.querySelectorAll("[data-plugin-profile]")].map((card, index) => {
          const enabledValue = card.querySelector("[data-profile-enabled]")?.value;
          let config = {};
          try { config = JSON.parse(card.querySelector("[data-profile-config]")?.value || "{}"); }
          catch { throw new Error(`Profile ${index + 1} has invalid settings JSON.`); }
          return {
            id: card.dataset.pluginProfile,
            name: card.querySelector("[data-profile-name]")?.value || card.dataset.pluginProfile,
            agentKinds: [...(card.querySelector("[data-profile-agent-kinds]")?.selectedOptions || [])].map((option) => option.value),
            agentIds: [...(card.querySelector("[data-profile-agent-ids]")?.selectedOptions || [])].map((option) => option.value),
            ...(enabledValue === "true" ? { enabled: true } : enabledValue === "false" ? { enabled: false } : {}),
            config,
            priority: Number(card.querySelector("[data-profile-priority]")?.value || 0)
          };
        });
      }

      function pluginDetailSettingField(plugin, config, field) {
        const value = config[field.key] ?? field.defaultValue;
        const schema = field.schema || {};
        const disabled = plugin.organizationPolicy?.configLocked ? "disabled" : "";
        const label = settingLabel(field.key);
        const hint = pluginSettingHint(field.key);
        const head = `
          <div class="pluginDetailSettingHead">
            <strong>${escapeHtml(label)}</strong>
            ${hint ? `<small>${escapeHtml(hint)}</small>` : ""}
          </div>
        `;
        if (Array.isArray(schema.enum)) {
          return `
            <div class="pluginDetailSetting">
              ${head}
              <div class="segmented" style="grid-template-columns: repeat(${schema.enum.length}, minmax(0, 1fr)); width: fit-content">
                ${schema.enum.map((option) => `
                  <label>
                    <input data-plugin-detail-setting="${escapeHtml(plugin.id)}" data-setting-key="${escapeHtml(field.key)}" type="radio" name="plugin-detail-${escapeHtml(plugin.id)}-${escapeHtml(field.key)}" value="${escapeHtml(option)}" ${String(value) === String(option) ? "checked" : ""} ${disabled}>
                    ${escapeHtml(settingLabel(option))}
                  </label>
                `).join("")}
              </div>
            </div>
          `;
        }
        if (schema.type === "array" && Array.isArray(schema.items?.enum)) {
          const selected = Array.isArray(value) ? value.map(String) : [];
          return `
            <div class="pluginDetailSetting">
              ${head}
              <div class="choicePills">
                ${schema.items.enum.map((option) => `
                  <label class="choicePill">
                    <input data-plugin-detail-setting="${escapeHtml(plugin.id)}" data-setting-key="${escapeHtml(field.key)}" data-setting-kind="array" value="${escapeHtml(option)}" type="checkbox" ${selected.includes(String(option)) ? "checked" : ""} ${disabled}>
                    ${escapeHtml(settingLabel(option))}
                  </label>
                `).join("")}
              </div>
            </div>
          `;
        }
        if (plugin.id === "openleash.rules-enforcer" && field.key === "rules") {
          const rules = normalizeRuleEditorValues(value);
          return `
            <div class="pluginDetailSetting">
              ${head}
              <div class="ruleListEditor" data-plugin-detail-setting="${escapeHtml(plugin.id)}" data-setting-key="${escapeHtml(field.key)}" data-setting-kind="rule-list">
                <div class="ruleListRows" data-rule-list="${escapeHtml(plugin.id)}" data-setting-key="${escapeHtml(field.key)}">
                  ${rules.map((rule) => ruleEditorRow(plugin.id, field.key, rule, disabled)).join("")}
                </div>
                ${!disabled ? `
                  <div class="ruleListActions">
                    <button type="button" class="secondary" id="addPluginRule">Add rule</button>
                    <button type="button" class="secondary" id="scanPluginRules">Scan agent instruction files</button>
                    <button type="button" class="secondary" id="importPluginRules">Import JSON rules</button>
                  </div>
                ` : ""}
              </div>
            </div>
          `;
        }
        if ((schema.type === "array" && schema.items?.type === "string") || isStringArraySetting(value)) {
          return `
            <div class="pluginDetailSetting">
              ${head}
              <textarea class="detailSettingInput" data-plugin-detail-setting="${escapeHtml(plugin.id)}" data-setting-key="${escapeHtml(field.key)}" data-setting-kind="string-array" ${disabled}>${escapeHtml(Array.isArray(value) ? value.join("\n") : String(value ?? ""))}</textarea>
            </div>
          `;
        }
        if (schema.type === "boolean" || typeof value === "boolean") {
          return `
            <label class="pluginDetailSetting">
              ${head}
              <span class="switch"><input data-plugin-detail-setting="${escapeHtml(plugin.id)}" data-setting-key="${escapeHtml(field.key)}" type="checkbox" ${value ? "checked" : ""} ${disabled}><span></span></span>
            </label>
          `;
        }
        if (schema.type === "number" || schema.type === "integer" || typeof value === "number") {
          return `
            <div class="pluginDetailSetting">
              ${head}
              <input class="detailSettingInput" data-plugin-detail-setting="${escapeHtml(plugin.id)}" data-setting-key="${escapeHtml(field.key)}" type="number" value="${escapeHtml(value ?? 0)}" ${disabled}>
            </div>
          `;
        }
        return `
          <div class="pluginDetailSetting">
            ${head}
            <input class="detailSettingInput" data-plugin-detail-setting="${escapeHtml(plugin.id)}" data-setting-key="${escapeHtml(field.key)}" value="${escapeHtml(value ?? "")}" placeholder="Default" ${disabled}>
          </div>
        `;
      }

      function pluginSettingHint(key) {
        if (key === "action") return "Choose whether sensitive data is masked or blocked.";
        if (key === "categories") return "Sensitive data families this plugin should inspect.";
        if (key === "level") return "How aggressively prompts are compressed.";
        if (key === "conciseResponse") return "Ask the model to keep responses tighter.";
        if (key === "model") return "Optional model override. Leave blank for the default.";
        if (key === "suspiciousRiskThreshold") return "Higher values reduce skill-scanner alerts.";
        if (key === "policySet") return "Policy group used by this evaluator.";
        if (key === "redactSecrets") return "Hide secrets in MCP observations.";
        if (key === "rules") return "One enforceable instruction per line. Violations can pause the agent and notify your clients.";
        return "";
      }

      function isStringArraySetting(value) {
        return Array.isArray(value) && value.every((item) => typeof item === "string");
      }

      function normalizeRuleEditorValues(value) {
        if (Array.isArray(value)) {
          return value
            .map((item) => normalizeRuleEditorValue(item))
            .filter((item) => item.text);
        }
        return String(value ?? "")
          .split(/\r?\n/g)
          .map((line) => line.trim())
          .filter(Boolean)
          .map((text) => ({ text, action: "ask" }));
      }

      function normalizeRuleEditorValue(value) {
        if (typeof value === "string") return { text: value.trim(), action: "ask" };
        if (value && typeof value === "object") {
          return {
            text: String(value.text || value.rule || value.description || "").trim(),
            action: value.action === "block" ? "block" : "ask",
            pending: Boolean(value.pending)
          };
        }
        return { text: "", action: "ask" };
      }

      function ruleEditorRow(pluginId, key, value = "", disabled = "") {
        const rule = normalizeRuleEditorValue(value);
        const pendingTexts = pluginPendingRuleTexts[pluginId] || new Set();
        const pending = rule.pending || pendingTexts.has(rule.text.toLowerCase());
        return `
          <div class="ruleListRow ${pending ? "pendingImport" : ""}">
            <textarea data-rule-item="${escapeHtml(pluginId)}" data-setting-key="${escapeHtml(key)}" placeholder="Ask before..." ${disabled}>${escapeHtml(rule.text)}</textarea>
            <select class="ruleActionSelect" data-rule-action="${escapeHtml(pluginId)}" data-setting-key="${escapeHtml(key)}" ${disabled}>
              <option value="ask" ${rule.action !== "block" ? "selected" : ""}>Ask</option>
              <option value="block" ${rule.action === "block" ? "selected" : ""}>Block</option>
            </select>
            ${disabled ? "" : `<button type="button" class="ruleListRemove" data-rule-remove="${escapeHtml(pluginId)}" title="Remove rule">-</button>`}
          </div>
        `;
      }

      function autosizeRuleTextareas(scope = root) {
        scope.querySelectorAll("[data-rule-item]").forEach((textarea) => {
          textarea.style.height = "auto";
          textarea.style.height = `${textarea.scrollHeight}px`;
          textarea.oninput = () => {
            textarea.style.height = "auto";
            textarea.style.height = `${textarea.scrollHeight}px`;
          };
        });
      }

      function effectivePluginConfig(plugin) {
        if (pluginDetailDraftConfigs[plugin.id]) return {
          ...(pluginDetailDraftConfigs[plugin.id] || {})
        };
        return baseEffectivePluginConfig(plugin);
      }

      function baseEffectivePluginConfig(plugin) {
        const config = {
          ...(plugin.defaultConfig || {}),
          ...(plugin.settings?.config || {})
        };
        if (plugin.id === "openleash.rules-enforcer" && (!Array.isArray(config.rules) || config.rules.length === 0)) {
          config.rules = (state.rules || [])
            .filter((rule) => rule.enabled || rule.locked)
            .map((rule) => rule.description || rule.natural_language_rule || rule.name)
            .filter(Boolean);
        }
        return config;
      }

      function addRulesToPluginDraft(plugin, rules) {
        const base = pluginDetailDraftConfigs[plugin.id]
          ? { ...(pluginDetailDraftConfigs[plugin.id] || {}) }
          : baseEffectivePluginConfig(plugin);
        const existingRules = normalizeRuleEditorValues(base.rules);
        const seen = new Set(existingRules.map((rule) => rule.text.toLowerCase()));
        const pendingTexts = pluginPendingRuleTexts[plugin.id] || new Set();
        const nextRules = [...existingRules];
        for (const rule of rules || []) {
          const normalized = normalizeRuleEditorValue(rule);
          if (!normalized.text || seen.has(normalized.text.toLowerCase())) continue;
          seen.add(normalized.text.toLowerCase());
          pendingTexts.add(normalized.text.toLowerCase());
          nextRules.push({ ...normalized, pending: true });
        }
        pluginPendingRuleTexts[plugin.id] = pendingTexts;
        pluginDetailDraftConfigs[plugin.id] = {
          ...base,
          rules: nextRules
        };
      }

      function collectPluginDetailConfig(plugin) {
        const config = effectivePluginConfig(plugin);
        root.querySelectorAll(`[data-plugin-detail-setting="${cssEscape(plugin.id)}"]`).forEach((input) => {
          const key = input.dataset.settingKey;
          if (!key) return;
          if (input.dataset.settingKind === "array") {
            config[key] = [...root.querySelectorAll(`[data-plugin-detail-setting="${cssEscape(plugin.id)}"][data-setting-key="${cssEscape(key)}"]:checked`)].map((item) => item.value);
            return;
          }
          if (input.dataset.settingKind === "string-array") {
            config[key] = String(input.value || "")
              .split(/\r?\n/g)
              .map((line) => line.replace(/^[-*]\s+/, "").trim())
              .filter(Boolean);
            return;
          }
          if (input.dataset.settingKind === "rule-list") {
            config[key] = [...root.querySelectorAll(`[data-rule-item="${cssEscape(plugin.id)}"][data-setting-key="${cssEscape(key)}"]`)]
              .map((item) => {
                const row = item.closest(".ruleListRow");
                return {
                  text: String(item.value || "").replace(/^[-*]\s+/, "").trim(),
                  action: row?.querySelector("[data-rule-action]")?.value === "block" ? "block" : "ask"
                };
              })
              .filter((item) => item.text);
            return;
          }
          if (input.type === "radio") {
            if (input.checked) config[key] = input.value;
            return;
          }
          if (input.type === "checkbox") {
            config[key] = Boolean(input.checked);
            return;
          }
          if (input.type === "number") {
            config[key] = Number(input.value || 0);
            return;
          }
          config[key] = input.value;
        });
        return config;
      }

      function bindPluginDetailSettings(plugin) {
        const button = document.getElementById("savePluginDetailSettings");
        const status = document.getElementById("pluginDetailSaveStatus");
        if (!button || plugin.organizationPolicy?.configLocked) return;
        const importRules = document.getElementById("importPluginRules");
        const addRule = document.getElementById("addPluginRule");
        const scanRules = document.getElementById("scanPluginRules");
        const addProfile = document.getElementById("addPluginProfile");
        if (addProfile) addProfile.onclick = () => {
          const profiles = plugin.settings?.profiles || (plugin.settings.profiles = []);
          profiles.push({ id: `profile-${Date.now()}`, name: "Agent override", agentKinds: [], config: {} });
          renderPluginDetail();
        };
        root.querySelectorAll("[data-remove-plugin-profile]").forEach((removeButton) => {
          removeButton.onclick = () => {
            plugin.settings.profiles = (plugin.settings?.profiles || []).filter((profile) => profile.id !== removeButton.dataset.removePluginProfile);
            renderPluginDetail();
          };
        });
        root.querySelectorAll(`[data-rule-remove="${cssEscape(plugin.id)}"]`).forEach((removeButton) => {
          removeButton.onclick = () => removeButton.closest(".ruleListRow")?.remove();
        });
        autosizeRuleTextareas();
        if (addRule) {
          addRule.onclick = () => {
            const list = root.querySelector(`[data-rule-list="${cssEscape(plugin.id)}"][data-setting-key="rules"]`);
            if (list) {
              list.insertAdjacentHTML("beforeend", ruleEditorRow(plugin.id, "rules", ""));
              const row = list.lastElementChild;
              const removeButton = row?.querySelector("[data-rule-remove]");
              if (removeButton) removeButton.onclick = () => removeButton.closest(".ruleListRow")?.remove();
              autosizeRuleTextareas(row || root);
              row?.querySelector("textarea")?.focus();
            }
          };
        }
        if (scanRules) {
          scanRules.onclick = async () => {
            status.textContent = "Scanning agent instruction files...";
            const result = await window.openleash.discoverInstructionRules();
            if (!result?.ok) {
              status.textContent = result?.error || "Could not scan agent instruction files.";
              return;
            }
            const rawCandidates = Array.isArray(result.candidates) && result.candidates.length ? result.candidates : (result.policies || []);
            const candidates = rawCandidates
              .map((rule, index) => {
                const text = rule.text || rule.description || rule.natural_language_rule || rule.name;
                const agent = rule.agent || String(rule.category || "Agent instructions").replace(/\s+instructions$/i, "");
                return text ? {
                  id: `candidate-${index}-${String(text).slice(0, 24).replace(/\W+/g, "-")}`,
                  text,
                  action: "ask",
                  agent,
                  label: rule.label || rule.sourceLabel || "Instruction file",
                  path: rule.path || rule.source || "",
                  scope: rule.scope || "project"
                } : undefined;
              })
              .filter(Boolean);
            if (candidates.length === 0) {
              status.textContent = "No agent instruction rules found.";
              return;
            }
            pendingRuleImport = {
              pluginId: plugin.id,
              candidates,
              selected: new Set(candidates.map((candidate) => candidate.id)),
              sourceCount: Array.isArray(result.sources) ? result.sources.length : 0
            };
            view = "plugin-rule-import";
            renderView();
          };
        }
        if (importRules) {
          importRules.onclick = async () => {
            const result = await window.openleash.importRuleListJson();
            if (!result?.ok) {
              status.textContent = result?.canceled ? "" : result?.error || "Could not import JSON rules.";
              return;
            }
            addRulesToPluginDraft(plugin, result.rules || []);
            renderPluginDetail();
            const nextStatus = document.getElementById("pluginDetailSaveStatus");
            if (nextStatus) nextStatus.textContent = `Imported ${(result.rules || []).length} rule${(result.rules || []).length === 1 ? "" : "s"} from JSON. Unsaved rows are highlighted.`;
          };
        }
        button.onclick = async () => {
          button.disabled = true;
          status.textContent = "Saving...";
          const config = collectPluginDetailConfig(plugin);
          let profiles;
          try { profiles = collectPluginProfiles(plugin); }
          catch (error) {
            status.textContent = error?.message || "Invalid agent-specific settings.";
            button.disabled = false;
            return;
          }
          const result = await window.openleash.savePluginSettings({
            pluginId: plugin.id,
            enabled: pluginInstalled(plugin),
            config,
            profiles,
            orderingPriority: plugin.settings?.orderingPriority ?? plugin.ordering?.priority ?? null,
            marketplace: plugin.marketplace || null
          }).catch((error) => ({ ok: false, error: error?.message || "Could not save plugin settings." }));
          if (!result?.ok) {
            status.textContent = result?.error || "Could not save settings.";
            button.disabled = false;
            return;
          }
          state.plugins = (state.plugins || []).map((item) => item.id === plugin.id
            ? { ...item, settings: result.settings || { ...(item.settings || {}), config } }
            : item
          );
          delete pluginDetailDraftConfigs[plugin.id];
          delete pluginPendingRuleTexts[plugin.id];
          status.textContent = "Settings saved.";
          button.disabled = false;
        };
      }

      function bindModelSelection() {
        root.querySelectorAll("[name=provider]").forEach((input) => {
          input.onchange = () => {
            setupProvider = input.value;
          };
        });
        const key = document.getElementById("apiKey");
        if (key) key.oninput = () => {
          setupApiKey = key.value;
        };
      }

      function setupRuleGroups(rules) {
        const list = rules || [];
        const defs = [
          {
            title: "Security rules",
            description: "Secrets, credentials, personal data, and sensitive staged content.",
            ids: ["credentials", "committing-secrets", "personal-data"]
          },
          {
            title: "Git rules",
            description: "Publishing, protected branches, force pushes, and history rewrites.",
            ids: ["git-publish", "protected-branch-push", "git-history-rewrite"]
          },
          {
            title: "Package rules",
            description: "Dependency changes, lockfiles, and global package installs.",
            ids: ["supply-chain-change", "global-package-install"]
          },
          {
            title: "Infrastructure rules",
            description: "Cloud resources, Kubernetes, Terraform, and local destruction.",
            ids: ["cloud-resource-deletion", "infra-destruction", "filesystem-destruction"]
          },
          {
            title: "Data rules",
            description: "Databases, broad mutations, and external data sharing.",
            ids: ["database-destruction", "database-mass-update", "exfiltration"]
          }
        ];
        const used = new Set();
        const groups = defs.map((def, index) => {
          const groupRules = def.ids.map((id) => list.find((rule) => rule.id === id)).filter(Boolean);
          groupRules.forEach((rule) => used.add(rule.id));
          return { ...def, first: index === 0, rules: groupRules };
        }).filter((group) => group.rules.length > 0);
        const other = list.filter((rule) => !used.has(rule.id));
        if (other.length > 0) {
          groups.push({
            title: "Custom rules",
            description: "Rules imported locally or added by your OpenLeash administrator.",
            ids: other.map((rule) => rule.id),
            first: groups.length === 0,
            rules: other
          });
        }
        return groups;
      }

      function ruleCards(rules, options = {}) {
        const managed = Boolean(options.managed);
        const grouped = Boolean(options.grouped);
        const groups = {};
        for (const rule of rules || []) (groups[grouped ? rule.category : ""] ||= []).push(rule);
        return Object.entries(groups).map(([category, items]) => `
          <div>
            ${category ? `<div class="category">${escapeHtml(category)}</div>` : ""}
            <div class="ruleGroup">
              ${items.map((rule) => `
                <label class="card row ruleLine ${rule.locked ? "lockedRule" : ""}">
                  <span>
                    <strong>${escapeHtml(rule.name)}${ruleBadge(rule, managed)}</strong>
                    <small>${escapeHtml(rule.description)}</small>
                  </span>
                  <span class="switch"><input data-rule="${rule.id}" type="checkbox" ${ruleEnabled(rule) ? "checked" : ""} ${rule.locked ? "disabled" : ""}><span></span></span>
                </label>
              `).join("")}
            </div>
          </div>
        `).join("");
      }

      function ruleBadge(rule, managedContext) {
        if (rule.locked) return `<span class="managedBadge">Mandatory</span>`;
        if (managedContext && (rule.managedByOrganization || rule.managed_by_organization || rule.managed)) {
          return `<span class="managedBadge soft">Managed</span>`;
        }
        return "";
      }

      function ruleEnabled(rule) {
        if (rule.locked) return true;
        if (isSetupLocked() && selectedRules) return selectedRules.get(rule.id) ?? Boolean(rule.enabled);
        return Boolean(rule.enabled);
      }

      function projectTag(value) {
        return value ? String(value).replace(/\\/g, "/").replace(/\/+$/, "").split("/").filter(Boolean).pop() : "";
      }

      function formatTime(value) {
        return value ? new Date(value).toLocaleString() : "";
      }

      function formatDuration(seconds) {
        const total = Math.max(0, Number(seconds || 0));
        if (total < 60) return total ? `${total}s` : "0s";
        const minutes = Math.floor(total / 60);
        if (minutes < 60) return `${minutes}m`;
        const hours = Math.floor(minutes / 60);
        const rest = minutes % 60;
        return rest ? `${hours}h ${rest}m` : `${hours}h`;
      }

      function sessionStat(label, metric) {
        const count = Number(metric?.session_count || 0);
        return `<div class="sessionStat"><strong>${escapeHtml(formatDuration(metric?.duration_seconds || 0))}</strong><small>${escapeHtml(label)} · ${count} session${count === 1 ? "" : "s"}</small></div>`;
      }

      function allAgentSessions() {
        return (state.agents || [])
          .flatMap((agent) => (agent.sessions || []).map((session) => ({ ...session, agent_name: agent.display_name, agent_kind: agent.kind, user_name: agent.user_name, hostname: agent.hostname })))
          .sort((a, b) => new Date(b.last_activity_at || 0).getTime() - new Date(a.last_activity_at || 0).getTime());
      }

      function usageByPerson(sessions) {
        const grouped = new Map();
        for (const session of sessions) {
          const key = session.user_name || session.hostname || "This Mac";
          const item = grouped.get(key) || { name: key, sessions: 0, duration_seconds: 0, subagent_seconds: 0, last_activity_at: "" };
          item.sessions += 1;
          item.duration_seconds += Number(session.duration_seconds || 0);
          item.subagent_seconds += Number(session.subagent_seconds || 0);
          if (!item.last_activity_at || new Date(session.last_activity_at || 0) > new Date(item.last_activity_at || 0)) item.last_activity_at = session.last_activity_at;
          grouped.set(key, item);
        }
        return [...grouped.values()].sort((a, b) => b.duration_seconds - a.duration_seconds);
      }

      function resolutionTime(item) {
        return item.resolved_at || (item.resolution === "allow" && item.decision === "allow" ? item.created_at : "");
      }

      function resolutionLabel(item) {
        const value = item.resolution || item.decision;
        if (value === "allow") return "Allowed at";
        if (value === "deny") return "Denied at";
        return "Resolved at";
      }

      function agentIcon(agent) {
        if (agent.icon) return `<img src="agents/${escapeHtml(agentIconFile(agent.icon))}" alt="">`;
        return escapeHtml(String(agent.displayName || "AI").split(/\s+/).slice(0, 2).map((part) => part[0]).join("").toUpperCase());
      }

      function agentIconFile(icon) {
        const value = String(icon || "");
        if (value.includes(".")) return value;
        if (value === "claude") return "claude.png";
        if (value === "copilot") return "githubcopilot.svg";
        if (value === "gemini") return "googlegemini.svg";
        if (value === "opencode") return "opencode.png";
        if (value === "openai" || value === "codex") return "codex.png";
        if (value === "cline") return "cline.png";
        if (value === "cursor") return "cursor.png";
        if (value === "windsurf") return "windsurf.svg";
        return value;
      }

      function escapeHtml(value) {
        return String(value ?? "").replace(/[&<>"']/g, (char) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;" }[char]));
      }

      function truncate(value, max) {
        return value.length <= max ? value : `${value.slice(0, max - 1)}…`;
      }

      function cssEscape(value) {
        if (window.CSS?.escape) return window.CSS.escape(String(value));
        return String(value).replace(/["\\]/g, "\\$&");
      }

      function isPersonalEmail(email) {
        const domain = String(email || "").split("@")[1]?.toLowerCase() || "";
        return new Set([
          "gmail.com",
          "googlemail.com",
          "outlook.com",
          "hotmail.com",
          "live.com",
          "msn.com",
          "icloud.com",
          "me.com",
          "mac.com",
          "yahoo.com",
          "proton.me",
          "protonmail.com",
          "aol.com"
        ]).has(domain);
      }

      window.openleash.onUpdate(render);
      window.openleash.onAuth((payload) => {
        if (payload?.ok) {
          if (setupClientMode === "cloud" && setupAudience === "organization" && isPersonalEmail(payload.userEmail)) {
            setupRemoteAuth = undefined;
            setupRemoteError = "Use your company Google Workspace or Microsoft 365 account, not a personal email address.";
            setupRemoteNotice = "";
            setupRemoteBusy = false;
            renderSetup();
            return;
          }
          setupRemoteAuth = payload;
          setupRemoteError = "";
          setupRemoteNotice = "";
          setupRemoteBusy = false;
          const signedInStep = setupClientMode === "custom" ? 5 : setupAudience === "organization" ? 3 : 3;
          setupStep = Math.max(setupStep, signedInStep);
          void loadManagedRules().then(() => {
            if (shouldAutoFinishAfterRemoteAuth()) {
              setupSkipDashboardOpenAfterInstall = true;
              setupRemoteNotice = "Installing OpenLeash on this Mac...";
              renderSetup();
              void finishSetup();
              return;
            }
            renderSetup();
          });
        } else {
          setupRemoteBusy = false;
          setupRemoteNotice = "";
          setupRemoteError = payload?.error || "Sign-in did not complete.";
          renderSetup();
        }
      });
      window.openleash.list().then(render);
    </script>
  </body>
</html>
