<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OpenLeash</title>
    <style>
      :root {
        --ink: #101318;
        --ink-2: #3d4450;
        --muted: #8b909b;
        --line: #e6e8ee;
        --soft: #f5f6f8;
        --panel: #ffffff;
        --accent: #c8d6ff;
        --green: #22b981;
        --red: #e7574f;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        background: #eef0f4;
        color: var(--ink);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        -webkit-font-smoothing: antialiased;
        user-select: none;
      }
      .drag-strip {
        position: fixed;
        z-index: 20;
        top: 0;
        left: 0;
        right: 0;
        height: 58px;
        -webkit-app-region: drag;
      }
      aside, .head {
        -webkit-app-region: drag;
      }
      button, input, label, nav, main, .card, .switch, .actions {
        -webkit-app-region: no-drag;
      }
      .app {
        min-height: 100vh;
        display: grid;
        grid-template-columns: 230px minmax(0, 1fr);
        gap: 14px;
        padding: 14px;
      }
      aside, main {
        background: var(--panel);
        border-radius: 18px;
        border: 1px solid rgba(16, 19, 24, .06);
      }
      aside {
        padding: 24px 16px;
        display: flex;
        flex-direction: column;
        gap: 18px;
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
        min-height: 48px;
        font-size: 21px;
        font-weight: 900;
      }
      .brand img { width: 28px; height: 28px; border-radius: 7px; object-fit: contain; }
      nav { display: grid; gap: 8px; }
      nav button {
        width: 100%;
        border: 0;
        border-radius: 12px;
        padding: 12px 14px;
        background: transparent;
        color: var(--ink-2);
        text-align: left;
        font: inherit;
        font-weight: 800;
        cursor: pointer;
      }
      nav button.active { background: var(--soft); color: var(--ink); }
      body.setup-locked nav {
        display: none;
      }
      body.setup-locked .foot {
        display: none;
      }
      body.setup-locked .app {
        grid-template-columns: minmax(0, 1fr);
        padding: 14px;
      }
      body.setup-locked aside {
        display: none;
      }
      body.setup-locked main {
        width: min(1120px, calc(100vw - 28px));
        margin: 0 auto;
      }
      body.intro-active main {
        height: calc(100vh - 28px);
        padding: 0;
        overflow: hidden;
      }
      .foot {
        margin-top: auto;
        padding: 14px;
        border-radius: 14px;
        background: var(--soft);
        color: var(--muted);
        font-size: 13px;
        line-height: 1.45;
      }
      main { padding: 48px 38px 38px; overflow: auto; }
      h1 { margin: 0; font-size: 38px; letter-spacing: 0; }
      h2 { margin: 0; font-size: 20px; letter-spacing: 0; }
      p { margin: 0; color: var(--muted); line-height: 1.5; }
      .head {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 20px;
        padding-bottom: 24px;
        border-bottom: 1px solid var(--line);
      }
      .grid { display: grid; gap: 14px; margin-top: 24px; }
      .two { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .setupStack {
        display: grid;
        gap: 24px;
        margin-top: 28px;
      }
      .setupStepper {
        display: grid;
        gap: 10px;
        margin-top: 24px;
      }
      .setupProgress {
        display: grid;
        gap: 10px;
        margin-top: 24px;
      }
      .setupProgressMeta {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        color: var(--muted);
        font-size: 13px;
        font-weight: 900;
        text-transform: uppercase;
      }
      .setupProgressBar {
        height: 8px;
        border-radius: 999px;
        background: var(--soft);
        overflow: hidden;
      }
      .setupProgressFill {
        height: 100%;
        border-radius: 999px;
        background: var(--accent);
      }
      .welcomeHero {
        min-height: calc(100vh - 128px);
        display: grid;
        align-content: center;
        gap: 28px;
        max-width: 1080px;
        margin: 0 auto;
      }
      .welcomeMark {
        width: 68px;
        height: 68px;
        border-radius: 20px;
        display: grid;
        place-items: center;
        background: var(--soft);
        border: 1px solid var(--line);
        color: var(--ink);
      }
      .welcomeMark svg {
        width: 38px;
        height: 38px;
      }
      .welcomeCopy {
        display: grid;
        gap: 12px;
      }
      .welcomeKicker {
        color: var(--ink);
        font-size: 24px;
        font-weight: 950;
        letter-spacing: 0;
      }
      .welcomeHero h1 {
        font-size: 74px;
        line-height: .98;
        max-width: 920px;
      }
      .welcomeHero p {
        max-width: 900px;
        font-size: 20px;
        line-height: 1.45;
      }
      .welcomeTiles {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 16px;
      }
      .welcomeTile {
        min-height: 188px;
        padding: 22px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: white;
      }
      .welcomeTile strong {
        display: block;
        margin-bottom: 12px;
        font-size: 18px;
      }
      .welcomeTile p {
        font-size: 17px;
        line-height: 1.45;
      }
      .welcomeActions {
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        gap: 18px;
      }
      .welcomeFootnote {
        color: var(--muted);
        font-size: 15px;
        font-weight: 800;
      }
      .introScreen {
        position: relative;
        width: 100%;
        height: 100%;
        min-height: 0;
        display: grid;
        place-items: center;
        overflow: hidden;
        border-radius: 18px;
        background: #06080d;
      }
      .introScreen video {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }
      .introSkip {
        position: absolute;
        right: 22px;
        bottom: 22px;
        border-color: rgba(255,255,255,.32);
        background: rgba(255,255,255,.9);
        backdrop-filter: blur(12px);
      }
      .setupStepPill {
        display: grid;
        grid-template-columns: 28px minmax(0, 1fr);
        align-items: center;
        gap: 10px;
        min-height: 54px;
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 9px 14px 9px 10px;
        background: white;
        color: var(--muted);
        font-weight: 900;
      }
      .setupStepPill b {
        display: grid;
        place-items: center;
        width: 28px;
        height: 28px;
        border-radius: 50%;
        background: var(--soft);
        color: var(--muted);
        font-size: 13px;
      }
      .setupStepPill.active {
        border-color: rgba(93, 119, 205, .22);
        background: #f1f5ff;
        color: var(--ink);
      }
      .setupStepPill.active b {
        background: var(--accent);
        color: var(--ink);
      }
      .setupStepPill.done {
        color: var(--ink-2);
      }
      .setupStepPill.done b {
        background: #e9f8f1;
        color: #11795f;
      }
      .setupSection {
        display: grid;
        gap: 16px;
      }
      .setupSection h2 {
        margin: 0;
      }
      .cardList {
        display: grid;
        gap: 14px;
      }
      .card {
        border: 1px solid var(--line);
        border-radius: 14px;
        background: white;
        padding: 16px;
      }
      .choiceCard {
        display: grid;
        grid-template-columns: 42px minmax(0, 1fr) auto;
        align-items: center;
        gap: 14px;
        cursor: pointer;
      }
      .choiceCard.selected {
        border-color: rgba(93, 119, 205, .35);
        background: #f5f7ff;
      }
      .choiceCard.featured {
        position: relative;
        grid-template-columns: 48px minmax(0, 1fr) auto;
        padding: 20px;
        border-color: rgba(34, 185, 129, .26);
        background: #f2fbf7;
      }
      .choiceCard.featured.selected {
        border-color: rgba(34, 185, 129, .46);
        background: #ecfaf4;
      }
      .choiceCard.featured .agentIcon {
        width: 48px;
        height: 48px;
        background: white;
      }
      .choiceCard .benefits {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 10px;
      }
      .choiceCard .benefits span {
        display: inline-flex;
        align-items: center;
        min-height: 28px;
        border-radius: 999px;
        padding: 5px 10px;
        background: rgba(255, 255, 255, .78);
        border: 1px solid rgba(16, 19, 24, .06);
        color: #11795f;
        font-size: 12px;
        font-weight: 900;
      }
      .recommendedTag {
        display: inline-flex;
        margin-left: 8px;
        vertical-align: middle;
        border-radius: 999px;
        padding: 3px 8px;
        background: #dff7ec;
        color: #11795f;
        font-size: 11px;
        font-weight: 900;
        text-transform: uppercase;
      }
      .choiceCard input {
        accent-color: #8da4f4;
        width: 18px;
        height: 18px;
      }
      .connectionFields {
        display: grid;
        gap: 12px;
        margin-top: 14px;
      }
      .authSummary {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
        padding: 14px;
        border-radius: 14px;
        background: var(--soft);
      }
      .googleSignIn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        min-width: 220px;
        height: 44px;
        padding: 0 16px 0 12px;
        border: 1px solid #747775;
        border-radius: 22px;
        background: #fff;
        color: #1f1f1f;
        font-family: Roboto, Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
      }
      .googleSignIn:hover {
        background: #f8fafd;
        box-shadow: 0 1px 2px rgba(60, 64, 67, .18);
      }
      .googleSignIn svg {
        width: 18px;
        height: 18px;
        flex: 0 0 18px;
      }
      .row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 18px;
      }
      .agentIcon {
        width: 42px;
        height: 42px;
        display: grid;
        place-items: center;
        flex: 0 0 42px;
        border-radius: 12px;
        background: var(--soft);
        font-weight: 900;
      }
      .agentIcon img {
        width: 24px;
        height: 24px;
        object-fit: contain;
      }
      .agentIcon.muted {
        filter: grayscale(1);
        opacity: .54;
        background: #f2f3f5;
      }
      .agentLine {
        display: grid;
        grid-template-columns: 42px minmax(0, 1fr) auto;
        align-items: center;
        gap: 12px;
      }
      strong { display: block; }
      small { color: var(--muted); font-weight: 700; }
      .tag {
        border-radius: 999px;
        padding: 7px 10px;
        background: var(--soft);
        color: var(--ink-2);
        font-size: 12px;
        font-weight: 900;
      }
      .tag.good { background: #e9f8f1; color: #11795f; }
      .tag.bad { background: #fdeced; color: #bd2d3f; }
      .switch {
        position: relative;
        width: 48px;
        height: 28px;
      }
      .switch input { display: none; }
      .switch span {
        position: absolute;
        inset: 0;
        border-radius: 999px;
        background: #d9dde6;
        cursor: pointer;
      }
      .switch span::after {
        content: "";
        position: absolute;
        top: 4px;
        left: 4px;
        width: 20px;
        height: 20px;
        border-radius: 50%;
        background: white;
        box-shadow: 0 1px 4px rgba(0,0,0,.15);
        transition: transform .15s ease;
      }
      .switch input:checked + span { background: var(--accent); }
      .switch input:checked + span::after { transform: translateX(20px); }
      .switch input:disabled + span {
        cursor: not-allowed;
        opacity: .72;
        box-shadow: inset 0 0 0 1px rgba(15,17,21,.12);
      }
      .primary, .secondary {
        border: 0;
        border-radius: 999px;
        padding: 13px 20px;
        font: inherit;
        font-weight: 900;
        cursor: pointer;
      }
      .primary:disabled, .secondary:disabled {
        opacity: .45;
        cursor: default;
      }
      .primary { background: var(--accent); color: var(--ink); }
      .secondary { background: var(--soft); color: var(--ink); }
      .dangerButton { background: #fee7e7; color: #af2626; }
      .actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 24px; }
      .actions.installOnly { justify-content: flex-start; }
      .primary.installPrimary {
        min-height: 68px;
        min-width: min(100%, 420px);
        padding: 18px 30px;
        font-size: 22px;
      }
      .headActions {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
        justify-content: flex-end;
      }
      .actions.left { justify-content: flex-start; margin-top: 18px; }
      .fieldRow {
        display: grid;
        grid-template-columns: 180px minmax(0, 1fr);
        gap: 12px;
        align-items: center;
      }
      .segmented {
        display: inline-grid;
        grid-template-columns: 1fr 1fr;
        gap: 4px;
        padding: 4px;
        border-radius: 999px;
        background: var(--soft);
      }
      .segmented label {
        display: block;
        padding: 9px 14px;
        border-radius: 999px;
        color: var(--muted);
        font-weight: 900;
        text-align: center;
        cursor: pointer;
      }
      .segmented input { display: none; }
      .segmented label:has(input:checked) {
        background: white;
        color: var(--ink);
        box-shadow: 0 1px 6px rgba(16, 19, 24, .08);
      }
      input.secret {
        width: 100%;
        min-height: 42px;
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 0 14px;
        background: white;
        color: var(--ink);
        font: inherit;
        font-weight: 700;
      }
      .error {
        margin-top: 10px;
        color: #bd2d3f;
        font-weight: 800;
      }
      .notice {
        margin-top: 10px;
        color: var(--muted);
        font-weight: 800;
      }
      .desktopToast {
        margin-bottom: 16px;
        padding: 12px 14px;
        color: #0f7556;
        background: #e6f6ef;
        border: 1px solid #bdebd6;
        border-radius: 14px;
        font-weight: 900;
      }
      .inlineNotice {
        min-height: 20px;
        margin-top: 10px;
        color: var(--muted);
        font-size: 13px;
        font-weight: 800;
        text-align: right;
      }
      .dangerZone {
        border-color: #f5c9c9;
        background: #fffafa;
      }
      .dangerGrid {
        display: grid;
        gap: 14px;
      }
      .dangerRow {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        align-items: center;
        gap: 16px;
      }
      .dangerRow + .dangerRow {
        padding-top: 14px;
        border-top: 1px solid #f5d9d9;
      }
      .importCard {
        display: grid;
        gap: 18px;
        min-height: 150px;
      }
      .hidden { display: none !important; }
      .history { display: grid; gap: 0; margin-top: 22px; border-top: 1px solid var(--line); }
      .history article {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        align-items: center;
        gap: 18px;
        padding: 16px 0;
        border-bottom: 1px solid var(--line);
        cursor: pointer;
      }
      .history article:hover strong { text-decoration: underline; }
      .eventBody {
        display: grid;
        gap: 8px;
        min-width: 0;
      }
      .filePathPill {
        display: inline-grid;
        grid-template-columns: auto minmax(0, 1fr);
        align-items: center;
        gap: 8px;
        width: fit-content;
        max-width: min(720px, 100%);
        margin-top: 2px;
        padding: 7px 12px;
        border-radius: 999px;
        background: var(--soft);
        color: var(--ink-2);
      }
      .filePathPill span {
        color: var(--muted);
        font-size: 12px;
        font-weight: 900;
        text-transform: uppercase;
      }
      .filePathPill code {
        margin: 0;
        padding: 0;
        border-radius: 0;
        background: transparent;
        font-size: 14px;
      }
      .evidenceLine {
        color: var(--muted);
        font-size: 14px;
        font-weight: 800;
      }
      code {
        display: inline-block;
        max-width: 100%;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        margin-top: 8px;
        padding: 7px 10px;
        border-radius: 999px;
        background: var(--soft);
        color: var(--ink-2);
      }
      .empty {
        padding: 38px;
        text-align: center;
        color: var(--muted);
      }
      .category {
        margin-top: 0;
        margin-bottom: 18px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 900;
        text-transform: uppercase;
      }
      .ruleGroups {
        display: grid;
        gap: 32px;
      }
      .ruleGroup {
        display: grid;
        gap: 14px;
      }
      .ruleLine strong {
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        gap: 8px;
      }
      .managedBadge {
        display: inline-flex;
        align-items: center;
        min-height: 24px;
        padding: 4px 9px;
        border-radius: 999px;
        background: #f3eadb;
        color: #6a5433;
        font-size: 11px;
        font-weight: 950;
        text-transform: uppercase;
      }
      .managedBadge.soft {
        background: #edf1fb;
        color: #536070;
      }
      .lockedRule {
        background: linear-gradient(180deg, rgba(255,255,255,.96), rgba(250,247,240,.96));
      }
      .statusTag {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        align-self: center;
        min-width: 74px;
        height: 34px;
        white-space: nowrap;
      }
      .detailStack {
        display: grid;
        gap: 16px;
        margin-top: 24px;
      }
      .kv {
        display: grid;
        grid-template-columns: 150px minmax(0, 1fr);
        gap: 10px;
        padding: 10px 0;
        border-bottom: 1px solid var(--line);
      }
      .pre {
        user-select: text;
        white-space: pre-wrap;
        overflow: auto;
        max-height: 260px;
        border-radius: 12px;
        background: var(--soft);
        padding: 14px;
        color: var(--ink-2);
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        font-size: 13px;
        line-height: 1.45;
      }
      .overviewAgents {
        display: grid;
        gap: 16px;
        margin-top: 24px;
      }
      .overviewAgentGrid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
        gap: 12px;
        margin-top: 24px;
      }
      .overviewAgentTile {
        display: grid;
        grid-template-columns: 42px minmax(0, 1fr);
        gap: 12px;
        align-items: center;
        min-height: 86px;
        border-color: transparent;
        background: #f6fbf9;
      }
      .overviewAgentTile.missing {
        background: #f7f7f8;
        border-color: var(--line);
      }
      .overviewAgentTile.protected {
        background: #eef8ff;
      }
      .overviewAgentTile .tag {
        display: inline-flex;
        width: fit-content;
        margin-top: 8px;
        font-size: 12px;
      }
      .overviewAgentTile small {
        display: block;
        margin-top: 2px;
      }
      .subhead {
        margin-top: 10px;
      }
      .subhead h2 {
        margin: 0;
        font-size: 22px;
      }
      .subhead p {
        margin: 4px 0 0;
        color: var(--muted);
      }
      .agentOverview {
        display: grid;
        grid-template-columns: 46px minmax(0, 1fr);
        gap: 14px;
      }
      .agentOverviewHead {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 14px;
        margin-bottom: 14px;
      }
      .nowSummary {
        font-size: 17px;
        line-height: 1.35;
        font-weight: 900;
        color: var(--ink);
        margin-bottom: 12px;
      }
      .projectLine {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        max-width: 100%;
        margin: -3px 0 14px;
        padding: 9px 12px;
        border-radius: 12px;
        background: #f7f8fb;
        border: 1px solid var(--line);
        color: var(--ink-2);
      }
      .projectLine span {
        color: var(--muted);
        font-size: 11px;
        font-weight: 900;
        text-transform: uppercase;
      }
      .projectLine strong {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        font-size: 14px;
      }
      .agentMeta {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 12px;
      }
      .agentMeta .tag {
        max-width: 280px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .detailList {
        display: grid;
        gap: 8px;
        margin-top: 12px;
      }
      .detailLine {
        display: grid;
        grid-template-columns: 104px minmax(0, 1fr);
        gap: 10px;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.35;
      }
      .detailLine b {
        color: var(--ink-2);
      }
      .agentSessionGrid {
        display: grid;
        gap: 16px;
        margin-top: 24px;
      }
      .sessionStats {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 12px;
        margin-top: 18px;
      }
      .sessionStat {
        padding: 14px;
        border: 1px solid var(--line);
        border-radius: 14px;
        background: white;
      }
      .sessionStat strong {
        display: block;
        font-size: 20px;
        font-weight: 950;
      }
      .sessionStat small {
        display: block;
        margin-top: 4px;
        color: var(--muted);
        font-weight: 850;
      }
      .agentSessionsCard {
        display: grid;
        gap: 12px;
      }
      .agentTitleLine {
        display: grid;
        grid-template-columns: 46px minmax(0, 1fr);
        align-items: center;
        gap: 12px;
      }
      .sessionList {
        display: grid;
        gap: 10px;
      }
      .sessionRow {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        align-items: center;
        gap: 14px;
        width: 100%;
        padding: 14px;
        border: 1px solid var(--line);
        border-radius: 14px;
        background: #f8f9fc;
        color: inherit;
        text-align: left;
        cursor: pointer;
      }
      .sessionRow:hover {
        background: #f2f5fb;
      }
      .sessionRow span {
        min-width: 0;
      }
      .sessionRow strong,
      .sessionRow small,
      .sessionRow em {
        display: block;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .sessionRow small {
        margin-top: 4px;
        color: var(--muted);
        font-weight: 800;
      }
      .sessionRow em {
        margin-top: 6px;
        color: var(--ink-2);
        font-style: normal;
        font-size: 13px;
        font-weight: 800;
      }
      .sessionMeta {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .sessionMeta b,
      .sessionMeta i {
        padding: 6px 9px;
        border-radius: 999px;
        background: white;
        border: 1px solid var(--line);
        color: var(--ink-2);
        font-size: 12px;
        font-style: normal;
        font-weight: 900;
      }
      .sessionHero {
        margin-top: 20px;
      }
      .empty.compact {
        padding: 18px;
      }
      .highlightList {
        display: grid;
        gap: 10px;
      }
      .highlight {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 14px;
        align-items: center;
        padding: 12px;
        border-radius: 12px;
        background: var(--soft);
      }
      .highlightTitle {
        font-weight: 900;
      }
      .fileLine {
        display: grid;
        grid-template-columns: 34px minmax(0, 1fr);
        align-items: center;
        gap: 10px;
        margin-top: 8px;
        color: var(--ink-2);
      }
      .fileTypeIcon {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 34px;
        height: 34px;
        border-radius: 10px;
        background: white;
        border: 1px solid var(--line);
        font-size: 16px;
        font-weight: 900;
      }
      .fileName {
        display: block;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        font-size: 13px;
      }
      .quote {
        display: block;
        margin-top: 5px;
        color: var(--ink-2);
        font-size: 13px;
        line-height: 1.35;
      }
      .quote::before { content: "“"; }
      .quote::after { content: "”"; }
    </style>
  </head>
  <body>
    <div class="drag-strip" aria-hidden="true"></div>
    <div class="app">
      <aside>
        <div class="brand">
          <img src="openleash-icon.png" alt="" />
          OpenLeash
        </div>
        <nav>
          <button class="active" data-view="overview">Overview</button>
          <button data-view="usage">Usage</button>
          <button data-view="history">History</button>
          <button data-view="agents">Agents</button>
          <button data-view="rules">Rules</button>
          <button data-view="skills">Skills</button>
          <button data-view="mcps">MCP</button>
          <button data-view="settings">Settings</button>
        </nav>
        <div class="foot" id="modeFoot">Personal mode runs fully on this Mac. Rules, history, approvals, and agent protection stay local.</div>
      </aside>
      <main id="root"></main>
    </div>
    <script>
      let state = { rules: [], history: [], localProtections: [], setupComplete: false, introSeen: false };
      let selectedAgents;
      let selectedRules;
      let setupStep = 0;
      let setupAudience = "individual";
      let setupClientMode = "cloud";
      let setupRemoteApiUrl = "https://api.openleash.com";
      let setupOrganizationSlug = "";
      let setupRemoteBootstrap;
      let setupRemoteAuth;
      let setupRemoteError = "";
      let setupRemoteNotice = "";
      let setupRemoteBusy = false;
      let setupRemoteProvider = "google";
      let setupRemoteKeySaved = false;
      let setupDockerStatus;
      let setupDockerBusy = false;
      let setupProvider = "openai";
      let setupApiKey = "";
      let importedRules;
      let importRulesMessage = "";
      let desktopMessageTimer;
      let introPlaying = false;
      let view = "overview";
      let selectedEventId = "";
      let selectedMcpServerId = "";
      let selectedAgentSessionId = "";
      const root = document.getElementById("root");
      const nav = [...document.querySelectorAll("nav button")];
      const modeFoot = document.getElementById("modeFoot");

      function render(payload) {
        const incomingRules = payload.policies || payload.rules || state.rules;
        state = { ...state, ...payload, rules: importedRules || incomingRules };
        if (payload.desktopMessage) {
          if (desktopMessageTimer) clearTimeout(desktopMessageTimer);
          desktopMessageTimer = setTimeout(() => {
            state.desktopMessage = "";
            renderView();
          }, 5000);
        }
        if (state.clientMode) setupClientMode = state.clientMode;
        setupRemoteApiUrl = state.remoteApiUrl || state.cloudApiUrl || setupRemoteApiUrl;
        if (!selectedAgents && (state.localProtections || []).length > 0) {
          selectedAgents = new Set((state.localProtections || []).filter((agent) => agent.installed && agent.supportsInstall).map((agent) => agent.kind));
        }
        if (!selectedRules && (state.rules || []).length > 0) {
          selectedRules = new Map((state.rules || []).map((rule) => [rule.id, rule.locked ? true : Boolean(rule.enabled)]));
        }
        updateModeFoot();
        document.body.classList.toggle("setup-locked", isSetupLocked());
        document.body.classList.toggle("intro-active", isIntroLocked());
        if (isIntroLocked()) {
          if (!introPlaying) renderIntro();
          return;
        }
        introPlaying = false;
        if (isSetupLocked()) return renderSetup();
        importedRules = undefined;
        renderView();
      }

      function modeLabel() {
        if (state.clientMode === "cloud") return "OpenLeash Cloud";
        if (state.clientMode === "custom") return "Private Cloud";
        return "Local only";
      }

      function modeFootnote() {
        if (state.clientMode === "cloud") {
          const tenant = state.remoteOrganization || "organization tenant";
          return `OpenLeash Cloud organization mode. Rules and approvals sync with ${tenant}. Local hooks still call this Mac first.`;
        }
        if (state.clientMode === "custom") {
          const tenant = state.remoteOrganization || state.remoteApiUrl || "your private cloud";
          return `Private Cloud mode. Rules and approvals sync with ${tenant}. Local hooks still call this Mac first.`;
        }
        return "Personal mode runs fully on this Mac. Rules, history, approvals, and agent protection stay local.";
      }

      function updateModeFoot() {
        modeFoot.textContent = modeFootnote();
      }

      function modeTag() {
        return `<span class="tag good">${escapeHtml(modeLabel())}</span>`;
      }

      function isSetupLocked() {
        return !state.setupComplete || state.mode === "setup";
      }

      function isIntroLocked() {
        return !state.setupComplete && !state.introSeen;
      }

      function renderIntro() {
        introPlaying = true;
        document.body.classList.add("intro-active");
        root.innerHTML = `
          <section class="introScreen">
            <video id="introVideo" autoplay muted playsinline preload="auto" src="openleash-video.mp4"></video>
            <button class="secondary introSkip" id="skipIntro">Skip</button>
          </section>
        `;
        const video = document.getElementById("introVideo");
        const finish = () => finishIntro();
        document.getElementById("skipIntro").onclick = finish;
        video.onended = finish;
        video.onerror = finish;
        video.play?.().catch(() => undefined);
      }

      async function finishIntro() {
        if (state.introSeen) return;
        introPlaying = false;
        state.introSeen = true;
        document.body.classList.remove("intro-active");
        await window.openleash.markIntroSeen?.();
        renderSetup();
      }

      function renderSetup() {
        enforceAudienceMode();
        const personal = setupClientMode === "personal";
        const cloud = setupClientMode === "cloud";
        const orgCloud = setupAudience === "organization" && cloud;
        const ruleSteps = setupRuleGroups(state.rules).map((group) => ({
          title: group.title,
          subtitle: personal ? "Choose which rules OpenLeash enforces." : "Review dashboard-managed rules.",
          ruleGroup: group
        }));
        const steps = personal
          ? [
              { title: "Account", subtitle: "Tell us who is setting this up." },
              { title: "Connect", subtitle: "Pick how OpenLeash runs." },
              { title: "Model key", subtitle: "Add an optional local evaluator key." },
              { title: "Agents", subtitle: "Choose agents to protect." },
              ...ruleSteps
            ]
          : cloud
            ? [
                { title: "Account", subtitle: "Tell us who is setting this up." },
                { title: "Connect", subtitle: "Pick how OpenLeash runs." },
                ...(orgCloud ? [
                  { title: "Sign in", subtitle: "Continue onboarding in the dashboard." }
                ] : [
                  { title: "Sign in", subtitle: "Sign in to OpenLeash Cloud." },
                  { title: "Agents", subtitle: "Choose agents to protect." },
                  ...ruleSteps
                ])
              ]
          : [
              { title: "Account", subtitle: "Tell us who is setting this up." },
              { title: "Connect", subtitle: "Pick how OpenLeash runs." },
              { title: "API", subtitle: "Add your company API." },
              { title: "Sign in", subtitle: "Sign in with your company." },
              { title: "Agents", subtitle: "Choose agents to protect." },
              ...ruleSteps
            ];
        const current = steps[Math.max(0, setupStep - 1)] || steps[0];
        const currentId = current.title.toLowerCase();
        const progress = Math.round((Math.max(1, setupStep) / steps.length) * 100);
        if (setupStep === 0) {
          root.innerHTML = `
            <section class="welcomeHero">
              <div class="welcomeMark">
                <svg viewBox="0 0 34 34" fill="none" aria-hidden="true">
                  <path d="M8 8c0 4.4 3.6 8 8 8s8-3.6 8-8" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" />
                  <path d="M8 17c0 4.4 3.6 8 8 8s8-3.6 8-8" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" opacity=".55" />
                  <circle cx="26" cy="8" r="3" fill="currentColor" />
                </svg>
              </div>
              <div class="welcomeCopy">
                <div class="welcomeKicker">Know your agents</div>
                <h1>OpenLeash</h1>
                <p>Understand and control AI agents wherever they run.</p>
              </div>
              <div class="welcomeTiles">
                <div class="welcomeTile"><strong>See what they do</strong><p>Track agents commands, files, MCPs, Skills, tools, usage and history.</p></div>
                <div class="welcomeTile"><strong>Control risky actions</strong><p>Approve dangerous or destructive actions to you files, Git, databases, environment, secret access etc.</p></div>
                <div class="welcomeTile"><strong>Stay in control anywhere</strong><p>Know your agents even when your on the go from your phone.</p></div>
              </div>
              <div class="welcomeActions">
                <button class="primary" id="setupNext">Next</button>
                <span class="welcomeFootnote">Works locally, in OpenLeash Cloud, or in your private cloud.</span>
              </div>
            </section>
          `;
          const next = document.getElementById("setupNext");
          if (next) next.onclick = () => {
            setupStep = 1;
            renderSetup();
          };
          return;
        }
        root.innerHTML = `
          <div class="head">
            <div>
              <h1>Set up OpenLeash</h1>
              <p>${escapeHtml(current.subtitle)}</p>
            </div>
          </div>
          <div class="setupProgress">
            <div class="setupProgressMeta">
              <span>Step ${setupStep} of ${steps.length}</span>
              <span>${escapeHtml(current.title)}</span>
            </div>
            <div class="setupProgressBar"><div class="setupProgressFill" style="width:${progress}%"></div></div>
          </div>
          <div class="setupStack">
            ${currentId === "account" ? `
              <section class="setupSection">
                <h2>Who is OpenLeash for?</h2>
                <p>This shapes the setup options you see next.</p>
                <div class="cardList">
                  ${audienceChoice("individual", "Individual", "Use OpenLeash for your own local AI agents.", "OL")}
                  ${audienceChoice("organization", "Organization", "Set up OpenLeash for a company or team.", "ORG")}
                </div>
              </section>
            ` : ""}
            ${currentId === "connect" ? `
              <section class="setupSection">
                <h2>Connection</h2>
                <p>${setupAudience === "organization" ? "Pick how your organization runs OpenLeash." : "Pick how OpenLeash runs for you."}</p>
                <div class="cardList">
                  ${connectionChoice("cloud", "OpenLeash Cloud", setupAudience === "organization" ? "Use the OpenLeash-hosted API and dashboard." : "Use the OpenLeash-hosted account and sync.", "cloud")}
                  ${setupAudience === "organization" ? connectionChoice("custom", "Private Cloud", "Use your private OpenLeash deployment.", "dns") : ""}
                  ${setupAudience === "individual" ? connectionChoice("personal", "Local mode", "Run local evaluation on this computer. No account, no web.", "devices") : ""}
                </div>
              </section>
            ` : ""}
            ${currentId === "api" ? `
              <section class="setupSection">
                <h2>API configuration</h2>
                ${personal ? `
                  <div class="card">
                    <strong>Local API</strong>
                    <p>Used by standalone mode.</p>
                    <div class="fieldRow" style="margin-top:14px">
                      <strong>Endpoint</strong>
                      <input id="remoteApiUrl" value="${escapeHtml(setupRemoteApiUrl || state.apiUrl || "http://127.0.0.1:9317")}" placeholder="http://127.0.0.1:9317">
                    </div>
                  </div>
                ` : `
                  <div class="card">
                    <strong>Managed API</strong>
                    <p>Your OpenLeash Cloud or Private Cloud endpoint.</p>
                    <div class="fieldRow" style="margin-top:14px">
                      <strong>API URL</strong>
                      <input id="remoteApiUrl" value="${escapeHtml(setupRemoteApiUrl === (state.cloudApiUrl || "https://api.openleash.com") ? "" : setupRemoteApiUrl)}" placeholder="https://openleash.your-company.com">
                    </div>
                    <div id="remoteSetupError" class="error">${escapeHtml(setupRemoteError)}</div>
                  </div>
                `}
              </section>
            ` : ""}
            ${currentId === "model key" ? `
              <section class="setupSection">
                <h2>Model key</h2>
                <div class="card">
                  <strong>Optional local evaluation</strong>
                  <p>Local mode can start immediately. Add a key now only if you want local LLM-backed risk evaluation on this Mac.</p>
                  <div class="fieldRow">
                    <strong>Provider</strong>
                    <div class="segmented">
                      <label><input type="radio" name="provider" value="openai" ${setupProvider !== "anthropic" ? "checked" : ""}>OpenAI</label>
                      <label><input type="radio" name="provider" value="anthropic" ${setupProvider === "anthropic" ? "checked" : ""}>Claude</label>
                    </div>
                  </div>
                  <div class="fieldRow" style="margin-top:14px">
                    <strong>API key</strong>
                    <input id="apiKey" class="secret" type="password" value="${escapeHtml(setupApiKey)}" placeholder="Paste your API key (optional)">
                  </div>
                  <p style="margin-top:12px">Stored locally on this Mac. You can add or change it later.</p>
                  <div id="setupError" class="error"></div>
                </div>
              </section>
            ` : ""}
            ${currentId === "sign in" ? `
              <section class="setupSection">
                <h2>Sign in</h2>
                <div class="card">
                  ${setupRemoteAuth ? `
                    <div class="authSummary">
                      <div>
                        <strong>${escapeHtml(setupRemoteAuth.userName || setupRemoteAuth.userEmail || "Signed in")}</strong>
                        <small>${escapeHtml(setupRemoteAuth.organizationName || setupRemoteAuth.organizationSlug || setupRemoteApiUrl)}</small>
                      </div>
                      <span class="tag good">Connected</span>
                    </div>
                  ` : `
                    <strong>${setupClientMode === "cloud" ? (setupAudience === "organization" ? (state.cloudDevAuth ? "Use local dev sign-in" : "Continue with work identity") : "Continue with Google") : "Sign in with your company"}</strong>
                    <p>${setupClientMode === "cloud" ? (setupAudience === "organization" ? (state.cloudDevAuth ? `This local run will use ${escapeHtml(state.cloudDevAuthEmail || "mobile.user@openleash.com")} and will not open a real Google or Microsoft account picker.` : "Use Google Workspace or Microsoft 365. OpenLeash will detect or create your company workspace from your work email domain.") : "Create or access your personal OpenLeash Cloud account here.") : "Your API chooses the identity provider."}</p>
                    <div class="actions left" style="margin-top:16px">
                      ${orgCloud && state.cloudDevAuth ? `
                        <button class="googleSignIn" id="orgCloudGoogle" ${setupRemoteBusy ? "disabled" : ""}>
                          <span style="font-weight:900;color:#111827">DEV</span>
                          <span>${setupRemoteBusy ? "Opening..." : `Continue as ${escapeHtml(state.cloudDevAuthEmail || "mobile.user@openleash.com")}`}</span>
                        </button>
                      ` : orgCloud ? `
                        <button class="googleSignIn" id="orgCloudGoogle" ${setupRemoteBusy ? "disabled" : ""}>
                          <svg viewBox="0 0 18 18" aria-hidden="true">
                            <path fill="#4285F4" d="M17.64 9.2c0-.64-.06-1.25-.16-1.84H9v3.48h4.84a4.14 4.14 0 0 1-1.8 2.72v2.26h2.92c1.7-1.57 2.68-3.88 2.68-6.62z"/>
                            <path fill="#34A853" d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.92-2.26c-.8.54-1.84.86-3.04.86-2.34 0-4.33-1.58-5.04-3.71H.94v2.33A9 9 0 0 0 9 18z"/>
                            <path fill="#FBBC05" d="M3.96 10.71a5.41 5.41 0 0 1 0-3.42V4.96H.94a9 9 0 0 0 0 8.08l3.02-2.33z"/>
                            <path fill="#EA4335" d="M9 3.58c1.32 0 2.5.45 3.44 1.35l2.58-2.58C13.46.9 11.43 0 9 0A9 9 0 0 0 .94 4.96l3.02 2.33C4.67 5.16 6.66 3.58 9 3.58z"/>
                          </svg>
                          <span>${setupRemoteBusy && setupRemoteProvider === "google" ? "Opening..." : "Google Workspace"}</span>
                        </button>
                        <button class="googleSignIn" id="orgCloudMicrosoft" ${setupRemoteBusy ? "disabled" : ""}>
                          <span style="font-weight:900;color:#2563eb">M</span>
                          <span>${setupRemoteBusy && setupRemoteProvider === "microsoft" ? "Opening..." : "Microsoft 365"}</span>
                        </button>
                      ` : setupClientMode === "cloud" ? `
                        <button class="googleSignIn" id="remoteSignIn" ${setupRemoteBusy ? "disabled" : ""}>
                          <svg viewBox="0 0 18 18" aria-hidden="true">
                            <path fill="#4285F4" d="M17.64 9.2c0-.64-.06-1.25-.16-1.84H9v3.48h4.84a4.14 4.14 0 0 1-1.8 2.72v2.26h2.92c1.7-1.57 2.68-3.88 2.68-6.62z"/>
                            <path fill="#34A853" d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.92-2.26c-.8.54-1.84.86-3.04.86-2.34 0-4.33-1.58-5.04-3.71H.94v2.33A9 9 0 0 0 9 18z"/>
                            <path fill="#FBBC05" d="M3.96 10.71a5.41 5.41 0 0 1 0-3.42V4.96H.94a9 9 0 0 0 0 8.08l3.02-2.33z"/>
                            <path fill="#EA4335" d="M9 3.58c1.32 0 2.5.45 3.44 1.35l2.58-2.58C13.46.9 11.43 0 9 0A9 9 0 0 0 .94 4.96l3.02 2.33C4.67 5.16 6.66 3.58 9 3.58z"/>
                          </svg>
                          <span>${setupRemoteBusy && setupRemoteProvider === "google" ? "Opening..." : setupAudience === "organization" ? "Google Workspace" : "Sign in with Google"}</span>
                        </button>
                        ${setupAudience === "organization" ? `<button class="googleSignIn" id="remoteSignInMicrosoft" ${setupRemoteBusy ? "disabled" : ""}><span style="font-weight:900;color:#2563eb">M</span><span>${setupRemoteBusy && setupRemoteProvider === "azure_ad" ? "Opening..." : "Microsoft 365"}</span></button>` : ""}
                      ` : `<button class="primary" id="remoteSignIn" ${setupRemoteBusy ? "disabled" : ""}>${setupRemoteBusy ? "Opening..." : "Sign in"}</button>`}
                    </div>
                  `}
                  <div id="remoteAuthError" class="error">${escapeHtml(setupRemoteError)}</div>
                  <div class="notice">${escapeHtml(setupRemoteNotice)}</div>
                </div>
              </section>
            ` : ""}
            ${currentId === "agents" ? `
              <section class="setupSection">
                <h2>Agents</h2>
                <p>Select agents to protect.</p>
                ${agentCards({ selectable: true })}
              </section>
            ` : ""}
            ${current.ruleGroup ? `
              <section class="setupSection">
                <h2>${escapeHtml(current.ruleGroup.title)}</h2>
                <p>${personal ? escapeHtml(current.ruleGroup.description) : "These rules are managed by your OpenLeash administrator. Mandatory rules cannot be disabled on this device."}</p>
                ${personal && current.ruleGroup.first ? importRulesPanel({ setup: true }) : ""}
                ${ruleCards(current.ruleGroup.rules, { setup: true, managed: !personal })}
              </section>
            ` : ""}
            ${setupStep >= steps.length ? `<div id="setupError" class="error"></div>` : ""}
          </div>
          <div class="actions">
            <button class="secondary" id="setupBack">Back</button>
            ${setupStep < steps.length
              ? `<button class="primary" id="setupNext">Next</button>`
              : `<button class="primary" id="finish">Install and start protecting</button>`}
          </div>
        `;
        const back = document.getElementById("setupBack");
        if (back) back.onclick = () => {
          rememberSetupInputs();
          setupStep = Math.max(0, setupStep - 1);
          renderSetup();
        };
        const next = document.getElementById("setupNext");
        if (next) next.onclick = async () => {
          rememberSetupInputs();
          if (currentId === "api" && setupClientMode === "custom") {
            const ok = await bootstrapRemoteSetup();
            if (!ok) return renderSetup();
          }
          if (currentId === "sign in" && setupClientMode === "cloud" && setupAudience === "organization") return;
          if (currentId === "sign in" && setupClientMode !== "personal" && !setupRemoteAuth) {
            setupRemoteError = "Sign in before continuing.";
            return renderSetup();
          }
          if (currentId === "sign in" && setupClientMode === "cloud" && setupAudience === "organization" && isPersonalEmail(setupRemoteAuth?.userEmail)) {
            setupRemoteError = "Use your company Google Workspace or Microsoft 365 account, not a personal email address.";
            setupRemoteAuth = undefined;
            return renderSetup();
          }
          setupStep = Math.min(steps.length, setupStep + 1);
          renderSetup();
        };
        const finish = document.getElementById("finish");
        if (finish) finish.onclick = finishSetup;
        bindAgentSelection();
        bindRuleSelection();
        bindAudienceSelection();
        bindConnectionSelection();
        bindModelSelection();
        bindRuleImport({ setup: true });
        const signIn = document.getElementById("remoteSignIn");
        if (signIn) signIn.onclick = () => startRemoteSignIn("google");
        const signInMicrosoft = document.getElementById("remoteSignInMicrosoft");
        if (signInMicrosoft) signInMicrosoft.onclick = () => startRemoteSignIn("azure_ad");
        const orgCloudGoogle = document.getElementById("orgCloudGoogle");
        if (orgCloudGoogle) orgCloudGoogle.onclick = () => startOrgCloudOnboarding("google");
        const orgCloudMicrosoft = document.getElementById("orgCloudMicrosoft");
        if (orgCloudMicrosoft) orgCloudMicrosoft.onclick = () => startOrgCloudOnboarding("microsoft");
        const openLocalRules = document.getElementById("openLocalRules");
        if (openLocalRules) openLocalRules.onclick = () => window.openleash.openLocalConfig();
      }

      async function startOrgCloudOnboarding(provider) {
        rememberSetupInputs();
        setupRemoteProvider = provider;
        setupRemoteBusy = true;
        setupRemoteError = "";
        setupRemoteNotice = "";
        renderSetup();
        const result = await window.openleash.startOrgCloudOnboarding({ provider });
        setupRemoteBusy = false;
        if (!result?.ok) {
          setupRemoteError = result?.error || "Could not open OpenLeash Cloud sign-in.";
        } else {
          setupRemoteNotice = state.cloudDevAuth
            ? `Using local dev sign-in as ${state.cloudDevAuthEmail || "mobile.user@openleash.com"}.`
            : provider === "microsoft"
            ? "Continue with your Microsoft 365 account in the browser."
            : "Continue with your Google Workspace account in the browser.";
        }
        renderSetup();
      }

      function rememberSetupInputs() {
        const audience = root.querySelector("[name=setupAudience]:checked");
        if (audience) setupAudience = audience.value;
        const mode = root.querySelector("[name=clientMode]:checked");
        if (mode) setupClientMode = mode.value;
        enforceAudienceMode();
        const remoteApi = document.getElementById("remoteApiUrl");
        if (remoteApi) setupRemoteApiUrl = remoteApi.value.trim();
        const slug = document.getElementById("organizationSlug");
        if (slug) setupOrganizationSlug = slug.value.trim();
        root.querySelectorAll("[data-agent]").forEach((input) => {
          if (!selectedAgents) selectedAgents = new Set();
          input.checked ? selectedAgents.add(input.dataset.agent) : selectedAgents.delete(input.dataset.agent);
        });
        root.querySelectorAll("[data-rule]").forEach((input) => {
          if (!selectedRules) selectedRules = new Map();
          selectedRules.set(input.dataset.rule, Boolean(input.checked));
        });
        const provider = root.querySelector("[name=provider]:checked");
        if (provider) setupProvider = provider.value;
        const key = document.getElementById("apiKey");
        if (key) setupApiKey = key.value.trim();
      }

      async function finishSetup() {
        rememberSetupInputs();
        if (setupClientMode === "cloud" && setupAudience === "organization" && isPersonalEmail(setupRemoteAuth?.userEmail)) {
          setupRemoteError = "Use your company Google Workspace or Microsoft 365 account, not a personal email address.";
          setupRemoteAuth = undefined;
          setupStep = setupClientMode === "custom" ? 4 : 3;
          renderSetup();
          return;
        }
        const agents = [...(selectedAgents || new Set())];
        const rules = (state.rules || []).map((rule) => ({
          ...rule,
          enabled: rule.locked ? true : (selectedRules?.get(rule.id) ?? Boolean(rule.enabled))
        }));
        const result = await window.openleash.setup({
          agents,
          policies: rules,
          audience: setupAudience,
          clientMode: setupClientMode,
          apiProvider: setupProvider,
          apiKey: setupApiKey,
          remoteApiUrl: setupRemoteApiUrl,
          remoteToken: setupRemoteAuth?.token,
          remoteOrganization: setupRemoteAuth?.organizationName || setupRemoteAuth?.organizationSlug,
          remoteUser: setupRemoteAuth?.userName || setupRemoteAuth?.userEmail
        });
        if (result && result.ok === false) {
          const error = document.getElementById("setupError");
          if (error) error.textContent = result.error || "Setup could not be completed.";
        }
      }

      async function bootstrapRemoteSetup() {
        setupRemoteError = "";
        if (!setupRemoteApiUrl) {
          setupRemoteError = "Add the API URL to continue.";
          return false;
        }
        if (setupClientMode === "custom" && !setupOrganizationSlug) {
          setupOrganizationSlug = "";
        }
        const result = await window.openleash.bootstrapRemoteApi({
          apiUrl: setupRemoteApiUrl,
          organizationSlug: setupOrganizationSlug
        }).catch((error) => ({
          ok: false,
          error: error?.message || "Could not reach that OpenLeash API."
        }));
        if (!result?.ok) {
          setupRemoteError = result?.error || "Could not reach that OpenLeash API.";
          return false;
        }
        setupRemoteBootstrap = result;
        setupRemoteApiUrl = result.apiUrl || setupRemoteApiUrl;
        return true;
      }

      async function startRemoteSignIn(providerOverride) {
        rememberSetupInputs();
        setupRemoteProvider = providerOverride || setupRemoteProvider || "google";
        setupRemoteBusy = true;
        setupRemoteError = "";
        setupRemoteNotice = "";
        renderSetup();
        const ok = setupRemoteBootstrap ? true : await bootstrapRemoteSetup();
        if (!ok) {
          setupRemoteBusy = false;
          return renderSetup();
        }
        const provider = setupClientMode === "cloud"
          ? { type: setupRemoteProvider }
          : (setupRemoteBootstrap.providers || [])[0] || { type: "sso" };
        const organization = setupRemoteBootstrap.organization || {};
        const result = await window.openleash.startRemoteAuth({
          apiUrl: setupRemoteApiUrl,
          audience: setupAudience,
          providerType: provider.type || provider.providerType || "google",
          organizationId: organization.id,
          organizationSlug: setupOrganizationSlug || organization.slug
        }).catch((error) => ({
          ok: false,
          error: error?.message || "Could not start sign-in."
        }));
        setupRemoteBusy = false;
        if (!result?.ok) {
          setupRemoteError = result?.error || "Could not start sign-in.";
          renderSetup();
        } else {
          setupRemoteNotice = "Complete sign-in in your browser.";
          renderSetup();
        }
      }

      async function loadManagedRules() {
        if (!setupRemoteAuth?.token || setupClientMode === "personal") return;
        const result = await window.openleash.remoteState({
          apiUrl: setupRemoteApiUrl,
          token: setupRemoteAuth.token
        }).catch(() => undefined);
        if (!result?.ok || !Array.isArray(result.policies)) return;
        state.rules = result.policies.map((policy) => ({
          id: policy.id,
          name: policy.name,
          category: categoryForManagedRule(policy),
          description: policy.description || policy.natural_language_rule || "Managed OpenLeash rule.",
          enabled: Boolean(policy.enabled || policy.locked),
          locked: Boolean(policy.locked),
          managedByOrganization: Boolean(policy.managedByOrganization || policy.managed_by_organization)
        }));
        selectedRules = new Map((state.rules || []).map((rule) => [rule.id, rule.locked ? true : Boolean(rule.enabled)]));
      }

      function categoryForManagedRule(policy) {
        const text = `${policy.name || ""} ${policy.description || ""} ${policy.natural_language_rule || ""}`.toLowerCase();
        if (/credential|secret|token|personal|private key|\.env/.test(text)) return "Security";
        if (/git|branch|commit|push|history/.test(text)) return "Git";
        if (/package|dependency|lockfile|npm|pip|yarn|pnpm/.test(text)) return "Packages";
        if (/cloud|terraform|kubernetes|infrastructure|filesystem|delete/.test(text)) return "Infrastructure";
        if (/database|external|upload|sharing|exfiltrat/.test(text)) return "Data";
        return "Managed rules";
      }
