<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OpenLeash</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      :root {
        --ink: #22201a;
        --ink-2: #3a3730;
        --muted: #5c584a;
        --line: #ece7d6;
        --line-2: #c4bfa8;
        --soft: #faf8ef;
        --panel: #ffffff;
        --accent: #5b4df0;
        --accent-2: #b44df0;
        --accent-soft: #f6f5ff;
        --yellow-soft: #fff4d6;
        --green: #18a558;
        --green-soft: #e6f5ed;
        --red: #e94e3a;
        --shadow-sm: 0 1px 2px rgba(12, 12, 10, .04), 0 1px 1px rgba(12, 12, 10, .03);
        --shadow-md: 0 2px 4px rgba(12, 12, 10, .04), 0 8px 24px -8px rgba(12, 12, 10, .08);
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        background: #fffdf7;
        color: var(--ink);
        font-family: "Space Grotesk", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        -webkit-font-smoothing: antialiased;
        text-rendering: geometricPrecision;
        user-select: none;
        overflow: hidden;
      }
      .drag-strip {
        position: fixed;
        z-index: 20;
        top: 0;
        left: 0;
        right: 0;
        height: 58px;
        -webkit-app-region: drag;
      }
      aside, .head {
        -webkit-app-region: drag;
      }
      button, input, label, nav, main, .card, .switch, .actions {
        -webkit-app-region: no-drag;
      }
      .app {
        height: 100vh;
        min-height: 0;
        display: grid;
        grid-template-columns: 230px minmax(0, 1fr);
        gap: 14px;
        padding: 14px;
        overflow: hidden;
      }
      aside, main {
        background: var(--panel);
        border-radius: 18px;
        border: 1px solid rgba(16, 19, 24, .06);
      }
      aside {
        padding: 24px 16px;
        display: flex;
        flex-direction: column;
        gap: 18px;
        min-height: 0;
        overflow: hidden;
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
        min-height: 48px;
        font-size: 21px;
        font-weight: 900;
      }
      .brand img { width: 28px; height: 28px; border-radius: 7px; object-fit: contain; }
      nav { display: grid; gap: 12px; }
      .navSection {
        display: grid;
        gap: 6px;
      }
      nav button {
        width: 100%;
        border: 0;
        border-radius: 12px;
        padding: 12px 14px;
        background: transparent;
        color: var(--ink-2);
        text-align: left;
        font: inherit;
        font-weight: 800;
        cursor: pointer;
      }
      nav button {
        display: flex;
        align-items: center;
        gap: 8px;
        min-width: 0;
      }
      nav button span {
        min-width: 0;
      }
      nav button .navLabel {
        flex: 1 1 auto;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      nav button.active { background: var(--soft); color: var(--ink); }
      nav button svg {
        width: 15px;
        height: 15px;
        flex: 0 0 15px;
        fill: none;
        stroke: currentColor;
        stroke-width: 2.4;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .navCategory {
        border: 1px solid transparent;
      }
      .navCategory.cost {
        background: #e9e4fa;
        color: #5b47e0;
      }
      .navCategory.security {
        background: #ddefe8;
        color: #0b7968;
      }
      .navCategory.observability {
        background: #dfeaf8;
        color: #2a63d8;
      }
      .navCategory.utility {
        background: #f4e9d5;
        color: #a15b12;
      }
      .navCategory.active {
        box-shadow: inset 0 0 0 1px currentColor;
      }
      .navCount {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 22px;
        height: 22px;
        border-radius: 999px;
        padding: 0 7px;
        background: rgba(255, 255, 255, .62);
        font-size: 12px;
        font-weight: 900;
      }
      .navSubmenu {
        display: grid;
        gap: 4px;
        margin: 0 0 4px 16px;
        padding-left: 10px;
        border-left: 1px solid var(--line);
      }
      nav button.navPlugin {
        min-height: 34px;
        border-radius: 10px;
        padding: 8px 10px;
        color: var(--ink-2);
        font-size: 13px;
      }
      .navPluginIcon {
        display: grid;
        place-items: center;
        width: 22px;
        height: 22px;
        flex: 0 0 22px;
        overflow: hidden;
        border-radius: 7px;
        background: rgba(255, 255, 255, .72);
        font-size: 15px;
      }
      .navPluginIcon img {
        width: 18px;
        height: 18px;
        object-fit: contain;
      }
      nav button.navPlugin.active {
        background: rgba(91, 79, 229, .1);
        color: var(--accent);
      }
      body.setup-locked nav {
        display: none;
      }
      body.setup-locked .foot {
        display: none;
      }
      body.setup-locked .app {
        grid-template-columns: minmax(0, 1fr);
        padding: 14px;
      }
      body.setup-locked aside {
        display: none;
      }
      body.setup-locked main {
        width: min(1120px, calc(100vw - 28px));
        margin: 0 auto;
        box-shadow: var(--shadow-md);
      }
      body.intro-active main {
        height: calc(100vh - 28px);
        padding: 0;
        overflow: hidden;
      }
      .foot {
        margin-top: auto;
        padding: 14px;
        border-radius: 14px;
        background: var(--soft);
        color: var(--muted);
        font-size: 13px;
        line-height: 1.45;
      }
      main { min-width: 0; min-height: 0; padding: 48px 38px 38px; overflow: auto; }
      h1 { margin: 0; font-size: 38px; line-height: 1.05; letter-spacing: 0; font-weight: 700; }
      h2 { margin: 0; font-size: 20px; line-height: 1.14; letter-spacing: 0; font-weight: 700; }
      p { margin: 0; color: var(--muted); line-height: 1.5; }
      .head {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 20px;
        padding-bottom: 24px;
        border-bottom: 1px solid var(--line);
      }
      .grid { display: grid; gap: 14px; margin-top: 24px; }
      .two { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .setupStack {
        display: grid;
        gap: 24px;
        margin-top: 28px;
      }
      .setupStepper {
        display: grid;
        gap: 10px;
        margin-top: 24px;
      }
      .setupProgress {
        display: grid;
        gap: 10px;
        margin-top: 24px;
      }
      .setupProgressMeta {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        color: var(--muted);
        font-size: 13px;
        font-weight: 900;
        text-transform: uppercase;
      }
      .setupProgressBar {
        height: 8px;
        border-radius: 999px;
        background: rgba(216, 211, 199, .42);
        overflow: hidden;
      }
      .setupProgressFill {
        height: 100%;
        border-radius: 999px;
        background: linear-gradient(90deg, var(--accent), var(--accent-2));
      }
      .localBackendProgress {
        display: grid;
        gap: 10px;
        margin-top: 16px;
      }
      .localBackendProgressBar {
        height: 8px;
        border-radius: 999px;
        background: rgba(216, 211, 199, .5);
        overflow: hidden;
      }
      .localBackendProgressFill {
        width: 48%;
        height: 100%;
        border-radius: 999px;
        background: linear-gradient(90deg, var(--accent), var(--accent-2));
        transition: width .25s ease;
      }
      .localBackendProgressFill.ready {
        width: 100%;
        background: linear-gradient(90deg, #18a558, #6ed59a);
      }
      .localBackendProgressFill.busy {
        width: 68%;
        animation: localBackendPulse 1.2s ease-in-out infinite;
      }
      .localBackendStatus {
        color: var(--muted);
        font-size: 14px;
        font-weight: 800;
      }
      @keyframes localBackendPulse {
        0%, 100% { opacity: .62; }
        50% { opacity: 1; }
      }
      .setupGreeting {
        margin-top: 10px;
        color: var(--ink-2);
        font-size: 16px;
        font-weight: 800;
      }
      .welcomeHero {
        position: relative;
        min-height: calc(100vh - 128px);
        display: grid;
        align-content: center;
        gap: 28px;
        max-width: 1080px;
        margin: 0 auto;
        isolation: isolate;
      }
      .welcomeAgents {
        position: absolute;
        z-index: -1;
        top: 0;
        right: 0;
        width: min(360px, 38vw);
        height: 210px;
        overflow: hidden;
        pointer-events: none;
      }
      .welcomeAgentIcon {
        position: absolute;
        width: 34px;
        height: 34px;
        display: grid;
        place-items: center;
        border-radius: 10px;
        background: rgba(255, 255, 255, .72);
        border: 1px solid rgba(16, 19, 24, .08);
        box-shadow: 0 10px 24px rgba(16, 19, 24, .12);
        will-change: transform;
      }
      .welcomeAgentIcon img {
        width: 22px;
        height: 22px;
        object-fit: contain;
      }
      .welcomeMark {
        width: 68px;
        height: 68px;
        border-radius: 20px;
        display: grid;
        place-items: center;
        background: var(--soft);
        border: 1px solid var(--line);
        color: var(--ink);
      }
      .welcomeMark svg {
        width: 38px;
        height: 38px;
      }
      .welcomeCopy {
        display: grid;
        gap: 12px;
      }
      .welcomeKicker {
        color: var(--ink);
        font-size: 24px;
        font-weight: 950;
        letter-spacing: 0;
      }
      .welcomeHero h1 {
        font-size: 74px;
        line-height: .98;
        max-width: 920px;
      }
      .welcomeHero p {
        max-width: 900px;
        font-size: 20px;
        line-height: 1.45;
      }
      .welcomeTiles {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 16px;
      }
      .welcomeTile {
        min-height: 188px;
        padding: 22px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: white;
      }
      .welcomeTile strong {
        display: block;
        margin-bottom: 12px;
        font-size: 18px;
      }
      .welcomeTile p {
        font-size: 17px;
        line-height: 1.45;
      }
      .welcomeActions {
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        gap: 18px;
      }
      .welcomeFootnote {
        color: var(--muted);
        font-size: 15px;
        font-weight: 800;
      }
      .introScreen {
        position: relative;
        width: 100%;
        height: 100%;
        min-height: 0;
        display: grid;
        place-items: center;
        overflow: hidden;
        border-radius: 18px;
        background: #06080d;
      }
      .introScreen video {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }
      .introSkip {
        position: absolute;
        right: 22px;
        bottom: 22px;
        border-color: rgba(255,255,255,.32);
        background: rgba(255,255,255,.9);
        backdrop-filter: blur(12px);
      }
      .setupStepPill {
        display: grid;
        grid-template-columns: 28px minmax(0, 1fr);
        align-items: center;
        gap: 10px;
        min-height: 54px;
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 9px 14px 9px 10px;
        background: white;
        color: var(--muted);
        font-weight: 900;
      }
      .setupStepPill b {
        display: grid;
        place-items: center;
        width: 28px;
        height: 28px;
        border-radius: 50%;
        background: var(--soft);
        color: var(--muted);
        font-size: 13px;
      }
      .setupStepPill.active {
        border-color: rgba(93, 119, 205, .22);
        background: #f1f5ff;
        color: var(--ink);
      }
      .setupStepPill.active b {
        background: var(--accent);
        color: var(--ink);
      }
      .setupStepPill.done {
        color: var(--ink-2);
      }
      .setupStepPill.done b {
        background: #e9f8f1;
        color: #11795f;
      }
      .setupSection {
        display: grid;
        gap: 16px;
      }
      .setupSection h2 {
        margin: 0;
      }
      .cardList {
        display: grid;
        gap: 14px;
      }
      .card {
        border: 1px solid var(--line);
        border-radius: 14px;
        background: white;
        padding: 16px;
        box-shadow: var(--shadow-sm);
      }
      .choiceCard {
        display: grid;
        grid-template-columns: 42px minmax(0, 1fr) auto;
        align-items: center;
        gap: 14px;
        cursor: pointer;
      }
      .choiceCard.selected {
        border-color: rgba(93, 119, 205, .35);
        background: #f5f7ff;
      }
      .choiceCard.featured {
        position: relative;
        grid-template-columns: 48px minmax(0, 1fr) auto;
        padding: 20px;
        border-color: rgba(34, 185, 129, .26);
        background: #f2fbf7;
      }
      .choiceCard.featured.selected {
        border-color: rgba(34, 185, 129, .46);
        background: #ecfaf4;
      }
      .choiceCard.featured .agentIcon {
        width: 48px;
        height: 48px;
        background: white;
      }
      .choiceCard .audienceIcon {
        background: #f7f8fb;
        color: var(--ink);
      }
      .choiceCard.selected .audienceIcon {
        background: white;
      }
      .audienceIcon svg {
        width: 27px;
        height: 27px;
        stroke: currentColor;
        stroke-width: 1.9;
        stroke-linecap: round;
        stroke-linejoin: round;
        fill: none;
      }
      .audienceIcon .softFill {
        fill: #eef2ff;
        stroke: none;
      }
      .choiceCard .benefits {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 10px;
      }
      .choiceCard .benefits span {
        display: inline-flex;
        align-items: center;
        min-height: 28px;
        border-radius: 999px;
        padding: 5px 10px;
        background: rgba(255, 255, 255, .78);
        border: 1px solid rgba(16, 19, 24, .06);
        color: #11795f;
        font-size: 12px;
        font-weight: 900;
      }
      .recommendedTag {
        display: inline-flex;
        margin-left: 8px;
        vertical-align: middle;
        border-radius: 999px;
        padding: 3px 8px;
        background: #dff7ec;
        color: #11795f;
        font-size: 11px;
        font-weight: 900;
        text-transform: uppercase;
      }
      .choiceCard input {
        accent-color: #8da4f4;
        width: 18px;
        height: 18px;
      }
      .connectionFields {
        display: grid;
        gap: 12px;
        margin-top: 14px;
      }
      .authSummary {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
        padding: 14px;
        border-radius: 14px;
        background: var(--soft);
      }
      .googleSignIn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        min-width: 220px;
        height: 44px;
        padding: 0 16px 0 12px;
        border: 1px solid #747775;
        border-radius: 22px;
        background: #fff;
        color: #1f1f1f;
        font-family: Roboto, Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
      }
      .googleSignIn:hover {
        background: #f8fafd;
        box-shadow: 0 1px 2px rgba(60, 64, 67, .18);
      }
      .googleSignIn svg {
        width: 18px;
        height: 18px;
        flex: 0 0 18px;
      }
      .row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 18px;
      }
      .agentIcon {
        width: 42px;
        height: 42px;
        display: grid;
        place-items: center;
        flex: 0 0 42px;
        border-radius: 12px;
        background: var(--soft);
        font-weight: 900;
      }
      .agentIcon img {
        width: 24px;
        height: 24px;
        object-fit: contain;
      }
      .agentIcon.muted {
        filter: grayscale(1);
        opacity: .54;
        background: #f2f3f5;
      }
      .agentLine {
        display: grid;
        grid-template-columns: 42px minmax(0, 1fr) auto;
        align-items: center;
        gap: 12px;
      }
      .pluginInstallLine {
        position: relative;
        display: grid;
        grid-template-columns: 48px minmax(0, 1fr) auto;
        align-items: flex-start;
        gap: 16px;
        min-height: 126px;
        padding: 18px;
        cursor: default;
        overflow: hidden;
        transition: border-color .16s ease, background .16s ease, box-shadow .16s ease, transform .16s ease;
      }
      .pluginInstallLine::before {
        content: "";
        position: absolute;
        inset: 0;
        background:
          radial-gradient(ellipse 360px 180px at 14% -20%, rgba(91, 79, 229, .08), transparent 68%),
          radial-gradient(ellipse 260px 160px at 98% 0%, rgba(236, 72, 153, .06), transparent 64%);
        opacity: 0;
        pointer-events: none;
        transition: opacity .16s ease;
      }
      .pluginInstallLine:hover {
        border-color: var(--line-2);
        box-shadow: var(--shadow-md);
        transform: translateY(-1px);
      }
      .pluginInstallLine.selected {
        border-color: rgba(91, 79, 229, .36);
        background: linear-gradient(180deg, #ffffff 0%, #fbfaff 100%);
      }
      .pluginInstallLine.selected::before {
        opacity: 1;
      }
      .pluginInstallLine > * {
        position: relative;
        z-index: 1;
      }
      .pluginInstallLine .agentIcon {
        width: 48px;
        height: 48px;
        flex-basis: 48px;
        border: 1px solid var(--line);
        background: #fafaf6;
        color: var(--ink);
        font-size: 14px;
        letter-spacing: 0;
      }
      .pluginInstallLine.selected .agentIcon {
        border-color: rgba(91, 79, 229, .2);
        background: var(--accent-soft);
        color: var(--accent);
      }
      .pluginInstallLine [data-plugin-expand] {
        cursor: pointer;
      }
      .pluginInstallLine .pluginCopy {
        display: grid;
        gap: 7px;
        min-width: 0;
      }
      .pluginInstallLine .pluginCopy strong {
        font-size: 17px;
        letter-spacing: 0;
      }
      .pluginInstallLine .pluginCopy > span:not(.pluginMeta) {
        color: var(--ink-2);
        line-height: 1.45;
      }
      .pluginInstallLine .pluginStats {
        display: flex;
        flex-wrap: wrap;
        gap: 7px;
        margin-top: 2px;
      }
      .pluginInstallLine .pluginStats .tag {
        padding: 5px 10px;
        border: 1px solid rgba(216, 211, 199, .7);
        background: rgba(255, 255, 255, .76);
        color: var(--ink-2);
        font-size: 11px;
        font-weight: 800;
      }
      .pluginInstallLine .pluginDetails {
        display: grid;
        gap: 8px;
        margin-top: 6px;
        padding-top: 12px;
        border-top: 1px solid rgba(216, 211, 199, .72);
      }
      .pluginInstallLine .pluginDetails p {
        color: var(--ink-2);
        font-size: 13px;
      }
      .pluginInstallLine .pluginDetailsMeta {
        display: flex;
        flex-wrap: wrap;
        gap: 7px;
      }
      .pluginInstallLine .pluginDetailsMeta span {
        border-radius: 999px;
        padding: 4px 9px;
        background: var(--soft);
        color: var(--muted);
        font-size: 11px;
        font-weight: 850;
      }
      .pluginMarketplaceTools {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto auto;
        align-items: center;
        gap: 12px;
        margin-bottom: 14px;
      }
      .pluginCategoryFilters {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 12px;
      }
      .pluginCategoryFilters button {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        min-height: 34px;
        border: 1px solid #dedfd2;
        border-radius: 999px;
        padding: 7px 12px;
        background: white;
        color: #3a3a30;
        font: inherit;
        font-size: 13px;
        font-weight: 900;
        cursor: pointer;
      }
      .pluginCategoryFilters button.cost {
        border-color: #d8d0f3;
        background: #e9e4fa;
        color: #5b47e0;
      }
      .pluginCategoryFilters button.security {
        border-color: #cce6dc;
        background: #ddefe8;
        color: #0b7968;
      }
      .pluginCategoryFilters button.observability {
        border-color: #cdddf3;
        background: #dfeaf8;
        color: #2a63d8;
      }
      .pluginCategoryFilters button.utility {
        border-color: #ead9bb;
        background: #f4e9d5;
        color: #a15b12;
      }
      .pluginCategoryFilters button svg,
      .eventMeta svg,
      .pluginMetaPill svg,
      .pluginCategoryTag svg,
      .pluginDetailsMeta svg {
        width: 15px;
        height: 15px;
        flex: 0 0 15px;
        fill: none;
        stroke: currentColor;
        stroke-width: 2.4;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .pluginCategoryFilters button.active,
      .pluginCategoryFilters button.cost.active {
        border-color: #5b47e0;
        background: #5b47e0;
        color: #fafaf6;
      }
      .pluginCategoryFilters button.security.active {
        border-color: #0b7968;
        background: #0b7968;
        color: #fafaf6;
      }
      .pluginCategoryFilters button.observability.active {
        border-color: #2a63d8;
        background: #2a63d8;
        color: #fafaf6;
      }
      .pluginCategoryFilters button.utility.active {
        border-color: #a15b12;
        background: #a15b12;
        color: #fafaf6;
      }
      .pluginMarketplaceTools input {
        min-height: 44px;
        border: 1px solid var(--line);

  </head>
  <body>
    <div class="drag-strip" aria-hidden="true"></div>
    <div class="app">
      <aside>
        <div class="brand">
          <img src="openleash-icon.png" alt="" />
          OpenLeash
        </div>
        <nav id="sideNav"></nav>
        <div class="foot" id="modeFoot">Personal mode runs fully on this Mac. Rules, history, approvals, and OpenLeash activity stay local.</div>
      </aside>
      <main id="root"></main>
    </div>
    <script>
      let state = { rules: [], history: [], localProtections: [], setupComplete: false, introSeen: false };
      let selectedAgents;
      let selectedRules;
      let selectedPlugins;
      let pluginSetupConfigs = {};
      let setupPluginSearch = "";
      let setupPluginCategory = "all";
      let expandedSetupPlugins = new Set();
      let setupStep = 0;
      let setupAudience = "individual";
      let setupClientMode = "cloud";
      let setupConnectionTouched = false;
      let setupRemoteApiUrl = "https://api.openleash.com";
      let setupOrganizationSlug = "";
      let setupRemoteBootstrap;
      let setupRemoteAuth;
      let setupRemoteError = "";
      let setupFinishError = "";
      let setupRemoteNotice = "";
      let setupRemoteBusy = false;
      let setupRemoteProvider = "google";
      let setupRemoteKeySaved = false;
      let setupFinishing = false;
      let setupSkipDashboardOpenAfterInstall = false;
      let setupDockerStatus;
      let setupDockerBusy = false;
      let setupDockerAutoStarted = false;
      let setupProvider = "openai";
      let setupApiKey = "";
      let importedRules;
      let importRulesMessage = "";
      let desktopMessageTimer;
      let introPlaying = false;
      let welcomeAgentAnimation = 0;
      let view = "overview";
      let selectedEventId = "";
      let selectedMcpServerId = "";
      let selectedSkillPath = "";
      let pluginViewCategory = "all";
      let selectedPluginId = "";
      let pluginDetailTab = "insights";
      let pendingRuleImport = null;
      const pluginDetailDraftConfigs = {};
      const pluginPendingRuleTexts = {};
      const skillDocScrollTops = new Map();
      const openDebugRowIds = new Set();
      let debugSearch = "";
      let debugPluginFilter = "all";
      let debugEventFilter = "all";
      let debugLevelFilter = "all";
      let debugSort = "newest";
      let selectedAgentSessionId = "";
      const root = document.getElementById("root");
      const sideNav = document.getElementById("sideNav");
      const modeFoot = document.getElementById("modeFoot");

      /* setup-connection-draft:start */
      function mergeSetupConnectionDraft(current, incoming, setupLocked, connectionTouched) {
        if (setupLocked && connectionTouched) return current;
        return {
          clientMode: incoming.clientMode || current.clientMode,
          remoteApiUrl: incoming.remoteApiUrl || incoming.cloudApiUrl || current.remoteApiUrl
        };
      }
      /* setup-connection-draft:end */

      function render(payload = {}) {
        const mainScroller = document.querySelector("main");
        const preservedLogScrollTop = view === "debug" ? (mainScroller?.scrollTop || 0) : 0;
        const incomingRules = payload.policies || payload.rules || state.rules;
        state = { ...state, ...payload, rules: importedRules || incomingRules };
        if (payload.desktopMessage) {
          if (desktopMessageTimer) clearTimeout(desktopMessageTimer);
          desktopMessageTimer = setTimeout(() => {
            state.desktopMessage = "";
            renderView();
          }, 5000);
        }
        const setupConnection = mergeSetupConnectionDraft(
          { clientMode: setupClientMode, remoteApiUrl: setupRemoteApiUrl },
          state,
          isSetupLocked(),
          setupConnectionTouched
        );
        setupClientMode = setupConnection.clientMode;
        setupRemoteApiUrl = setupConnection.remoteApiUrl;
        if (!selectedAgents && (state.localProtections || []).length > 0) {
          selectedAgents = new Set((state.localProtections || []).filter((agent) => agent.installed && agent.supportsInstall).map((agent) => agent.kind));
        }
        if (!selectedRules && (state.rules || []).length > 0) {
          selectedRules = new Map((state.rules || []).map((rule) => [rule.id, rule.locked ? true : Boolean(rule.enabled)]));
        }
        initializePluginSetupState();
        updateModeFoot();
        document.body.classList.toggle("setup-locked", isSetupLocked());
        document.body.classList.toggle("intro-active", isIntroLocked());
        if (isIntroLocked()) {
          if (!introPlaying) renderIntro();
          return;
        }
        introPlaying = false;
        if (isSetupLocked()) return renderSetup();
        importedRules = undefined;
        renderView();
        autosizeRuleTextareas();
        if (view === "debug" && mainScroller) {
          mainScroller.scrollTop = preservedLogScrollTop;
          requestAnimationFrame(() => { mainScroller.scrollTop = preservedLogScrollTop; });
        }
      }

      function modeLabel() {
        if (state.clientMode === "cloud") return "OpenLeash Cloud";
        if (state.clientMode === "custom" && isLocalOpenSourceApi(state.remoteApiUrl)) return "Individual Open Source";
        if (state.clientMode === "custom") return "Private Cloud";
        return "Local only";
      }

      function modeFootnote() {
        if (state.clientMode === "cloud") {
          const tenant = state.remoteOrganization || "organization tenant";
          return `OpenLeash Cloud organization mode. Rules and approvals sync with ${tenant}. Local hooks still call this Mac first.`;
        }
        if (state.clientMode === "custom") {
          if (isLocalOpenSourceApi(state.remoteApiUrl)) {
            return "Individual Open Source mode. The desktop talks to your local Dockerized OpenLeash API and keeps client updates on the OpenLeash update feed.";
          }
          const tenant = state.remoteOrganization || state.remoteApiUrl || "your private cloud";
          return `Private Cloud mode. Rules and approvals sync with ${tenant}. Local hooks still call this Mac first.`;
        }
        return "Personal mode runs fully on this Mac. Rules, history, approvals, and OpenLeash activity stay local.";
      }

      function updateModeFoot() {
        modeFoot.textContent = modeFootnote();
      }

      function modeTag() {
        return `<span class="tag good">${escapeHtml(modeLabel())}</span>`;
      }

      function isSetupLocked() {
        return !state.setupComplete || state.mode === "setup";
      }

      function isIntroLocked() {
        return !state.introSeen;
      }

      function renderIntro() {
        introPlaying = true;
        document.body.classList.add("intro-active");
        root.innerHTML = `
          <section class="introScreen">
            <video id="introVideo" autoplay muted playsinline preload="auto" src="openleash-video.mp4"></video>
            <button class="secondary introSkip" id="skipIntro">Skip</button>
          </section>
        `;
        const video = document.getElementById("introVideo");
        const finish = () => finishIntro();
        document.getElementById("skipIntro").onclick = finish;
        video.onended = finish;
        video.onerror = finish;
        video.play?.().catch(() => undefined);
      }

      async function finishIntro() {
        if (state.introSeen) return;
        introPlaying = false;
        state.introSeen = true;
        document.body.classList.remove("intro-active");
        await window.openleash.markIntroSeen?.();
        if (isSetupLocked()) renderSetup();
        else renderView();
      }

      function renderSetup() {
        enforceAudienceMode();
        const personal = setupClientMode === "personal";
        const cloud = setupClientMode === "cloud";
        const individualCloud = setupAudience === "individual" && cloud;
        const individualOpenSource = setupAudience === "individual" && setupClientMode === "custom";
        const orgCloud = setupAudience === "organization" && cloud;
        initializePluginSetupState();
        const pluginSteps = [
          { title: "Plugins", subtitle: "Choose plugins to add during setup." }
        ];
        const steps = individualOpenSource
          ? [
              { title: "Account", subtitle: "Tell us who is setting this up." },
              { title: "Connect", subtitle: "Pick how OpenLeash runs." },
              { title: "Local backend", subtitle: "Start your open-source backend." },
              { title: "Agents", subtitle: "Choose agents to manage." },
              ...pluginSteps
            ]
          : individualCloud
            ? [
                { title: "Account", subtitle: "Tell us who is setting this up." },
                { title: "Connect", subtitle: "Pick how OpenLeash runs." },
                { title: "Sign in", subtitle: "Sign in to OpenLeash Cloud." },
                { title: "Agents", subtitle: "Choose agents to manage." },
                ...pluginSteps
              ]
          : cloud
            ? [
                { title: "Account", subtitle: "Tell us who is setting this up." },
                { title: "Connect", subtitle: "Pick how OpenLeash runs." },
                ...(orgCloud ? [
                  { title: "Sign in", subtitle: "Continue onboarding in the dashboard." }
                ] : [
                  { title: "Sign in", subtitle: "Sign in to OpenLeash Cloud." },
                  { title: "Agents", subtitle: "Choose agents to manage." },
                  ...pluginSteps
                ])
              ]
          : [
              { title: "Account", subtitle: "Tell us who is setting this up." },
              { title: "Connect", subtitle: "Pick how OpenLeash runs." },
              { title: "API", subtitle: "Add your company API." },
              { title: "Sign in", subtitle: "Sign in with your company." },
              { title: "Agents", subtitle: "Choose agents to manage." },
              ...pluginSteps
            ];
        const current = steps[Math.max(0, setupStep - 1)] || steps[0];
        const currentId = current.title.toLowerCase();
        const progress = Math.round((Math.max(1, setupStep) / steps.length) * 100);
        if (setupStep === 0) {
          if (root.querySelector(".welcomeHero")) {
            bindWelcomeNext();
            if (!welcomeAgentAnimation) startWelcomeAgentAnimation();
            return;
          }
          root.innerHTML = `
            <section class="welcomeHero">
              <div class="welcomeAgents" aria-hidden="true">
                ${welcomeAgentSprites()}
              </div>
              <div class="welcomeMark">
                <svg viewBox="0 0 34 34" fill="none" aria-hidden="true">
                  <path d="M8 8c0 4.4 3.6 8 8 8s8-3.6 8-8" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" />
                  <path d="M8 17c0 4.4 3.6 8 8 8s8-3.6 8-8" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" opacity=".55" />
                  <circle cx="26" cy="8" r="3" fill="currentColor" />
                </svg>
              </div>
              <div class="welcomeCopy">
                <div class="welcomeKicker">Control your agents</div>
                <h1>OpenLeash</h1>
                <p>Understand and control AI agents wherever they run.</p>
              </div>
              <div class="welcomeTiles">
                <div class="welcomeTile"><strong>See what they do</strong><p>Track agents commands, files, MCPs, Skills, tools, usage and history.</p></div>
                <div class="welcomeTile"><strong>Control risky actions</strong><p>Approve dangerous or destructive actions to you files, Git, databases, environment, secret access etc.</p></div>
                <div class="welcomeTile"><strong>Stay in control anywhere</strong><p>Unleash your agents even when you're on the go from your phone.</p></div>
              </div>
              <div class="welcomeActions">
                <button class="primary" id="setupNext">Next</button>
                <span class="welcomeFootnote">Works with OpenLeash Cloud, Private Cloud, or an open-source local backend.</span>
              </div>
            </section>
          `;
          bindWelcomeNext();
          startWelcomeAgentAnimation();
          return;
        }
        stopWelcomeAgentAnimation();
        root.innerHTML = `
          <div class="head">
            <div>
              <h1>Set up OpenLeash</h1>
              ${setupGreeting() ? `<div class="setupGreeting">${escapeHtml(setupGreeting())}</div>` : ""}
              <p>${escapeHtml(current.subtitle)}</p>
            </div>
          </div>
          <div class="setupProgress">
            <div class="setupProgressMeta">
              <span>Step ${setupStep} of ${steps.length}</span>
              <span>${escapeHtml(current.title)}</span>
            </div>
            <div class="setupProgressBar"><div class="setupProgressFill" style="width:${progress}%"></div></div>
          </div>
          <div class="setupStack">
            ${currentId === "account" ? `
              <section class="setupSection">
                <h2>Who is OpenLeash for?</h2>
                <p>This shapes the setup options you see next.</p>
                <div class="cardList">
                  ${audienceChoice("individual", "Individual", "Use OpenLeash Cloud for your own AI agents.")}
                  ${audienceChoice("organization", "Organization", "Set up OpenLeash for a company or team.")}
                </div>
              </section>
            ` : ""}
            ${currentId === "connect" ? `
              <section class="setupSection">
                <h2>Connection</h2>
                <p>${setupAudience === "organization" ? "Pick how your organization runs OpenLeash." : "Pick how OpenLeash runs for you."}</p>
                <div class="cardList">
                  ${connectionChoice("cloud", "OpenLeash Cloud", setupAudience === "organization" ? "Use the OpenLeash-hosted API and dashboard." : "Use the OpenLeash-hosted account and sync.", "cloud")}
                  ${setupAudience === "organization"
                    ? connectionChoice("custom", "Private Cloud", "Use your private OpenLeash deployment.", "dns")
                    : connectionChoice("custom", "Open Source Local", "Run the open-source API and database on this computer.", "devices")}
                </div>
              </section>
            ` : ""}
            ${currentId === "local backend" ? `
              <section class="setupSection">
                <h2>Local backend</h2>
                <div class="card">
                  <strong>OpenLeash API and Database</strong>
                  <p>Starting the open-source backend and persistent database with Docker.</p>
                  <div class="localBackendProgress">
                    <div class="localBackendProgressBar"><div class="localBackendProgressFill ${setupDockerStatus?.apiReachable ? "ready" : setupDockerBusy ? "busy" : ""}"></div></div>
                    <div class="localBackendStatus">${escapeHtml(setupDockerStatus?.apiReachable ? "Setup finished. Local OpenLeash is ready." : setupDockerBusy ? "Starting local OpenLeash..." : setupDockerStatus?.status || "Preparing Docker runtime...")}</div>

                  ${!setupDockerBusy && !setupDockerStatus?.apiReachable && setupDockerStatus?.status ? `<div class="actions left" style="margin-top:16px"><button class="primary" id="startLocalBackend">Retry</button><button class="secondary" id="checkDockerStatus">Check Docker</button></div>` : ""}
                  <div class="notice" style="margin-top:12px">${escapeHtml(setupDockerStatus?.apiReachable ? "You can continue." : setupDockerStatus?.status || "Your data is stored in a local Docker volume.")}</div>

            ${currentId === "api" ? `
              <section class="setupSection">
                <h2>API configuration</h2>
                <div class="card">
                  <strong>Managed API</strong>
                  <p>Your OpenLeash Cloud or Private Cloud endpoint.</p>
                  <div class="fieldRow" style="margin-top:14px">
                    <strong>API URL</strong>
                    <input id="remoteApiUrl" value="${escapeHtml(setupRemoteApiUrl === (state.cloudApiUrl || "https://api.openleash.com") ? "" : setupRemoteApiUrl)}" placeholder="https://openleash.your-company.com">
                  </div>
                  <div id="remoteSetupError" class="error">${escapeHtml(setupRemoteError)}</div>
                </div>
              </section>
            ` : ""}
            ${currentId === "sign in" ? `
              <section class="setupSection">
                <h2>Sign in</h2>
                <div class="card">
                  ${setupRemoteAuth ? `
                    <div class="authSummary">
                      <div>
                        <strong>${escapeHtml(setupRemoteAuth.userName || setupRemoteAuth.userEmail || "Signed in")}</strong>
                        ${setupRemoteAuthSubtitle() ? `<small>${escapeHtml(setupRemoteAuthSubtitle())}</small>` : ""}
                      </div>
                      <span class="tag good">Connected</span>
                    </div>
                  ` : `
                    <strong>${setupClientMode === "cloud" ? (setupAudience === "organization" ? (state.cloudDevAuth ? "Use local dev sign-in" : "Continue with work identity") : "Continue with Google or GitHub") : "Sign in with your company"}</strong>
                    <p>${setupClientMode === "cloud" ? (setupAudience === "organization" ? (state.cloudDevAuth ? `This local run will use ${escapeHtml(state.cloudDevAuthEmail || "mobile.user@openleash.com")} and will not open a real Google or Microsoft account picker.` : "Use Google Workspace or Microsoft 365. OpenLeash will detect or create your company workspace from your work email domain.") : "Create or access your personal OpenLeash Cloud account here.") : "Your API chooses the identity provider."}</p>
                    <div class="actions left" style="margin-top:16px">
                      ${orgCloud && state.cloudDevAuth ? `
                        <button class="googleSignIn" id="orgCloudGoogle" ${setupRemoteBusy ? "disabled" : ""}>
                          <span style="font-weight:900;color:#111827">DEV</span>
                          <span>${setupRemoteBusy ? "Opening..." : `Continue as ${escapeHtml(state.cloudDevAuthEmail || "mobile.user@openleash.com")}`}</span>
                        </button>
                      ` : orgCloud ? `
                        <button class="googleSignIn" id="orgCloudGoogle" ${setupRemoteBusy ? "disabled" : ""}>
                          <svg viewBox="0 0 18 18" aria-hidden="true">
                            <path fill="#4285F4" d="M17.64 9.2c0-.64-.06-1.25-.16-1.84H9v3.48h4.84a4.14 4.14 0 0 1-1.8 2.72v2.26h2.92c1.7-1.57 2.68-3.88 2.68-6.62z"/>
                            <path fill="#34A853" d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.92-2.26c-.8.54-1.84.86-3.04.86-2.34 0-4.33-1.58-5.04-3.71H.94v2.33A9 9 0 0 0 9 18z"/>
                            <path fill="#FBBC05" d="M3.96 10.71a5.41 5.41 0 0 1 0-3.42V4.96H.94a9 9 0 0 0 0 8.08l3.02-2.33z"/>
                            <path fill="#EA4335" d="M9 3.58c1.32 0 2.5.45 3.44 1.35l2.58-2.58C13.46.9 11.43 0 9 0A9 9 0 0 0 .94 4.96l3.02 2.33C4.67 5.16 6.66 3.58 9 3.58z"/>
                          </svg>
                          <span>${setupRemoteBusy && setupRemoteProvider === "google" ? "Opening..." : "Google Workspace"}</span>
                        </button>
                        <button class="googleSignIn" id="orgCloudMicrosoft" ${setupRemoteBusy ? "disabled" : ""}>
                          <span style="font-weight:900;color:#2563eb">M</span>
                          <span>${setupRemoteBusy && setupRemoteProvider === "microsoft" ? "Opening..." : "Microsoft 365"}</span>
                        </button>
                      ` : setupClientMode === "cloud" ? `
                        <button class="googleSignIn" id="remoteSignIn" ${setupRemoteBusy ? "disabled" : ""}>
                          <svg viewBox="0 0 18 18" aria-hidden="true">
                            <path fill="#4285F4" d="M17.64 9.2c0-.64-.06-1.25-.16-1.84H9v3.48h4.84a4.14 4.14 0 0 1-1.8 2.72v2.26h2.92c1.7-1.57 2.68-3.88 2.68-6.62z"/>
                            <path fill="#34A853" d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.92-2.26c-.8.54-1.84.86-3.04.86-2.34 0-4.33-1.58-5.04-3.71H.94v2.33A9 9 0 0 0 9 18z"/>
                            <path fill="#FBBC05" d="M3.96 10.71a5.41 5.41 0 0 1 0-3.42V4.96H.94a9 9 0 0 0 0 8.08l3.02-2.33z"/>
                            <path fill="#EA4335" d="M9 3.58c1.32 0 2.5.45 3.44 1.35l2.58-2.58C13.46.9 11.43 0 9 0A9 9 0 0 0 .94 4.96l3.02 2.33C4.67 5.16 6.66 3.58 9 3.58z"/>
                          </svg>
                          <span>${setupRemoteBusy && setupRemoteProvider === "google" ? "Opening..." : setupAudience === "organization" ? "Google Workspace" : "Sign in with Google"}</span>
                        </button>
                        ${setupAudience === "individual" ? `<button class="googleSignIn" id="remoteSignInGithub" ${setupRemoteBusy ? "disabled" : ""}><svg viewBox="0 0 24 24" aria-hidden="true"><path fill="#24292f" d="M12 2a10 10 0 0 0-3.16 19.49c.5.09.68-.22.68-.48v-1.68c-2.78.6-3.37-1.34-3.37-1.34-.45-1.16-1.1-1.47-1.1-1.47-.9-.62.07-.61.07-.61 1 .07 1.53 1.03 1.53 1.03.89 1.52 2.34 1.08 2.91.82.09-.64.35-1.08.63-1.33-2.22-.25-4.55-1.11-4.55-4.94 0-1.09.39-1.98 1.03-2.68-.1-.25-.45-1.27.1-2.65 0 0 .84-.27 2.75 1.02A9.6 9.6 0 0 1 12 5.85c.85 0 1.71.11 2.51.34 1.9-1.29 2.74-1.02 2.74-1.02.55 1.38.2 2.4.1 2.65.64.7 1.03 1.59 1.03 2.68 0 3.84-2.34 4.69-4.57 4.93.36.31.68.92.68 1.85V21c0 .26.18.57.69.48A10 10 0 0 0 12 2z"/></svg><span>${setupRemoteBusy && setupRemoteProvider === "github" ? "Opening..." : "Sign in with GitHub"}</span></button>` : ""}
                        ${setupAudience === "organization" ? `<button class="googleSignIn" id="remoteSignInMicrosoft" ${setupRemoteBusy ? "disabled" : ""}><span style="font-weight:900;color:#2563eb">M</span><span>${setupRemoteBusy && setupRemoteProvider === "azure_ad" ? "Opening..." : "Microsoft 365"}</span></button>` : ""}
                      ` : `<button class="primary" id="remoteSignIn" ${setupRemoteBusy ? "disabled" : ""}>${setupRemoteBusy ? "Opening..." : "Sign in"}</button>`}
                    </div>
                  `}
                  <div id="remoteAuthError" class="error">${escapeHtml(setupRemoteError)}</div>
                  <div class="notice">${escapeHtml(setupRemoteNotice)}</div>
                </div>
              </section>
            ` : ""}
            ${currentId === "agents" ? `
              <section class="setupSection">
                <h2>Agents</h2>
                <p>Select agents to manage.</p>
                ${agentCards({ selectable: true })}
              </section>
            ` : ""}
            ${currentId === "plugins" ? `
              <section class="setupSection">
                <h2>Plugins</h2>
        <p>Search the OpenLeash plugin catalog and add reviewed plugins that should run on this device. Changes apply when you finish setup.</p>
                ${setupPluginInstallCards()}
              </section>
            ` : ""}
            ${setupStep >= steps.length ? `<div id="setupError" class="error">${escapeHtml(setupFinishError)}</div>` : ""}
          </div>
          <div class="actions">
            <button class="secondary" id="setupBack">Back</button>
            ${setupStep < steps.length
              ? `<button class="primary" id="setupNext" ${currentId === "local backend" && setupDockerBusy ? "disabled" : ""}>${currentId === "local backend" && setupDockerBusy ? "Starting..." : "Next"}</button>`
              : `<button class="primary" id="finish" ${setupFinishing ? "disabled" : ""}>${setupFinishing ? "Installing..." : "Install and start managing"}</button>`}
          </div>
          ${setupStep >= steps.length && (setupRemoteNotice || setupFinishError) ? `
            <div class="inlineNotice ${setupFinishError ? "error" : ""}">${escapeHtml(setupFinishError || setupRemoteNotice)}</div>
          ` : ""}
        `;
        const back = document.getElementById("setupBack");
        if (back) back.onclick = () => {
          rememberSetupInputs();
          setupStep = Math.max(0, setupStep - 1);
          renderSetup();
          scrollSetupTop();
        };
        const next = document.getElementById("setupNext");
        if (next) next.onclick = async () => {
          rememberSetupInputs();
          if (currentId === "connect" && setupAudience === "individual" && setupClientMode === "custom") {
            setupRemoteApiUrl = "http://127.0.0.1:9318";
            setupRemoteAuth = undefined;
            setupRemoteBootstrap = undefined;
            setupRemoteError = "";
          }
          if (currentId === "local backend") {
            setupRemoteApiUrl = "http://127.0.0.1:9318";
            if (!setupDockerStatus?.apiReachable) {
              await startSelfHostedRuntime();
            }
            if (!setupDockerStatus?.apiReachable) {
              setupRemoteError = setupDockerStatus?.status || "Start the local OpenLeash backend before continuing.";
              return renderSetup();
            }
            setupRemoteError = "";
          }
          if (currentId === "api" && setupClientMode === "custom") {
            const ok = await bootstrapRemoteSetup();
            if (!ok) return renderSetup();
          }
          if (currentId === "sign in" && setupClientMode === "cloud" && setupAudience === "organization") return;
          if (currentId === "sign in" && setupClientMode !== "personal" && !setupRemoteAuth) {
            setupRemoteError = "Sign in before continuing.";
            return renderSetup();
          }
          if (currentId === "sign in" && setupClientMode === "cloud" && setupAudience === "organization" && isPersonalEmail(setupRemoteAuth?.userEmail)) {
            setupRemoteError = "Use your company Google Workspace or Microsoft 365 account, not a personal email address.";
            setupRemoteAuth = undefined;
            return renderSetup();
          }
          setupStep = Math.min(steps.length, setupStep + 1);
          renderSetup();
          scrollSetupTop();
        };
        const finish = document.getElementById("finish");
        if (finish) finish.onclick = () => {
          finish.disabled = true;
          finish.textContent = "Installing...";
          void finishSetup();
        };
        bindAgentSelection();
        bindRuleSelection();
        bindPluginExpansion();
        bindPluginSelection();
        bindPluginMarketplaceSearch();
        bindPluginSettingInputs();
        bindAudienceSelection();
        bindConnectionSelection();
        bindModelSelection();
        bindRuleImport({ setup: true });
        const signIn = document.getElementById("remoteSignIn");
        if (signIn) signIn.onclick = () => startRemoteSignIn("google");
        const signInGithub = document.getElementById("remoteSignInGithub");
        if (signInGithub) signInGithub.onclick = () => startRemoteSignIn("github");
        const signInMicrosoft = document.getElementById("remoteSignInMicrosoft");
        if (signInMicrosoft) signInMicrosoft.onclick = () => startRemoteSignIn("azure_ad");
        const orgCloudGoogle = document.getElementById("orgCloudGoogle");
        if (orgCloudGoogle) orgCloudGoogle.onclick = () => startOrgCloudOnboarding("google");
        const orgCloudMicrosoft = document.getElementById("orgCloudMicrosoft");
        if (orgCloudMicrosoft) orgCloudMicrosoft.onclick = () => startOrgCloudOnboarding("microsoft");
        const startLocalBackend = document.getElementById("startLocalBackend");
        if (startLocalBackend) startLocalBackend.onclick = () => startSelfHostedRuntime();
        const checkLocalBackend = document.getElementById("checkDockerStatus");
        if (checkLocalBackend) checkLocalBackend.onclick = () => checkDockerStatus();
        const openLocalRules = document.getElementById("openLocalRules");
        if (openLocalRules) openLocalRules.onclick = () => window.openleash.openLocalConfig();
        if (currentId === "local backend" && setupAudience === "individual" && setupClientMode === "custom" && !setupDockerAutoStarted && !setupDockerBusy && !setupDockerStatus?.apiReachable) {
          setupDockerAutoStarted = true;
          window.setTimeout(() => startSelfHostedRuntime(), 80);
        }

      function rememberSetupInputs() {
        const audience = root.querySelector("[name=setupAudience]:checked");
        if (audience) setupAudience = audience.value;
        const mode = root.querySelector("[name=clientMode]:checked");
        if (mode) setupClientMode = mode.value;

        const remoteApi = document.getElementById("remoteApiUrl");

        const slug = document.getElementById("organizationSlug");

        root.querySelectorAll("[data-agent]").forEach((input) => {

          input.checked ? selectedAgents.add(input.dataset.agent) : selectedAgents.delete(input.dataset.agent);
        });
        root.querySelectorAll("[data-rule]").forEach((input) => {
          if (!selectedRules) selectedRules = new Map();
          selectedRules.set(input.dataset.rule, Boolean(input.checked));
        });
        root.querySelectorAll("[data-plugin-install]").forEach((input) => {
          if (!selectedPlugins) selectedPlugins = new Set();
          input.checked ? selectedPlugins.add(input.dataset.pluginInstall) : selectedPlugins.delete(input.dataset.pluginInstall);
          ensurePluginSetupConfig(input.dataset.pluginInstall).enabled = Boolean(input.checked);
        });
        (state.plugins || []).forEach((plugin) => {
          if (plugin.organizationPolicy?.mandatory) {
            if (!selectedPlugins) selectedPlugins = new Set();
            selectedPlugins.add(plugin.id);
            ensurePluginSetupConfig(plugin.id).enabled = true;
          }
        });
        root.querySelectorAll("[data-plugin-setting]").forEach((input) => {
          updatePluginSettingFromInput(input);
        });
        const provider = root.querySelector("[name=provider]:checked");
        if (provider) setupProvider = provider.value;
        const key = document.getElementById("apiKey");
        if (key) setupApiKey = key.value.trim();

      async function finishSetup() {
        if (setupFinishing) return;
        rememberSetupInputs();
        setupFinishError = "";
        if (setupAudience === "individual" && setupClientMode === "custom") {
          setupRemoteApiUrl = "http://127.0.0.1:9318";
          if (!setupDockerStatus?.apiReachable) {
            setupRemoteNotice = "Starting local OpenLeash...";
            renderSetup();
            await startSelfHostedRuntime();
          }
          if (!setupDockerStatus?.apiReachable) {
            setupFinishing = false;
            setupFinishError = setupDockerStatus?.status || "Start the local OpenLeash backend before finishing setup.";
            setupRemoteNotice = "";
            renderSetup();
            return;
          }
        }
        if (setupClientMode === "cloud" && setupAudience === "organization" && isPersonalEmail(setupRemoteAuth?.userEmail)) {
          setupRemoteError = "Use your company Google Workspace or Microsoft 365 account, not a personal email address.";
          setupRemoteAuth = undefined;
          setupStep = setupClientMode === "custom" ? 4 : 3;
          renderSetup();
          return;
        }
        setupFinishing = true;
        setupFinishError = "";
        setupRemoteNotice = setupRemoteAuth ? "Installing OpenLeash on this Mac..." : setupRemoteNotice;
        renderSetup();
        const agents = [...(selectedAgents || new Set())];
        const pluginSave = await saveSelectedPluginSettings();
        if (!pluginSave.ok) {
          setupFinishing = false;
          setupFinishError = pluginSave.error || "Could not save plugin settings.";
          setupRemoteNotice = "";
          renderSetup();
          return;
        }
        setupRemoteNotice = "Installing OpenLeash on this Mac...";
        renderSetup();
        const rules = (state.rules || []).map((rule) => ({
          ...rule,
          enabled: rule.locked ? true : (selectedRules?.get(rule.id) ?? Boolean(rule.enabled))
        }));
        const result = await window.openleash.setup({
          agents,
          policies: rules,
          audience: setupAudience,
          clientMode: setupClientMode,
          apiProvider: setupProvider,
          apiKey: setupApiKey,
          remoteApiUrl: setupRemoteApiUrl,
          remoteToken: setupRemoteAuth?.token,
          remoteOrganization: setupRemoteAuth?.organizationName || setupRemoteAuth?.organizationSlug,
          remoteUser: setupRemoteAuth?.userName || setupRemoteAuth?.userEmail,
          skipDashboardOpen: setupSkipDashboardOpenAfterInstall
        }).catch((error) => ({ ok: false, error: error?.message || "Setup could not be completed." }));
        if (result && result.ok === false) {
          setupFinishing = false;
          setupFinishError = result.error || "Setup could not be completed.";
          renderSetup();
        } else if (result?.ok) {
          setupFinishing = false;
          state = { ...state, ...result, setupComplete: true, mode: result.mode || "settings" };
          view = "overview";
          render(result);
        }
      }

      function startWelcomeAgentAnimation() {
        stopWelcomeAgentAnimation();
        const box = root.querySelector(".welcomeAgents");
        if (!box) return;
        const icons = [...box.querySelectorAll(".welcomeAgentIcon")].map((node) => ({
          node,
          x: Number(node.dataset.x || 0),
          y: Number(node.dataset.y || 0),
          vx: Number(node.dataset.vx || 0),
          vy: Number(node.dataset.vy || 0),
          r: Number(node.dataset.r || 0),
          vr: Number(node.dataset.vr || 0)
        }));
        let last = performance.now();
        const tick = (now) => {
          const delta = Math.min(34, now - last);
          last = now;
          const width = box.clientWidth;
          const height = box.clientHeight;
          for (const icon of icons) {
            const size = icon.node.offsetWidth || 34;
            icon.x += icon.vx * delta;
            icon.y += icon.vy * delta;
            icon.r += icon.vr * delta;
            if (icon.x <= 0 || icon.x >= width - size) {
              icon.x = Math.max(0, Math.min(width - size, icon.x));
              icon.vx *= -1;
              varyWelcomeAgentVelocity(icon);
            }
            if (icon.y <= 0 || icon.y >= height - size) {
              icon.y = Math.max(0, Math.min(height - size, icon.y));
              icon.vy *= -1;
              varyWelcomeAgentVelocity(icon);
            }
            icon.node.style.transform = `translate3d(${icon.x}px, ${icon.y}px, 0) rotate(${icon.r}deg)`;
          }
          welcomeAgentAnimation = requestAnimationFrame(tick);
        };
        welcomeAgentAnimation = requestAnimationFrame(tick);
      }

      function varyWelcomeAgentVelocity(icon) {
        const speed = Math.hypot(icon.vx, icon.vy) || .1;
        const angle = Math.atan2(icon.vy, icon.vx) + (Math.random() - .5) * .42;
        const nextSpeed = Math.max(.055, Math.min(.14, speed * (.92 + Math.random() * .16)));
        icon.vx = Math.cos(angle) * nextSpeed;
        icon.vy = Math.sin(angle) * nextSpeed;
        icon.vr = (Math.random() - .5) * .018;
      }

      function stopWelcomeAgentAnimation() {
        if (!welcomeAgentAnimation) return;
        cancelAnimationFrame(welcomeAgentAnimation);
        welcomeAgentAnimation = 0;
      }

      async function bootstrapRemoteSetup() {

          setupOrganizationSlug = "";

          apiUrl: setupRemoteApiUrl,
          organizationSlug: setupOrganizationSlug
        }).catch((error) => ({
          ok: false,
          error: error?.message || "Could not reach that OpenLeash API."
        }));
        if (!result?.ok) {
          setupRemoteError = result?.error || "Could not reach that OpenLeash API.";
          return false;

        setupRemoteBootstrap = result;
        setupRemoteApiUrl = result.apiUrl || setupRemoteApiUrl;

      async function startRemoteSignIn(providerOverride) {
        rememberSetupInputs();
        setupRemoteProvider = providerOverride || setupRemoteProvider || "google";
        setupRemoteBusy = true;

        setupRemoteNotice = "";
        renderSetup();
        const ok = setupRemoteBootstrap ? true : await bootstrapRemoteSetup();
        if (!ok) {
          setupRemoteBusy = false;
          return renderSetup();
        }
        const provider = setupClientMode === "cloud"
          ? { type: setupRemoteProvider }
          : (setupRemoteBootstrap.providers || [])[0] || { type: "sso" };
        const organization = setupAudience === "organization" ? setupRemoteBootstrap.organization || {} : {};
        const result = await window.openleash.startRemoteAuth({
          apiUrl: setupRemoteApiUrl,
          audience: setupAudience,
          providerType: provider.type || provider.providerType || "google",
          organizationId: setupAudience === "organization" ? organization.id : undefined,
          organizationSlug: setupAudience === "organization" ? setupOrganizationSlug || organization.slug : undefined
        }).catch((error) => ({
          ok: false,
          error: error?.message || "Could not start sign-in."

        setupRemoteBusy = false;
        if (!result?.ok) {
          setupRemoteError = result?.error || "Could not start sign-in.";

      async function loadManagedRules() {
        if (!setupRemoteAuth?.token || setupClientMode === "personal") return;
        const result = await window.openleash.remoteState({
          apiUrl: setupRemoteApiUrl,
          token: setupRemoteAuth.token
        }).catch(() => undefined);
        if (!result?.ok) return;
        if (Array.isArray(result.policies)) {
          state.rules = result.policies.map((policy) => ({
            id: policy.id,
            name: policy.name,
            category: categoryForManagedRule(policy),
            description: policy.description || policy.natural_language_rule || "Managed OpenLeash rule.",
            enabled: Boolean(policy.enabled || policy.locked),
            locked: Boolean(policy.locked),
            managedByOrganization: Boolean(policy.managedByOrganization || policy.managed_by_organization)
          }));
          selectedRules = new Map((state.rules || []).map((rule) => [rule.id, rule.locked ? true : Boolean(rule.enabled)]));
        }
        if (Array.isArray(result.plugins)) {
          state.plugins = result.plugins;
          initializePluginSetupState(true);
        }
      }

      function categoryForManagedRule(policy) {
        const text = `${policy.name || ""} ${policy.description || ""} ${policy.natural_language_rule || ""}`.toLowerCase();
        if (/credential|secret|token|personal|private key|\.env/.test(text)) return "Security";
        if (/git|branch|commit|push|history/.test(text)) return "Git";
        if (/package|dependency|lockfile|npm|pip|yarn|pnpm/.test(text)) return "Packages";
        if (/cloud|terraform|kubernetes|infrastructure|filesystem|delete/.test(text)) return "Infrastructure";
        if (/database|external|upload|sharing|exfiltrat/.test(text)) return "Data";
        return "Managed rules";
      }

      function installedPlugins() {
        return (state.plugins || []).filter((plugin) => plugin.organizationPolicy?.mandatory || plugin.settings?.enabled === true);
      }

      function availablePlugins() {
        return (state.plugins || []).filter((plugin) => !plugin.organizationPolicy?.mandatory && plugin.settings?.enabled !== true);
      }

      function pluginInstalled(plugin) {
        return Boolean(
          plugin?.organizationPolicy?.mandatory ||
          plugin?.installed === true ||
          plugin?.settings?.enabled === true ||
          plugin?.settings?.installedVersion ||
          [...(plugin?.settings?.inheritedProfiles || []), ...(plugin?.settings?.profiles || [])]
            .some((profile) => profile.enabled === true)
        );
      }

      function pluginStatusLabel(plugin) {
        if (plugin?.settings?.runtimeAvailable === false) return "unavailable";
        if (plugin?.organizationPolicy?.mandatory) return "required";
        return pluginInstalled(plugin) ? "installed" : "available";
      }

      function clientPluginCategories() {
        const fromViewModel = state.viewModel?.pluginCategories;
        const plugins = installedPlugins().sort(comparePluginPopularity);
        if (Array.isArray(fromViewModel) && fromViewModel.length > 0) {
          return fromViewModel.map((category) => ({
            id: category.id,
            label: category.label || categoryLabel(category.id),
            plugins: Array.isArray(category.plugins) && category.plugins.length > 0
              ? category.plugins
              : plugins.filter((plugin) => pluginCategory(plugin).toLowerCase() === category.id),
            count: Number(category.count || category.plugins?.length || 0)
          }));
        }
        return ["observability", "cost", "security", "utility"].map((id) => {
          const label = categoryLabel(id);
          const items = plugins.filter((plugin) => pluginCategory(plugin).toLowerCase() === id);
          return { id, label, plugins: items, count: items.length };
        });
      }

      function clientPluginCatalogItem(pluginView) {
        const plugin = (state.plugins || []).find((item) => item.id === pluginView?.id);
        if (plugin) return plugin;
        return {
          id: pluginView?.id || "",
          slug: pluginView?.packageId || pluginView?.id || "",
          name: pluginView?.displayName || pluginView?.packageId || pluginView?.id || "plugin",
          description: pluginView?.description || "",
          publisher: pluginView?.author || "Unknown",
          settings: pluginView?.settings || { enabled: Boolean(pluginView?.installed), config: {} },
          organizationPolicy: pluginView?.organizationPolicy,
          defaultConfig: pluginView?.defaultConfig,
          configSchema: pluginView?.configSchema,
          marketplace: {
            slug: pluginView?.packageId || pluginView?.id || "",
            shortDescription: pluginView?.description || "",
            developerName: pluginView?.author || "Unknown",
            iconText: pluginView?.iconText,
            downloadCount: pluginView?.downloadCount || 0,
            category: pluginView?.category

      }

        if (id === "cost") return "Cost";

        if (id === "observability") return "Visibility";

      function localPluginDebugRows() {
        return (state.history || [])
          .flatMap((item) => {
            const runs = Array.isArray(item.payload?.openleashPluginRuns) ? item.payload.openleashPluginRuns : [];
            const responsibleRun = runs.find((run) => ["blocked", "needs_question", "failed"].includes(String(run.status || "").toLowerCase()));
            const context = {
              eventName: item.event_name || item.payload?.eventName || "event",
              agentName: item.agent_name,
              projectPath: item.project_path,
              sessionId: item.payload?.sessionId
            };
            const lifecycle = [{
              id: `${item.id}:received`,
              pluginId: logPluginSlug(responsibleRun?.pluginId || responsibleRun?.plugin_id || "openleash-core"),
              level: item.decision === "ask" ? "security" : item.decision === "deny" ? "security" : "debug",
              summary: item.decision === "ask" ? "Approval requested; agent hook is waiting." : `Hook evaluated: ${item.decision || "recorded"}.`,
              ...context,
              createdAt: item.created_at,
              raw: { stage: "evaluated", timestamp: item.created_at, decisionId: item.id, decision: item.decision, question: item.question }
            }];
            if (resolutionTime(item)) lifecycle.push({
              id: `${item.id}:resolved`,
              pluginId: "openleash.approval",
              level: item.resolution === "deny" ? "security" : "debug",
              summary: `Approval resolved: ${item.resolution || item.decision}.`,
              ...context,
              createdAt: resolutionTime(item),
              raw: { stage: "resolved", timestamp: resolutionTime(item), decisionId: item.id, resolution: item.resolution }
            });
            return [...lifecycle, ...runs.map((run, index) => ({
              id: `${item.id}:${index}`,
              pluginId: logPluginSlug(run.pluginId || run.plugin_id || "openleash.plugin"),
              level: run.error ? "error" : run.decision === "deny" ? "security" : "debug",
              summary: normalizeTokenSaverText(run.summary || run.message || run.kind || "Plugin run completed."),
              ...context,
              createdAt: item.created_at,
              raw: { pluginRun: run, event: item }
            }))];
          })
          .sort((left, right) => new Date(right.createdAt || 0).getTime() - new Date(left.createdAt || 0).getTime())
          .slice(0, 120);
      }

      function exactTimestamp(value) {
        const date = new Date(value || 0);
        return Number.isNaN(date.getTime()) ? String(value || "Unknown") : `${date.toLocaleString()} · ${date.toISOString()}`;
      }

      function humanTimestamp(value) {
        const date = new Date(value || 0);
        if (Number.isNaN(date.getTime())) return String(value || "Unknown");
        const elapsed = Math.max(0, Date.now() - date.getTime());
        const minutes = Math.floor(elapsed / 60000);
        if (minutes < 1) return "just now";
        if (minutes < 60) return `${minutes}m ago`;
        const hours = Math.floor(minutes / 60);
        if (hours < 24 && date.toDateString() === new Date().toDateString()) return `${hours}h ago`;
        const yesterday = new Date();
        yesterday.setDate(yesterday.getDate() - 1);
        if (date.toDateString() === yesterday.toDateString()) return `Yesterday at ${date.toLocaleTimeString([], { hour: "numeric", minute: "2-digit" })}`;
        const days = Math.floor(elapsed / 86400000);
        if (days < 7) return `${days}d ago`;
        return date.toLocaleDateString([], { month: "short", day: "numeric", year: date.getFullYear() === new Date().getFullYear() ? undefined : "numeric" });
      }

      function logPluginSlug(value) {
        const slug = String(value || "openleash-core").replace(/^openleash\./, "");
        return slug === "prompt-compression" ? "token-saver" : slug;
      }

      function normalizeTokenSaverText(value) {
        return String(value || "").replace(/token saver/gi, "token-saver").replace(/prompt-compression/gi, "token-saver");
      }
