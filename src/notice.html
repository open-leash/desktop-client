<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OpenLeash Island</title>
    <style>
      :root {
        color-scheme: dark;
        --surface: rgba(8, 9, 11, .97);
        --surface-2: #14161a;
        --surface-3: #1d2025;
        --ink: #f7f7f3;
        --muted: #969ba5;
        --line: rgba(255,255,255,.10);
        --green: #47df9b;
        --cyan: #50d5ff;
        --amber: #ffb84d;
        --red: #ff665f;
      }
      * { box-sizing: border-box; }
      [hidden] { display: none !important; }
      html, body { margin: 0; width: 100%; min-height: 100%; overflow: hidden; background: transparent; }
      body {
        padding: 3px 5px 12px;
        color: var(--ink);
        font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        -webkit-font-smoothing: antialiased;
        user-select: none;
      }
      .island {
        overflow: hidden;
        border: 1px solid rgba(255,255,255,.12);
        border-radius: 22px;
        background: var(--surface);
        box-shadow: 0 18px 50px rgba(0,0,0,.38), inset 0 1px rgba(255,255,255,.04);
        transform-origin: top center;
        animation: arrive 180ms cubic-bezier(.2,.85,.2,1) both;
      }
      @keyframes arrive { from { opacity: 0; transform: translateY(-8px) scale(.94); } }
      .bar { min-height: 54px; display: flex; align-items: center; gap: 10px; padding: 10px 13px; }
      .glyph {
        width: 32px; height: 32px; flex: 0 0 32px; display: grid; place-items: center;
        border: 1px solid var(--line); border-radius: 10px; background: var(--surface-2);
        font: 800 11px/1 ui-monospace, SFMono-Regular, Consolas, monospace;
      }
      .glyph img { width: 19px; height: 19px; object-fit: contain; filter: brightness(0) invert(1); }
      .status { width: 7px; height: 7px; flex: 0 0 7px; border-radius: 50%; background: var(--amber); box-shadow: 0 0 12px currentColor; }
      .status.completed, .status.subagent_completed { background: var(--green); }
      .status.question { background: var(--cyan); }
      .status.blocked { background: var(--red); }
      .heading { min-width: 0; flex: 1; }
      .eyebrow { color: var(--muted); font: 650 10px/1.2 ui-monospace, SFMono-Regular, Consolas, monospace; letter-spacing: .02em; }
      .title { overflow: hidden; margin-top: 3px; font-size: 13px; font-weight: 720; line-height: 1.2; text-overflow: ellipsis; white-space: nowrap; }
      .count { min-width: 22px; padding: 4px 7px; border: 1px solid var(--line); border-radius: 999px; color: var(--muted); font: 700 10px/1 ui-monospace, SFMono-Regular, Consolas, monospace; text-align: center; }
      .close { width: 27px; height: 27px; border: 0; border-radius: 9px; color: var(--muted); background: transparent; font-size: 17px; cursor: pointer; }
      .close:hover { color: var(--ink); background: var(--surface-3); }
      .content { display: none; padding: 0 13px 13px; border-top: 1px solid var(--line); }
      .content.visible { display: block; }
      .summary { margin: 11px 1px 0; color: #e7e8e5; font-size: 13px; line-height: 1.4; white-space: pre-wrap; }
      .purpose, .evidence { margin: 9px 0 0; padding: 9px 10px; border-radius: 11px; background: var(--surface-2); color: var(--muted); font-size: 11px; line-height: 1.4; }
      .purpose b { color: var(--ink); }
      .evidence { max-height: 118px; overflow: auto; color: #c9ccd2; font-family: ui-monospace, SFMono-Regular, Consolas, monospace; white-space: pre-wrap; user-select: text; }
      .chips { display: flex; gap: 6px; margin-top: 9px; }
      .chip { min-width: 0; overflow: hidden; padding: 5px 8px; border-radius: 8px; color: var(--muted); background: var(--surface-2); font-size: 10px; text-overflow: ellipsis; white-space: nowrap; }
      .questions { margin-top: 10px; }
      .question + .question { margin-top: 13px; padding-top: 12px; border-top: 1px solid var(--line); }
      .question-label { margin: 0 0 7px; color: var(--ink); font-size: 12px; font-weight: 680; line-height: 1.35; }
      .option { width: 100%; display: flex; align-items: flex-start; gap: 8px; margin-top: 5px; padding: 8px 9px; border: 1px solid var(--line); border-radius: 10px; color: #d7d9dc; background: var(--surface-2); font: inherit; font-size: 11px; line-height: 1.3; text-align: left; cursor: pointer; }
      .option:hover, .option.selected { border-color: rgba(80,213,255,.48); background: rgba(31,97,113,.32); }
      .option-key { color: var(--cyan); font-family: ui-monospace, SFMono-Regular, Consolas, monospace; }
      .option-copy { min-width: 0; }
      .option-description { display: block; margin-top: 2px; color: var(--muted); }
      textarea, input[type="text"] { width: 100%; border: 1px solid var(--line); border-radius: 10px; outline: none; color: var(--ink); background: var(--surface-2); font: inherit; font-size: 11px; user-select: text; }
      textarea:focus, input[type="text"]:focus { border-color: rgba(80,213,255,.48); box-shadow: 0 0 0 2px rgba(80,213,255,.10); }
      textarea { min-height: 58px; margin-top: 9px; padding: 9px 10px; resize: none; line-height: 1.35; }
      input[type="text"] { margin-top: 6px; padding: 8px 9px; }
      .plan { max-height: 330px; overflow: auto; margin: 10px 0 0; padding: 10px; border: 1px solid var(--line); border-radius: 11px; color: #d8dadf; background: var(--surface-2); font: 11px/1.48 ui-monospace, SFMono-Regular, Consolas, monospace; white-space: pre-wrap; user-select: text; }
      .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; margin-top: 10px; }
      .actions.single { grid-template-columns: 1fr; }
      .action { min-height: 35px; border: 1px solid var(--line); border-radius: 10px; font: 720 11px/1 inherit; cursor: pointer; }
      .secondary { color: #e8e8e5; background: var(--surface-3); }
      .primary { color: #07110d; border-color: transparent; background: var(--green); }
      .answer { color: #041216; border-color: transparent; background: var(--cyan); }
      .danger { color: #ffd5d1; background: rgba(141,38,35,.44); }
      .action:disabled { opacity: .45; cursor: default; }
      .remember { display: flex; align-items: center; gap: 7px; margin-top: 8px; color: var(--muted); font-size: 10px; }
      .remember input { accent-color: var(--green); }
      .hint { margin-top: 7px; color: #737882; font: 9px/1.3 ui-monospace, SFMono-Regular, Consolas, monospace; text-align: center; }
    </style>
  </head>
  <body>
    <main class="island" id="island">
      <header class="bar">
        <div class="glyph" id="glyph">OL</div>
        <span class="status" id="status"></span>
        <div class="heading"><div class="eyebrow" id="eyebrow">OpenLeash</div><div class="title" id="title">Agent activity</div></div>
        <span class="count" id="count" hidden></span>
        <button class="close" id="close" aria-label="Dismiss">×</button>
      </header>
      <section class="content" id="content">
        <p class="summary" id="summary"></p>
        <div class="purpose" id="purpose" hidden></div>
        <pre class="evidence" id="evidence" hidden></pre>
        <div class="chips" id="chips"></div>
        <div class="questions" id="questions"></div>
        <pre class="plan" id="plan" hidden></pre>
        <textarea id="guidance" maxlength="500" placeholder="Optional guidance for the agent" hidden></textarea>
        <label class="remember" id="rememberRow" hidden><input id="remember" type="checkbox" /> Remember this choice for 5 minutes</label>
        <div class="actions" id="actions"></div>
        <div class="hint" id="hint"></div>
      </section>
    </main>
    <script>
      let current;
      let selectedAnswers = new Map();
      const $ = (id) => document.getElementById(id);
      const glyph = $("glyph"), status = $("status"), eyebrow = $("eyebrow"), title = $("title"), count = $("count");
      const content = $("content"), summary = $("summary"), purpose = $("purpose"), evidence = $("evidence"), chips = $("chips");
      const questions = $("questions"), plan = $("plan"), guidance = $("guidance"), rememberRow = $("rememberRow"), remember = $("remember");
      const actions = $("actions"), hint = $("hint");

      function initials(name) { return (name || "AI").split(/\s+/).map((part) => part[0]).join("").slice(0, 2).toUpperCase(); }
      function setGlyph(payload) {
        glyph.innerHTML = "";
        if (payload.agentIcon) { const image = document.createElement("img"); image.src = payload.agentIcon; image.alt = ""; glyph.appendChild(image); }
        else glyph.textContent = initials(payload.agentName);
      }
      function button(label, className, action) {
        const item = document.createElement("button"); item.className = `action ${className}`; item.textContent = label; item.dataset.action = action; return item;
      }
      function reset() {
        selectedAnswers = new Map(); questions.innerHTML = ""; actions.innerHTML = ""; chips.innerHTML = ""; guidance.value = "";
        summary.hidden = false;
        purpose.hidden = true; evidence.hidden = true; plan.hidden = true; guidance.hidden = true; rememberRow.hidden = true; hint.textContent = "";
      }
      function resize() { requestAnimationFrame(() => window.openleash.resizeNotice(Math.ceil(document.body.scrollHeight + 2))); }
      const observer = new ResizeObserver(resize); observer.observe($("island"));

      window.openleash.onNotice((payload) => {
        current = payload; reset(); setGlyph(payload);
        const kind = payload.interaction?.type === "questions"
          ? "question"
          : payload.interaction?.type === "plan"
            ? "plan_review"
            : payload.interaction?.type === "approval"
              ? "approval"
              : payload.kind;
        status.className = `status ${kind || "approval"}`;
        eyebrow.textContent = `${payload.agentName || "Agent"} · ${payload.time || "now"}`;
        title.textContent = payload.title || (kind === "question" ? `${payload.agentName} asks` : kind === "plan_review" ? `${payload.agentName} has a plan` : payload.id ? `Permission request` : "Agent activity");
        count.hidden = !(payload.pendingCount > 1); count.textContent = payload.pendingCount || "";
        summary.textContent = payload.summary || "The agent is waiting for you.";
        content.classList.add("visible");
        if (payload.purpose && kind === "approval") { purpose.hidden = false; purpose.innerHTML = ""; const label = document.createElement("b"); label.textContent = "Why now · "; purpose.append(label, document.createTextNode(payload.purpose)); }
        if (payload.evidence && kind === "approval") { evidence.hidden = false; evidence.textContent = payload.evidence; }
        for (const value of [payload.project, payload.pluginName].filter(Boolean)) { const chip = document.createElement("span"); chip.className = "chip"; chip.textContent = value; chips.appendChild(chip); }

        if (kind === "question") renderQuestions(payload);
        else if (kind === "plan_review") renderPlan(payload);
        else if (payload.id) renderApproval(payload);
        else renderActivity(payload);
        resize();
      });

      function renderApproval(payload) {
        guidance.hidden = !payload.supportsGuidance;
        rememberRow.hidden = false;
        actions.append(button("Deny", "danger", "deny"), button("Allow once", "primary", "allow"));
        hint.textContent = "Esc deny · Enter allow";
      }

      function renderQuestions(payload) {
        const items = payload.interaction?.questions || [];
        summary.hidden = items.length > 0;
        items.forEach((item, questionIndex) => {
          const wrap = document.createElement("div"); wrap.className = "question";
          const label = document.createElement("p"); label.className = "question-label"; label.textContent = item.question; wrap.appendChild(label);
          (item.options || []).forEach((option, optionIndex) => {
            const optionButton = document.createElement("button"); optionButton.className = "option"; optionButton.type = "button";
            const key = document.createElement("span"); key.className = "option-key"; key.textContent = `${optionIndex + 1}`;
            const copy = document.createElement("span"); copy.className = "option-copy"; copy.textContent = option.label;
            if (option.description) { const description = document.createElement("span"); description.className = "option-description"; description.textContent = option.description; copy.appendChild(description); }
            optionButton.append(key, copy);
            optionButton.addEventListener("click", () => selectOption(item, option.label, optionButton, wrap)); wrap.appendChild(optionButton);
          });
          const other = document.createElement("input"); other.type = "text"; other.placeholder = "Type another answer…";
          other.addEventListener("input", () => { if (other.value.trim()) { selectedAnswers.set(item.question, other.value.trim()); wrap.querySelectorAll(".option").forEach((node) => node.classList.remove("selected")); } syncAnswerButton(items); });
          wrap.appendChild(other); questions.appendChild(wrap);
        });
        actions.className = "actions single"; actions.append(button("Send answer", "answer", "answer")); syncAnswerButton(items);
        hint.textContent = "Your answer is returned directly to the waiting agent";
      }

      function selectOption(question, label, element, wrap) {
        if (question.multiSelect) {
          const existing = selectedAnswers.get(question.question);
          const currentValues = new Set(Array.isArray(existing) ? existing : []);
          currentValues.has(label) ? currentValues.delete(label) : currentValues.add(label);
          selectedAnswers.set(question.question, [...currentValues]); element.classList.toggle("selected");
        } else { selectedAnswers.set(question.question, label); wrap.querySelectorAll(".option").forEach((node) => node.classList.toggle("selected", node === element)); }
        const input = wrap.querySelector('input[type="text"]'); if (input) input.value = ""; syncAnswerButton(current.interaction?.questions || []);
      }
      function syncAnswerButton(items) {
        const submit = actions.querySelector('[data-action="answer"]');
        if (submit) submit.disabled = !items.length || items.some((item) => {
          const answer = selectedAnswers.get(item.question);
          return Array.isArray(answer) ? answer.length === 0 : !answer;
        });
      }

      function renderPlan(payload) {
        if (payload.interaction?.markdown) { plan.hidden = false; plan.textContent = payload.interaction.markdown; }
        guidance.hidden = false; guidance.placeholder = "Feedback if you want the agent to revise the plan";
        actions.append(button("Request changes", "danger", "deny"), button("Approve plan", "primary", "approve-plan"));
        hint.textContent = "Review before the agent starts changing files";
      }

      function renderActivity(payload) {
        actions.className = payload.canJump ? "actions" : "actions single";
        if (payload.canJump) actions.append(button("Open agent", "secondary", "jump"));
        actions.append(button("Dismiss", "primary", "dismiss"));
      }

      actions.addEventListener("click", async (event) => {
        const target = event.target.closest("button"); if (!target || !current || target.disabled) return;
        actions.querySelectorAll("button").forEach((item) => item.disabled = true);
        const action = target.dataset.action;
        if (action === "dismiss") return window.openleash.dismissNotice();
        if (action === "jump") return window.openleash.jumpToAgent({ agentKind: current.agentKind, session: current.session });
        if (action === "answer") {
          const original = current.interaction?.originalInput || {};
          return window.openleash.resolve(current.id, "allow", "", 0, { ...original, answers: Object.fromEntries(selectedAnswers) });
        }
        if (action === "approve-plan") return window.openleash.resolve(current.id, "allow", "", 0, current.interaction?.originalInput || {});
        const resolution = action === "allow" ? "allow" : "deny";
        return window.openleash.resolve(current.id, resolution, resolution === "deny" ? guidance.value : "", remember.checked ? 300000 : 0);
      });
      $("close").addEventListener("click", () => window.openleash.dismissNotice());
      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape") { event.preventDefault(); if (current?.id && current.interaction?.type === "approval") actions.querySelector('[data-action="deny"]')?.click(); else window.openleash.dismissNotice(); }
        if (event.key === "Enter" && !event.shiftKey && document.activeElement?.tagName !== "TEXTAREA" && current?.id && current.interaction?.type === "approval") { event.preventDefault(); actions.querySelector('[data-action="allow"]')?.click(); }
      });
    </script>
  </body>
</html>
