<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OpenLeash Island</title>
    <style>
      :root {
        color-scheme: dark;
        --black: #000000;
        --panel: rgba(17, 19, 22, .94);
        --panel-hover: rgba(27, 30, 34, .96);
        --ink: #f8f8f7;
        --soft-ink: #d6d7d8;
        --muted: #898e96;
        --faint: #5d626a;
        --line: rgba(255, 255, 255, .095);
        --green: #55e7a7;
        --cyan: #58d8ff;
        --amber: #ffb64a;
        --red: #ff6b64;
        --ease: cubic-bezier(.22, .9, .26, 1);
        --hardware-safe-top: 0px;
        --hardware-notch-width: 0px;
      }

      * { box-sizing: border-box; }
      [hidden] { display: none !important; }
      html, body {
        margin: 0;
        width: 100%;
        min-height: 100%;
        overflow: hidden;
        background: transparent;
      }
      body {
        display: flex;
        justify-content: center;
        align-items: flex-start;
        padding: 0 96px 112px;
        color: var(--ink);
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI Variable Text", "Segoe UI", sans-serif;
        font-synthesis: none;
        -webkit-font-smoothing: antialiased;
        text-rendering: geometricPrecision;
        user-select: none;
      }

      .island {
        position: relative;
        flex: 0 0 auto;
        width: 286px;
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, .115);
        border-radius: 18px;
        background: var(--black);
        box-shadow:
          0 30px 76px rgba(0, 0, 0, .27),
          0 10px 30px rgba(0, 0, 0, .18),
          inset 0 1px rgba(255, 255, 255, .055);
        opacity: 0;
        transform: translateY(-14px) scale(.92, .72);
        transform-origin: top center;
        transition:
          width 340ms var(--ease),
          border-radius 340ms var(--ease),
          opacity 180ms ease-out,
          transform 380ms var(--ease),
          filter 180ms ease-out;
        will-change: width, transform;
      }
      body.native-macos .island {
        border-top: 0;
        border-radius: 0 0 18px 18px;
        box-shadow:
          0 34px 84px rgba(0, 0, 0, .29),
          0 10px 30px rgba(0, 0, 0, .18),
          inset 0 -1px rgba(255, 255, 255, .05);
      }
      .island.presented { opacity: 1; transform: translateY(0) scale(1); }
      .island.expanded { width: 540px; border-radius: 26px; }
      body.native-macos .island.expanded { border-radius: 0 0 27px 27px; }
      .island.leaving { opacity: 0; transform: translateY(-12px) scale(.94, .7); filter: blur(2px); }

      .cap {
        min-height: 46px;
        display: flex;
        align-items: center;
        gap: 9px;
        padding: 7px 10px;
        cursor: default;
      }
      body.native-macos.has-display-notch .cap {
        padding-top: calc(7px + var(--hardware-safe-top));
      }
      body.native-macos.has-display-notch .island { width: 430px; }
      body.native-macos.has-display-notch .island.expanded { width: 540px; }
      .notch-rail { display: none; }
      body.native-macos.has-display-notch .notch-rail {
        position: absolute;
        z-index: 3;
        top: 0;
        left: 0;
        right: 0;
        height: var(--hardware-safe-top);
        display: grid;
        grid-template-columns: minmax(0, 1fr) var(--hardware-notch-width) minmax(0, 1fr);
        align-items: center;
        pointer-events: none;
      }
      .notch-agents, .notch-metric { min-width: 0; display: flex; align-items: center; gap: 5px; }
      .notch-agents { justify-content: flex-end; padding-right: 9px; }
      .notch-metric { justify-content: flex-start; padding-left: 9px; }
      body.native-macos.has-display-notch .island.expanded .notch-agents {
        justify-content: flex-start;
        padding-right: 0;
        padding-left: 12px;
      }
      .notch-agent {
        width: 18px;
        height: 18px;
        display: grid;
        place-items: center;
        overflow: hidden;
        border: 1px solid rgba(255,255,255,.13);
        border-radius: 6px;
        background: #1a1d21;
        color: var(--soft-ink);
        font-size: 7px;
        font-weight: 750;
      }
      .notch-agent img { width: 12px; height: 12px; object-fit: contain; }
      .notch-agent.running img, .cap-agent.running img { animation: agent-running 3.2s linear infinite; }
      .notch-agent.running:not(:has(img)), .cap-agent.running:not(:has(img)) { animation: agent-pulse 1.8s ease-in-out infinite; }
      @keyframes agent-running { to { transform: rotate(360deg); } }
      @keyframes agent-pulse { 50% { opacity: .55; transform: scale(.88); } }
      .notch-metric-value { overflow: hidden; color: var(--green); font-size: 9px; font-weight: 700; text-overflow: ellipsis; white-space: nowrap; }
      .notch-metric-value.danger { color: var(--red); background: transparent; border: 0; }
      .cap-metric { color: var(--green); font-size: 9px; font-weight: 700; white-space: nowrap; }
      body.native-macos.has-display-notch .cap-metric { display: none; }
      .island.expandable .cap { cursor: pointer; }
      .cap-agents { display: none; align-items: center; gap: 5px; }
      .cap-agent {
        width: 24px;
        height: 24px;
        display: grid;
        place-items: center;
        overflow: hidden;
        border: 1px solid rgba(255,255,255,.12);
        border-radius: 8px;
        background: #1a1d21;
        color: var(--soft-ink);
        font-size: 8px;
        font-weight: 750;
      }
      .cap-agent img { width: 15px; height: 15px; object-fit: contain; }
      .island.activity-mode:not(.expanded) { width: 180px; }
      .island.activity-mode:not(.expanded) .agent-mark,
      .island.activity-mode:not(.expanded) .signal-wrap,
      .island.activity-mode:not(.expanded) .cap-copy { display: none; }
      .island.activity-mode:not(.expanded) .cap-agents { display: flex; }
      body.native-macos.has-display-notch .island.activity-mode:not(.expanded) {
        width: 430px;
        height: var(--hardware-safe-top);
        min-height: var(--hardware-safe-top);
        border-radius: 0;
      }
      body.native-macos.has-display-notch .island.activity-mode:not(.expanded) .cap { display: none; }
      body.native-macos.has-display-notch .island.activity-mode:not(.expanded) .notch-rail {
        pointer-events: auto;
        cursor: pointer;
      }
      .agent-mark {
        width: 31px;
        height: 31px;
        flex: 0 0 31px;
        display: grid;
        place-items: center;
        overflow: hidden;
        border: 1px solid rgba(255,255,255,.1);
        border-radius: 10px;
        color: #ececea;
        background: linear-gradient(145deg, #25282d, #111316);
        box-shadow: inset 0 1px rgba(255,255,255,.06);
        font-size: 10px;
        font-weight: 750;
        letter-spacing: -.02em;
      }
      .agent-mark img { width: 18px; height: 18px; object-fit: contain; }
      .signal-wrap { position: relative; width: 8px; height: 8px; flex: 0 0 8px; }
      .signal {
        position: absolute;
        inset: 0;
        border-radius: 50%;
        color: var(--amber);
        background: currentColor;
        box-shadow: 0 0 11px currentColor;
      }
      .signal::after {
        content: "";
        position: absolute;
        inset: -4px;
        border: 1px solid currentColor;
        border-radius: 50%;
        opacity: 0;
        animation: breathe 1.8s ease-out infinite;
      }
      .signal.completed, .signal.subagent_completed { color: var(--green); }
      .signal.question { color: var(--cyan); }
      .signal.blocked { color: var(--red); }
      .signal.plan_review { color: #b99cff; }
      @keyframes breathe { 0% { transform: scale(.4); opacity: .6; } 70%, 100% { transform: scale(1.25); opacity: 0; } }

      .cap-copy { min-width: 0; flex: 1; }
      .eyebrow {
        overflow: hidden;
        color: var(--muted);
        font-size: 10.5px;
        font-weight: 560;
        line-height: 1.15;
        letter-spacing: -.01em;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .cap-title {
        overflow: hidden;
        margin-top: 2px;
        color: var(--ink);
        font-size: 13px;
        font-weight: 650;
        line-height: 1.16;
        letter-spacing: -.015em;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .queue-count {
        min-width: 21px;
        padding: 4px 6px;
        border: 1px solid var(--line);
        border-radius: 999px;
        color: var(--soft-ink);
        background: rgba(255,255,255,.055);
        font-size: 10px;
        font-variant-numeric: tabular-nums;
        text-align: center;
      }
      .icon-button {
        width: 27px;
        height: 27px;
        flex: 0 0 27px;
        display: grid;
        place-items: center;
        border: 0;
        border-radius: 9px;
        outline: none;
        color: var(--faint);
        background: transparent;
        cursor: pointer;
        transition: color 140ms ease, background 140ms ease, transform 260ms var(--ease);
      }
      .icon-button:hover { color: var(--ink); background: rgba(255,255,255,.075); }
      .toggle svg { transition: transform 300ms var(--ease); }
      .island.expanded .toggle svg { transform: rotate(180deg); }
      .close { display: none; }
      .island.expanded .close { display: grid; }

      .reveal {
        display: grid;
        grid-template-rows: 0fr;
        opacity: 0;
        visibility: hidden;
        transition: grid-template-rows 340ms var(--ease), opacity 180ms ease 20ms, visibility 0s linear 340ms;
      }
      .island.expanded .reveal { grid-template-rows: 1fr; opacity: 1; visibility: visible; transition-delay: 0s; }
      .reveal-clip { min-height: 0; overflow: hidden; }
      .content {
        padding: 3px 17px 17px;
        border-top: 1px solid rgba(255,255,255,.075);
      }
      .summary {
        margin: 14px 1px 0;
        color: #ececeb;
        font-size: 14px;
        font-weight: 470;
        line-height: 1.42;
        letter-spacing: -.012em;
        white-space: pre-wrap;
      }
      .purpose, .evidence-block {
        margin: 10px 0 0;
        padding: 10px 11px;
        border: 1px solid rgba(255,255,255,.055);
        border-radius: 13px;
        background: var(--panel);
        color: var(--muted);
        font-size: 11.5px;
        line-height: 1.42;
      }
      .purpose b { color: var(--soft-ink); font-weight: 620; }
      .evidence-block { padding: 0; overflow: hidden; }
      .evidence-label {
        padding: 9px 11px 7px;
        border-bottom: 1px solid rgba(255,255,255,.055);
        color: var(--soft-ink);
        font-size: 10px;
        font-weight: 650;
        letter-spacing: .055em;
        text-transform: uppercase;
      }
      .evidence {
        margin: 0;
        padding: 10px 11px 11px;
        max-height: 128px;
        overflow: auto;
        color: #bfc2c7;
        font-family: ui-monospace, "SFMono-Regular", Consolas, monospace;
        font-size: 10.5px;
        white-space: pre-wrap;
        user-select: text;
      }
      .chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
      .chip {
        min-width: 0;
        max-width: 220px;
        overflow: hidden;
        padding: 5px 8px;
        border: 1px solid rgba(255,255,255,.055);
        border-radius: 999px;
        color: var(--muted);
        background: rgba(255,255,255,.045);
        font-size: 10px;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .activity-panel { padding-top: 11px; }
      .session-list { display: grid; gap: 7px; }
      .session-card {
        width: 100%;
        display: grid;
        grid-template-columns: 32px minmax(0, 1fr) auto;
        align-items: center;
        gap: 10px;
        padding: 10px;
        border: 1px solid var(--line);
        border-radius: 14px;
        color: inherit;
        background: var(--panel);
        font: inherit;
        text-align: left;
        cursor: pointer;
        transition: border-color 150ms ease, background 150ms ease, transform 150ms ease;
      }
      .session-card:hover, .session-card.selected { border-color: rgba(85,231,167,.34); background: var(--panel-hover); transform: translateY(-1px); }
      .session-agent-icon {
        width: 32px;
        height: 32px;
        display: grid;
        place-items: center;
        overflow: hidden;
        border: 1px solid rgba(255,255,255,.08);
        border-radius: 10px;
        color: var(--soft-ink);
        background: rgba(255,255,255,.05);
        font-size: 9px;
        font-weight: 700;
      }
      .session-agent-icon img { width: 18px; height: 18px; object-fit: contain; }
      .session-copy { min-width: 0; }
      .session-title, .session-meta, .session-action { display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .session-title { color: var(--ink); font-size: 12px; font-weight: 650; }
      .session-meta { margin-top: 3px; color: var(--muted); font-size: 9.5px; }
      .session-action { margin-top: 5px; color: var(--soft-ink); font-size: 10.5px; }
      .session-live { display: flex; align-items: center; gap: 5px; padding-left: 4px; color: var(--green); font-size: 9px; font-weight: 650; white-space: nowrap; }
      .session-live::before { content: ""; width: 6px; height: 6px; border-radius: 50%; background: currentColor; box-shadow: 0 0 8px currentColor; }
      .contribution-pills { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 7px; }
      .contribution-pill { max-width: 100%; overflow: hidden; padding: 4px 6px; border: 1px solid var(--line); border-radius: 7px; color: var(--soft-ink); background: rgba(255,255,255,.04); font-size: 8.5px; text-overflow: ellipsis; white-space: nowrap; }
      .contribution-pill.info { color: var(--cyan); border-color: rgba(88,216,255,.22); }
      .contribution-pill.success { color: var(--green); border-color: rgba(85,231,167,.22); }
      .contribution-pill.warning { color: var(--amber); border-color: rgba(255,182,74,.24); }
      .contribution-pill.danger { color: var(--red); border-color: rgba(255,107,100,.25); }
      .activity-detail { margin-top: 9px; padding: 11px; border: 1px solid var(--line); border-radius: 14px; background: rgba(255,255,255,.035); }
      .activity-detail h3 { margin: 0; color: var(--ink); font-size: 12px; }
      .activity-detail p { margin: 6px 0 0; color: var(--muted); font-size: 10.5px; line-height: 1.4; }
      .activity-events { margin-top: 8px; display: grid; gap: 5px; }
      .activity-event { display: flex; justify-content: space-between; gap: 10px; color: var(--soft-ink); font: 9.5px/1.35 ui-monospace, "SFMono-Regular", Consolas, monospace; }
      .activity-event span:last-child { color: var(--faint); white-space: nowrap; }
      .history-heading { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
      .island-contributions { display: grid; gap: 7px; margin-top: 9px; }
      .island-contribution { padding: 9px 10px; border: 1px solid var(--line); border-radius: 12px; background: rgba(255,255,255,.035); }
      .island-contribution.warning { border-color: rgba(255,182,74,.22); }
      .island-contribution.danger { border-color: rgba(255,107,100,.24); }
      .contribution-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
      .contribution-title { min-width: 0; overflow: hidden; color: var(--ink); font-size: 10.5px; font-weight: 630; text-overflow: ellipsis; white-space: nowrap; }
      .contribution-plugin { color: var(--faint); font-size: 8.5px; white-space: nowrap; }
      .contribution-detail { margin-top: 4px; color: var(--muted); font-size: 9.5px; line-height: 1.35; }
      .contribution-progress { height: 4px; margin-top: 7px; overflow: hidden; border-radius: 999px; background: rgba(255,255,255,.08); }
      .contribution-progress span { display: block; height: 100%; border-radius: inherit; background: var(--cyan); }
      .contribution-foot { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-top: 7px; color: var(--faint); font-size: 8.5px; }
      .contribution-button { padding: 5px 8px; border: 1px solid var(--line); border-radius: 8px; color: var(--soft-ink); background: rgba(255,255,255,.055); font: inherit; font-size: 9px; font-weight: 600; line-height: 1; cursor: pointer; }
      .questions { margin-top: 12px; }
      .install-success {
        padding: 8px 6px 3px;
        text-align: center;
      }
      .install-fireworks {
        width: 172px;
        height: 128px;
        margin: -4px auto -2px;
        overflow: hidden;
        pointer-events: none;
      }
      .install-success h2 {
        margin: 0;
        color: var(--ink);
        font-size: 19px;
        font-weight: 680;
        line-height: 1.2;
        letter-spacing: -.025em;
      }
      .install-success p {
        max-width: 360px;
        margin: 7px auto 2px;
        color: var(--muted);
        font-size: 11.5px;
        line-height: 1.45;
      }
      @media (prefers-reduced-motion: reduce) {
        .install-fireworks { opacity: .9; }
      }
      .question + .question { margin-top: 15px; padding-top: 14px; border-top: 1px solid var(--line); }
      .question-label { margin: 0 1px 8px; color: var(--ink); font-size: 13px; font-weight: 620; line-height: 1.35; }
      .option {
        width: 100%;
        display: flex;
        align-items: flex-start;
        gap: 10px;
        margin-top: 6px;
        padding: 10px 11px;
        border: 1px solid var(--line);
        border-radius: 13px;
        outline: none;
        color: var(--soft-ink);
        background: var(--panel);
        font: inherit;
        font-size: 12px;
        line-height: 1.3;
        text-align: left;
        cursor: pointer;
        transition: border-color 150ms ease, background 150ms ease, transform 150ms ease;
      }
      .option:hover { border-color: rgba(88,216,255,.32); background: var(--panel-hover); transform: translateY(-1px); }
      .option.selected { border-color: rgba(88,216,255,.58); background: rgba(28, 86, 103, .38); }
      .option-key {
        width: 22px;
        height: 22px;
        flex: 0 0 22px;
        display: grid;
        place-items: center;
        border-radius: 7px;
        color: var(--cyan);
        background: rgba(88,216,255,.11);
        font-size: 10px;
        font-weight: 680;
      }
      .option-copy { min-width: 0; padding-top: 2px; }
      .option-description { display: block; margin-top: 3px; color: var(--muted); font-size: 10.5px; }
      textarea, input[type="text"] {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 12px;
        outline: none;
        color: var(--ink);
        background: var(--panel);
        font: inherit;
        font-size: 12px;
        user-select: text;
        transition: border-color 150ms ease, box-shadow 150ms ease;
      }
      textarea:focus, input[type="text"]:focus { border-color: rgba(88,216,255,.52); box-shadow: 0 0 0 3px rgba(88,216,255,.09); }
      textarea { min-height: 62px; margin-top: 10px; padding: 10px 11px; resize: none; line-height: 1.4; }
      input[type="text"] { margin-top: 7px; padding: 10px 11px; }
      .plan {
        max-height: 340px;
        overflow: auto;
        margin: 11px 0 0;
        padding: 12px;
        border: 1px solid var(--line);
        border-radius: 14px;
        color: #d2d4d8;
        background: var(--panel);
        font: 11px/1.52 ui-monospace, "SFMono-Regular", Consolas, monospace;
        white-space: pre-wrap;
        user-select: text;
      }
      .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 13px; }
      .actions.single { grid-template-columns: 1fr; }
      .actions.install-complete { display: flex; justify-content: center; }
      .actions.install-complete .action { width: 112px; min-height: 38px; }
      .action {
        min-height: 41px;
        border: 1px solid var(--line);
        border-radius: 13px;
        outline: none;
        font: 640 12px/1 -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
        letter-spacing: -.005em;
        cursor: pointer;
        transition: transform 140ms ease, filter 140ms ease, background 140ms ease;
      }
      .action:hover { transform: translateY(-1px); filter: brightness(1.08); }
      .action:active { transform: translateY(0) scale(.985); }
      .secondary { color: #ececeb; background: #202328; }
      .primary { color: #06110c; border-color: transparent; background: var(--green); }
      .answer { color: #041216; border-color: transparent; background: var(--cyan); }
      .danger { color: #ffd4d1; border-color: rgba(255,107,100,.22); background: rgba(122, 39, 37, .55); }
      .action:disabled { opacity: .42; cursor: default; transform: none; }
      .remember { display: flex; align-items: center; gap: 7px; margin: 10px 1px 0; color: var(--muted); font-size: 10.5px; }
      .remember input { accent-color: var(--green); }
      .hint { margin-top: 9px; color: var(--faint); font-size: 9.5px; font-weight: 520; line-height: 1.3; text-align: center; }

      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after { animation-duration: 1ms !important; transition-duration: 1ms !important; }
      }
    </style>
  </head>
  <body>
    <main class="island" id="island" aria-live="polite">
      <div class="notch-rail" id="notchRail" aria-label="Active agents and token savings">
        <div class="notch-agents" id="notchAgents"></div>
        <span aria-hidden="true"></span>
        <div class="notch-metric" id="notchMetric"></div>
      </div>
      <header class="cap" id="cap">
        <div class="agent-mark" id="glyph">OL</div>
        <span class="signal-wrap"><span class="signal" id="status"></span></span>
        <div class="cap-agents" id="capAgents" aria-label="Active agents"></div>
        <div class="cap-copy">
          <div class="eyebrow" id="eyebrow">OpenLeash</div>
          <div class="cap-title" id="title">Agent activity</div>
        </div>
        <span class="cap-metric" id="capMetric" hidden></span>
        <span class="queue-count" id="count" hidden></span>
        <button class="icon-button close" id="close" aria-label="Dismiss">
          <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><path d="m4 4 8 8m0-8-8 8" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
        </button>
        <button class="icon-button toggle" id="toggle" aria-label="Expand or collapse">
          <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><path d="m4 6 4 4 4-4" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </header>
      <section class="reveal" id="reveal" inert aria-hidden="true"><div class="reveal-clip"><div class="content">
        <div class="install-success" id="installSuccess" hidden>

          question: { kind: "question", id: "preview", agentName: "Claude Code", title: "Claude asks", project: "openleash", time: "now", interaction: { type: "questions", questions: [{ question: "Which deployment target?", options: [{ label: "Production" }, { label: "Staging" }, { label: "Local only" }] }] } },
          plan: { kind: "plan_review", id: "preview", agentName: "OpenAI Codex", title: "Codex has a plan", summary: "Review the proposed changes before work begins.", project: "desktop-client", time: "now", interaction: { type: "plan", markdown: "1. Add the native top-edge panel\n2. Share the renderer with Windows\n3. Verify expansion, focus, and dismissal\n4. Package and run upgrade tests" } },
