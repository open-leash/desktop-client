<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OpenLeash Island</title>
    <style>
      :root {
        color-scheme: dark;
        --black: #000000;
        --panel: rgba(17, 19, 22, .94);
        --panel-hover: rgba(27, 30, 34, .96);
        --ink: #f8f8f7;
        --soft-ink: #d6d7d8;
        --muted: #898e96;
        --faint: #5d626a;
        --line: rgba(255, 255, 255, .095);
        --green: #55e7a7;
        --cyan: #58d8ff;
        --amber: #ffb64a;
        --red: #ff6b64;
        --ease: cubic-bezier(.22, .9, .26, 1);
        --hardware-safe-top: 0px;
        --hardware-notch-width: 0px;
      }

      * { box-sizing: border-box; }
      [hidden] { display: none !important; }
      html, body {
        margin: 0;
        width: 100%;
        min-height: 100%;
        overflow: hidden;
        background: transparent;
      }
      body {
        display: flex;
        justify-content: center;
        align-items: flex-start;
        padding: 0 96px 112px;
        color: var(--ink);
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI Variable Text", "Segoe UI", sans-serif;
        font-synthesis: none;
        -webkit-font-smoothing: antialiased;
        text-rendering: geometricPrecision;
        user-select: none;
      }

      .island {
        position: relative;
        flex: 0 0 auto;
        width: 286px;
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, .115);
        border-radius: 18px;
        background: var(--black);
        box-shadow:
          0 30px 76px rgba(0, 0, 0, .27),
          0 10px 30px rgba(0, 0, 0, .18),
          inset 0 1px rgba(255, 255, 255, .055);
        opacity: 0;
        transform: translateY(-14px) scale(.92, .72);
        transform-origin: top center;
        transition:
          width 340ms var(--ease),
          border-radius 340ms var(--ease),
          opacity 180ms ease-out,
          transform 380ms var(--ease),
          filter 180ms ease-out;
        will-change: width, transform;
      }
      body.native-macos .island {
        border-top: 0;
        border-radius: 0 0 18px 18px;
        box-shadow:
          0 34px 84px rgba(0, 0, 0, .29),
          0 10px 30px rgba(0, 0, 0, .18),
          inset 0 -1px rgba(255, 255, 255, .05);
      }
      .island.presented { opacity: 1; transform: translateY(0) scale(1); }
      .island.expanded { width: 540px; border-radius: 26px; }
      body.native-macos .island.expanded { border-radius: 0 0 27px 27px; }
      .island.leaving { opacity: 0; transform: translateY(-12px) scale(.94, .7); filter: blur(2px); }

      .cap {
        min-height: 46px;
        display: flex;
        align-items: center;
        gap: 9px;
        padding: 7px 10px;
        cursor: default;
      }
      body.native-macos.has-display-notch .cap {
        padding-top: calc(7px + var(--hardware-safe-top));
      }
      body.native-macos.has-display-notch .island { width: 430px; }
      body.native-macos.has-display-notch .island.expanded { width: 540px; }
      .notch-rail { display: none; }
      body.native-macos.has-display-notch .notch-rail {
        position: absolute;
        z-index: 3;
        top: 0;
        left: 0;
        right: 0;
        height: var(--hardware-safe-top);
        display: grid;
        grid-template-columns: minmax(0, 1fr) var(--hardware-notch-width) minmax(0, 1fr);
        align-items: center;
        pointer-events: none;
      }
      .notch-agents, .notch-metric { min-width: 0; display: flex; align-items: center; gap: 5px; }
      .notch-agents { justify-content: flex-end; padding: 0 9px 0 12px; }
      .notch-metric { justify-content: flex-start; padding: 0 12px 0 9px; }
      body.native-macos.has-display-notch .island.expanded .notch-agents {
        justify-content: flex-start;
        padding: 0 9px 0 12px;
      }
      .notch-agent {
        position: relative;
        width: 18px;
        height: 18px;
        display: grid;
        place-items: center;
        overflow: hidden;
        border: 1px solid rgba(255,255,255,.13);
        border-radius: 6px;
        background: #1a1d21;
        color: var(--soft-ink);
        font-size: 7px;
        font-weight: 750;
      }
      .notch-metric-value { overflow: hidden; color: var(--green); font-size: 9px; font-weight: 700; text-overflow: ellipsis; white-space: nowrap; }
      .notch-metric-value.danger { color: var(--red); background: transparent; border: 0; }
      .cap-metric { color: var(--green); font-size: 9px; font-weight: 700; white-space: nowrap; }
      body.native-macos.has-display-notch .cap-metric { display: none; }
      .island.expandable .cap { cursor: pointer; }
      .cap-agents { display: none; align-items: center; gap: 5px; }
      .cap-agent {
        position: relative;
        width: 24px;
        height: 24px;
        display: grid;
        place-items: center;
        overflow: hidden;
        border: 1px solid rgba(255,255,255,.12);
        border-radius: 8px;
        background: #1a1d21;
        color: var(--soft-ink);
        font-size: 8px;
        font-weight: 750;
      }
      .agent-avatar { --agent-accent: var(--cyan); isolation: isolate; }
      .agent-avatar.agent-claude { --agent-accent: #d97757; }
      .agent-avatar.agent-codex, .agent-avatar.agent-opencode { --agent-accent: #54d6b4; }
      .agent-avatar.agent-gemini { --agent-accent: #78a9ff; }
      .agent-avatar.agent-copilot { --agent-accent: #b69cff; }
      .agent-avatar.agent-idle { --agent-accent: #55e7a7; }
      .agent-avatar-orbit {
        position: absolute;
        z-index: -1;
        inset: 2px;
        border: 1px dashed color-mix(in srgb, var(--agent-accent) 72%, transparent);
        border-radius: 50%;
        box-shadow: 0 0 9px color-mix(in srgb, var(--agent-accent) 42%, transparent);
        animation: agent-orbit 2.4s linear infinite;
      }
      .agent-avatar-core {
        width: 58%;
        height: 58%;
        display: grid;
        place-items: center;
        color: var(--agent-accent);
        font-size: 8px;
        font-weight: 800;
        line-height: 1;
        animation: agent-walk 720ms steps(2, jump-none) infinite;
      }
      .agent-avatar-core img { width: 100%; height: 100%; object-fit: contain; filter: drop-shadow(0 0 4px color-mix(in srgb, var(--agent-accent) 48%, transparent)); }
      .agent-avatar.has-mascot { overflow: visible; border-color: transparent; background: transparent; }
      .agent-avatar.has-mascot .agent-avatar-orbit { display: none; }
      .agent-avatar.has-mascot .agent-avatar-core { width: 100%; height: 100%; animation: none; }
      .agent-mascot { width: 100%; height: 100%; display: grid; place-items: center; overflow: visible; color: var(--agent-accent); image-rendering: pixelated; filter: drop-shadow(0 2px 4px color-mix(in srgb, var(--agent-accent) 28%, transparent)); }
      .claude-mascot { animation: mascot-bob 430ms steps(2, jump-none) infinite; }
      .claude-mascot svg { width: 100%; height: 76%; overflow: visible; }
      .claude-mascot .claude-frame-b { animation: claude-feet 430ms steps(1, end) infinite; }
      .codex-mascot { position: relative; width: 94%; height: 100%; overflow: hidden; }
      .agent-avatar .codex-mascot img {
        position: absolute;
        top: 0;
        left: 0;
        width: 800%;
        height: 900%;
        max-width: none;
        object-fit: fill;
        filter: none;
        animation: codex-pet-walk 960ms steps(1, end) infinite;
      }
      .agent-avatar.processing .agent-mascot { animation-duration: 920ms; opacity: .9; }
      .agent-avatar.processing .codex-mascot img { animation-duration: 1.44s; }
      .agent-avatar.waiting .agent-avatar-orbit { border-style: solid; animation-duration: 1.05s; }
      .agent-avatar.waiting .agent-mascot { animation: mascot-alert 720ms ease-in-out infinite; }
      .agent-avatar.waiting .codex-mascot img { animation: none; transform: translate(-50%, -11.111%); }
      .agent-avatar.waiting::after {
        content: "";
        position: absolute;
        right: -1px;
        bottom: -1px;
        width: 5px;
        height: 5px;
        border: 1px solid #111316;
        border-radius: 50%;
        background: var(--amber);
        box-shadow: 0 0 7px var(--amber);
        animation: agent-attention 1s ease-in-out infinite;
      }
      .agent-avatar.completed .agent-avatar-orbit { border-color: rgba(85,231,167,.72); border-style: solid; box-shadow: 0 0 9px rgba(85,231,167,.38); animation: none; opacity: .9; }
      .agent-avatar.completed .agent-avatar-core { animation: mascot-complete 760ms ease-out 1; }
      .agent-avatar.completed .agent-mascot { animation: none; }
      .agent-avatar.completed .claude-frame-b { animation: none; opacity: 0; }
      .agent-avatar.completed .codex-mascot img { animation-play-state: paused; }
      .agent-avatar.completed::after {
        content: "✓";
        position: absolute;
        right: -2px;
        bottom: -2px;
        width: 9px;
        height: 9px;
        display: grid;
        place-items: center;
        border: 1px solid #111316;
        border-radius: 50%;
        color: #07150f;
        background: var(--green);
        box-shadow: 0 0 7px rgba(85,231,167,.7);
        font-size: 6px;
        font-weight: 900;
        line-height: 1;
      }
      .agent-avatar.idle .agent-avatar-orbit { opacity: .48; animation-duration: 7s; }
      .agent-avatar.idle .agent-avatar-core { opacity: .78; animation: agent-breathe 2.8s ease-in-out infinite; }
      @keyframes agent-orbit { to { transform: rotate(360deg); } }
      @keyframes agent-walk { 50% { transform: translateY(-1.5px) rotate(-4deg); } }
      @keyframes agent-breathe { 50% { opacity: .5; transform: scale(.86); } }
      @keyframes agent-attention { 50% { opacity: .45; transform: scale(.76); } }
      @keyframes mascot-bob { 50% { transform: translateY(-1.5px); } }
      @keyframes mascot-alert { 50% { transform: translateY(-2px) scale(1.06); filter: drop-shadow(0 0 7px var(--amber)); } }
      @keyframes mascot-complete { 45% { transform: translateY(-3px) scale(1.1); filter: drop-shadow(0 0 8px var(--green)); } }
      @keyframes claude-feet { 0%, 49.99% { opacity: 0; } 50%, 100% { opacity: 1; } }
      @keyframes codex-pet-walk {
        0%, 12.49% { transform: translate(0, -11.111%); }
        12.5%, 24.99% { transform: translate(-12.5%, -11.111%); }
        25%, 37.49% { transform: translate(-25%, -11.111%); }
        37.5%, 49.99% { transform: translate(-37.5%, -11.111%); }
        50%, 62.49% { transform: translate(-50%, -11.111%); }
        62.5%, 74.99% { transform: translate(-62.5%, -11.111%); }
        75%, 87.49% { transform: translate(-75%, -11.111%); }
        87.5%, 100% { transform: translate(-87.5%, -11.111%); }
      }
      body.animations-paused .agent-avatar *, body.animations-paused .signal::after { animation-play-state: paused !important; }
      .island.activity-mode:not(.expanded) { width: var(--activity-compact-width, 180px); }
      .island.menu-open { min-height: 438px; }
      .island.activity-mode.menu-open:not(.expanded) { width: 286px; }
      .island.activity-mode:not(.expanded) .agent-mark,
      .island.activity-mode:not(.expanded) .signal-wrap,
      .island.activity-mode:not(.expanded) .cap-copy { display: none; }
      .island.activity-mode:not(.expanded) .cap-agents { display: flex; }
      body.native-macos.has-display-notch .island.activity-mode:not(.expanded) {
        width: var(--activity-compact-width, 320px);
        height: var(--hardware-safe-top);
        min-height: var(--hardware-safe-top);
        border-radius: 0 0 18px 18px;
      }
      body.native-macos.has-display-notch .island.activity-mode:not(.expanded) .cap { display: none; }
      body.native-macos.has-display-notch .island.activity-mode:not(.expanded) .notch-rail {
        pointer-events: auto;
        cursor: pointer;
      }
      .agent-mark {
        width: 31px;
        height: 31px;
        flex: 0 0 31px;
        display: grid;
        place-items: center;
        overflow: hidden;
        border: 1px solid rgba(255,255,255,.1);
        border-radius: 10px;
        color: #ececea;
        background: linear-gradient(145deg, #25282d, #111316);
        box-shadow: inset 0 1px rgba(255,255,255,.06);
        font-size: 10px;
        font-weight: 750;
        letter-spacing: -.02em;
      }
      .agent-mark img { width: 18px; height: 18px; object-fit: contain; }
      .signal-wrap { position: relative; width: 8px; height: 8px; flex: 0 0 8px; }
      .signal {
        position: absolute;
        inset: 0;
        border-radius: 50%;
        color: var(--amber);
        background: currentColor;
        box-shadow: 0 0 11px currentColor;
      }
      .signal::after {
        content: "";
        position: absolute;
        inset: -4px;
        border: 1px solid currentColor;
        border-radius: 50%;
        opacity: 0;
        animation: breathe 1.8s ease-out infinite;
      }
      .signal.completed, .signal.subagent_completed { color: var(--green); }
      .signal.question { color: var(--cyan); }
      .signal.blocked { color: var(--red); }
      .signal.plan_review { color: #b99cff; }
      @keyframes breathe { 0% { transform: scale(.4); opacity: .6; } 70%, 100% { transform: scale(1.25); opacity: 0; } }

      .cap-copy { min-width: 0; flex: 1; }
      .eyebrow {
        overflow: hidden;
        color: var(--muted);
        font-size: 10.5px;
        font-weight: 560;
        line-height: 1.15;
        letter-spacing: -.01em;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .cap-title {
        overflow: hidden;
        margin-top: 2px;
        color: var(--ink);
        font-size: 13px;
        font-weight: 650;
        line-height: 1.16;
        letter-spacing: -.015em;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .queue-count {
        min-width: 21px;
        padding: 4px 6px;
        border: 1px solid var(--line);
        border-radius: 999px;
        color: var(--soft-ink);
        background: rgba(255,255,255,.055);
        font-size: 10px;
        font-variant-numeric: tabular-nums;
        text-align: center;
      }
      .icon-button {
        width: 27px;
        height: 27px;
        flex: 0 0 27px;
        display: grid;
        place-items: center;
        border: 0;
        border-radius: 9px;
        outline: none;
        color: var(--faint);
        background: transparent;
        cursor: pointer;
        transition: color 140ms ease, background 140ms ease, transform 260ms var(--ease);
      }
      .icon-button:hover { color: var(--ink); background: rgba(255,255,255,.075); }
      .toggle svg { transition: transform 300ms var(--ease); }
      .island.expanded .toggle svg { transform: rotate(180deg); }
      .close { display: none; }
      .island.expanded .close { display: grid; }
      .island.activity-mode .close { display: none; }
      .menu-toggle { color: var(--muted); }
      .island-menu {
        position: absolute;
        z-index: 20;
        top: 43px;
        right: 9px;
        width: 264px;
        padding: 7px;
        overflow: hidden;
        border: 1px solid rgba(255,255,255,.12);
        border-radius: 16px;
        background: rgba(19, 21, 24, .985);
        box-shadow: 0 22px 60px rgba(0,0,0,.48), inset 0 1px rgba(255,255,255,.045);
        backdrop-filter: blur(24px) saturate(1.2);
        transform-origin: top right;
        animation: menu-in 150ms var(--ease);
      }
      body.native-macos.has-display-notch .island-menu { top: calc(var(--hardware-safe-top) + 42px); }
      @keyframes menu-in { from { opacity: 0; transform: translateY(-5px) scale(.97); } }
      .menu-brand { padding: 7px 9px 8px; color: var(--muted); font-size: 10px; font-weight: 650; letter-spacing: .02em; text-transform: uppercase; }
      .menu-separator { height: 1px; margin: 5px 4px; background: var(--line); }
      .menu-item {
        width: 100%;
        min-height: 38px;
        display: grid;
        grid-template-columns: 25px minmax(0, 1fr) auto;
        align-items: center;
        gap: 7px;
        padding: 6px 8px;
        border: 0;
        border-radius: 10px;
        color: var(--soft-ink);
        background: transparent;
        font: inherit;
        text-align: left;
        cursor: pointer;
      }
      .menu-item:hover { color: var(--ink); background: rgba(255,255,255,.07); }
      .menu-item.dangerous:hover { color: #ffaaa5; background: rgba(255,107,100,.09); }
      .menu-icon { width: 25px; height: 25px; display: grid; place-items: center; border-radius: 8px; color: #b7bbc1; background: rgba(255,255,255,.055); font-size: 12px; font-weight: 700; }
      .menu-copy { min-width: 0; display: grid; gap: 2px; }
      .menu-label { font-size: 11.5px; font-weight: 620; line-height: 1.1; }
      .menu-detail { overflow: hidden; color: var(--muted); font-size: 9.5px; line-height: 1.1; text-overflow: ellipsis; white-space: nowrap; }
      .menu-chevron { color: var(--faint); font-size: 15px; }

      .reveal {
        display: grid;
        grid-template-rows: 0fr;
        opacity: 0;
        visibility: hidden;
        transition: grid-template-rows 340ms var(--ease), opacity 180ms ease 20ms, visibility 0s linear 340ms;
      }
      .island.expanded .reveal { grid-template-rows: 1fr; opacity: 1; visibility: visible; transition-delay: 0s; }
      .reveal-clip { min-height: 0; overflow: hidden; }
      .content {
        padding: 3px 17px 17px;
        border-top: 1px solid rgba(255,255,255,.075);
      }
      .summary {
        margin: 10px 1px 0;
        color: #ececeb;
        font-size: 14px;
        font-weight: 470;
        line-height: 1.42;
        letter-spacing: -.012em;
        white-space: pre-wrap;
      }
      .purpose, .evidence-block {
        margin: 10px 0 0;
        padding: 10px 11px;
        border: 1px solid rgba(255,255,255,.055);
        border-radius: 13px;
        background: var(--panel);
        color: var(--muted);
        font-size: 11.5px;
        line-height: 1.42;
      }
      .purpose b { color: var(--soft-ink); font-weight: 620; }
      .evidence-block { padding: 0; overflow: hidden; }
      .evidence-label {
        padding: 9px 11px 7px;
        border-bottom: 1px solid rgba(255,255,255,.055);
        color: var(--soft-ink);
        font-size: 10px;
        font-weight: 650;
        letter-spacing: .055em;
        text-transform: uppercase;
      }
      .evidence {
        margin: 0;
        padding: 10px 11px 11px;
        max-height: 128px;
        overflow: auto;
        color: #bfc2c7;
        font-family: ui-monospace, "SFMono-Regular", Consolas, monospace;
        font-size: 10.5px;
        white-space: pre-wrap;
        user-select: text;
      }
      .chips { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 13px; }
      .chip {
        min-width: 0;
        max-width: 220px;
        overflow: hidden;
        padding: 6px 9px;
        border: 1px solid rgba(255,255,255,.105);
        border-radius: 9px;
        color: var(--soft-ink);
        background: rgba(255,255,255,.065);
        font-size: 10.5px;
        font-weight: 620;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .activity-panel { padding-top: 11px; }
      .attention-card {
        margin-bottom: 10px;
        overflow: hidden;
        border: 1px solid rgba(255,182,74,.3);
        border-radius: 16px;
        background: linear-gradient(135deg, rgba(255,182,74,.11), rgba(255,255,255,.035) 58%);
        box-shadow: inset 0 1px rgba(255,255,255,.055), 0 12px 30px rgba(0,0,0,.16);
      }
      .attention-head { display: grid; grid-template-columns: 32px minmax(0,1fr) auto; align-items: center; gap: 9px; padding: 10px 11px 8px; }
      .attention-copy { min-width: 0; }
      .attention-title { overflow: hidden; color: var(--ink); font-size: 12px; font-weight: 700; text-overflow: ellipsis; white-space: nowrap; }
      .attention-meta { margin-top: 3px; color: var(--muted); font-size: 9.5px; }
      .attention-badge { padding: 4px 7px; border-radius: 999px; color: #2a1800; background: var(--amber); font-size: 8.5px; font-weight: 800; letter-spacing: .03em; text-transform: uppercase; }
      .attention-body { padding: 0 11px 11px; }
      .attention-summary { margin: 2px 0 0; color: var(--soft-ink); font-size: 11px; line-height: 1.42; }
      .attention-evidence { margin: 9px 0 0; max-height: 110px; overflow: auto; padding: 9px; border: 1px solid var(--line); border-radius: 10px; color: #c6c9ce; background: rgba(0,0,0,.26); font: 9.5px/1.4 ui-monospace, "SFMono-Regular", Consolas, monospace; white-space: pre-wrap; user-select: text; }
      .attention-guidance { width: 100%; min-height: 56px; margin-top: 9px; resize: vertical; }
      .attention-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; margin-top: 9px; }
      .attention-actions.single { grid-template-columns: 1fr; }
      .attention-options { display: grid; gap: 6px; margin-top: 9px; }
      .attention-question { display: grid; gap: 6px; }
      .attention-option { min-height: 34px; padding: 7px 9px; border: 1px solid var(--line); border-radius: 10px; color: var(--soft-ink); background: rgba(255,255,255,.045); font: inherit; font-size: 10.5px; text-align: left; cursor: pointer; }
      .attention-option.selected { border-color: rgba(88,216,255,.48); color: var(--ink); background: rgba(88,216,255,.12); }
      .session-section-label { margin: 3px 2px 7px; color: var(--faint); font-size: 9px; font-weight: 750; letter-spacing: .06em; text-transform: uppercase; }
      .idle-island-state { padding: 15px 11px 13px; border: 1px solid var(--line); border-radius: 14px; color: var(--muted); background: var(--panel); font-size: 11px; line-height: 1.4; text-align: center; }
      .session-list { display: grid; gap: 7px; }
      .session-card {
        width: 100%;
        display: grid;
        grid-template-columns: 32px minmax(0, 1fr) auto;
        align-items: center;
        gap: 10px;
        padding: 10px;
        border: 1px solid var(--line);
        border-radius: 14px;
        color: inherit;
        background: var(--panel);
        font: inherit;
        text-align: left;
        cursor: pointer;
        transition: border-color 150ms ease, background 150ms ease, transform 150ms ease;
      }
      .session-card:hover, .session-card.selected { border-color: rgba(85,231,167,.34); background: var(--panel-hover); transform: translateY(-1px); }
      .session-agent-icon {
        position: relative;
        width: 32px;
        height: 32px;
        display: grid;
        place-items: center;
        overflow: hidden;

      function renderSessionActivity(payload) {

      function renderInlineAttention(attention) {

      function renderNotchRail(sessions, ambient, tokenSaverStatus, attention) {

          const duplicate = visibleAgents.some((agent) => agent.agentKind && session.agentKind && agent.agentKind === session.agentKind && agent.project === session.project);

      function contributionCard(contribution, session) {

        if (contribution.detail) { const detail = document.createElement("div"); detail.className = "contribution-detail"; detail.textContent = contribution.detail; card.appendChild(detail); }
        if (contribution.progress) {
          const progress = document.createElement("div"); progress.className = "contribution-progress";
          const fill = document.createElement("span"); const total = Number(contribution.progress.total || 0); const current = Number(contribution.progress.current || 0);
          fill.style.width = `${total > 0 ? Math.max(0, Math.min(100, current / total * 100)) : 100}%`; progress.appendChild(fill); card.appendChild(progress);
        }
        if (contribution.value || contribution.status || contribution.progress?.label || contribution.action) {
          const foot = document.createElement("div"); foot.className = "contribution-foot";
          const value = document.createElement("span"); value.textContent = contribution.value || contribution.progress?.label || contribution.status || ""; foot.appendChild(value);
          if (contribution.action) {
            const action = document.createElement("button"); action.type = "button"; action.className = "contribution-button"; action.textContent = contribution.action.label;
            action.addEventListener("click", (event) => { event.stopPropagation(); bridge.pluginIslandAction({ pluginId: contribution.pluginId, action: contribution.action, session }); });
            foot.appendChild(action);
          }
          card.appendChild(foot);
        }
        return card;
      }

      function relativeTime(value) {
        const seconds = Math.max(0, Math.round((Date.now() - new Date(value).getTime()) / 1000));
        return seconds < 60 ? `${seconds}s` : `${Math.floor(seconds / 60)}m`;
      }

      function friendlyEventLabel(event) {
        const tool = String(event.tool_name || "").toLowerCase().replace(/[_-]+/g, " ");
        if (/^(read|cat|view|open)$/.test(tool)) return "Reviewed project files";
        if (/^(write|edit|multiedit|apply patch)$/.test(tool)) return "Updated a file";
        if (/^(bash|shell|terminal|command)$/.test(tool)) return "Ran a command";
        if (/^(grep|glob|search|find)$/.test(tool)) return "Searched the project";
        if (/^(task|agent|subagent)$/.test(tool)) return "Delegated work";
        if (tool) return "Used a project tool";
        if (event.event_name === "UserPromptSubmit") return "Received your request";
        if (event.event_name === "SubagentStart") return "Started delegated work";
        if (event.event_name === "SubagentStop") return "Finished delegated work";
        if (event.event_name === "Stop" || event.event_name === "SessionEnd" || event.event_name === "AgentStop") return "Finished latest turn";
        return "Continued working";
      }

      function requestDismiss() { island.classList.add("leaving"); setTimeout(() => bridge.dismissNotice(), 120); }
      actions.addEventListener("click", (event) => {
        const target = event.target.closest("button"); if (!target || !current || target.disabled) return;
        const action = target.dataset.action;
        if (action === "show-history") {
          if (!current.selectedSession) return;
          if (activityDetail.hidden) renderActivityHistory(current.selectedSession);
          else { activityDetail.hidden = true; activityDetail.innerHTML = ""; target.textContent = "View history"; resize(); }
          return;
        }
        actions.querySelectorAll("button").forEach((item) => item.disabled = true);
        if (action === "dismiss") return requestDismiss();
        if (action === "jump-session") { setExpanded(false); return bridge.jumpToAgent({ agentKind: current.selectedSession?.agentKind, session: current.selectedSession }); }
        if (action === "jump") { setExpanded(false); return bridge.jumpToAgent({ agentKind: current.agentKind, session: current.session }); }
        if (action === "answer") { const original = current.interaction?.originalInput || {}; return bridge.resolve(current.id, "allow", "", 0, { ...original, answers: Object.fromEntries(selectedAnswers) }); }
        if (action === "approve-plan") return bridge.resolve(current.id, "allow", "", 0, current.interaction?.originalInput || {});
        const resolution = action === "allow" ? "allow" : "deny";
        bridge.resolve(current.id, resolution, resolution === "deny" ? guidance.value : "", remember.checked ? 300000 : 0);
      });
      cap.addEventListener("click", (event) => { if (!event.target.closest("button")) setExpanded(!island.classList.contains("expanded")); });
      island.addEventListener("pointerenter", () => { pointerInsideIsland = true; bridge.setNoticePointerInside?.(true); });
      island.addEventListener("pointerleave", () => { pointerInsideIsland = false; bridge.setNoticePointerInside?.(false); });
      notchRail.addEventListener("click", () => { if (island.classList.contains("activity-mode")) setExpanded(true); });
      $("toggle").addEventListener("click", () => setExpanded(!island.classList.contains("expanded")));
      $("close").addEventListener("click", () => currentKind === "activity" ? setExpanded(false) : requestDismiss());
      menuToggle.addEventListener("click", (event) => { event.stopPropagation(); toggleIslandMenu(); });
      islandMenu.addEventListener("click", (event) => {
        const item = event.target.closest("[data-command]"); if (!item) return;
        const command = item.dataset.command; closeIslandMenu();
        if (command === "sessions") { setExpanded(true); return; }
        bridge.islandCommand(command);
      });
      document.addEventListener("click", (event) => { if (!islandMenu.hidden && !event.target.closest("#islandMenu") && !event.target.closest("#menuToggle")) { closeIslandMenu(); resize(); } });
      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape") { event.preventDefault(); if (currentKind === "activity") { closeIslandMenu(); setExpanded(false); } else if (current?.id && current.interaction?.type === "approval") actions.querySelector('[data-action="deny"]')?.click(); else requestDismiss(); }
        if (event.key === "Enter" && !event.shiftKey && document.activeElement?.tagName !== "TEXTAREA" && document.activeElement?.tagName !== "INPUT" && current?.id && current.interaction?.type === "approval") { event.preventDefault(); actions.querySelector('[data-action="allow"]')?.click(); }
      });
