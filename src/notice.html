<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OpenLeash Notice</title>
    <style>
      :root {
        --bg: #fafaf6;
        --bg-2: #f3f2ec;
        --panel: #ffffff;
        --ink: #0c0c0a;
        --ink-2: #2a2a26;
        --muted: #6b6b63;
        --mute: #9d9c92;
        --line: #e8e5dd;
        --line-2: #d8d3c7;
        --accent: #5b4fe5;
        --accent-soft: #efedfd;
        --danger: #e94e3a;
        --danger-soft: #fdeae6;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        padding: 16px 28px 46px;
        color: var(--ink);
        background: transparent;
        font-family: "Switzer", -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
        font-feature-settings: "ss01", "cv01", "kern";
        user-select: none;
      }
      .card {
        overflow: hidden;
        display: flex;
        flex-direction: column;
        background: var(--panel);
        border: 1px solid var(--line-2);
        border-radius: 16px;
        box-shadow: 0 4px 8px rgba(12,12,10,.04), 0 24px 60px -20px rgba(12,12,10,.22);
      }
      .top {
        display: flex;
        align-items: flex-start;
        gap: 14px;
        padding: 20px 22px 12px;
      }
      .agent {
        width: 54px;
        height: 54px;
        display: grid;
        place-items: center;
        flex: 0 0 54px;
        overflow: hidden;
        background: var(--accent-soft);
        border: 1px solid rgba(91,79,229,.18);
        border-radius: 12px;
        font-size: 18px;
        font-weight: 900;
      }
      .agent img {
        width: 58%;
        height: 58%;
        object-fit: contain;
      }
      .copy { min-width: 0; flex: 1; }
      .brand {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        margin-bottom: 5px;
        color: var(--accent);
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 11px;
        font-weight: 600;
      }
      .brand img {
        width: 16px;
        height: 16px;
        border-radius: 4px;
        object-fit: contain;
      }
      h1 {
        margin: 0;
        font-size: 22px;
        line-height: 1.08;
        font-weight: 600;
        letter-spacing: -.035em;
      }
      .meta {
        margin-top: 5px;
        color: var(--muted);
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 11px;
        font-weight: 500;
      }
      .body {
        padding: 0 22px 14px;
      }
      .summary {
        margin: 0;
        color: var(--ink-2);
        font-size: 15px;
        line-height: 1.42;
      }
      .purpose {
        display: none;
        margin: 10px 0 0;
        padding: 10px 12px;
        border-radius: 14px;
        border: 1px solid var(--line);
        background: var(--bg);
        color: var(--muted);
        font-size: 13px;
        line-height: 1.35;
        font-weight: 750;
      }
      .purpose span {
        display: block;
        margin-bottom: 3px;
        color: var(--mute);
        font-size: 11px;
        font-weight: 900;
        text-transform: uppercase;
      }
      .evidence {
        display: none;
        margin: 10px 0 0;
        padding: 10px 12px;
        border-left: 3px solid var(--accent);
        border-radius: 8px;
        background: var(--bg-2);
        color: var(--ink-2);
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 12px;
        line-height: 1.4;
      }
      .leadup {
        display: none;
        margin: 8px 0 0;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.4;
      }
      .context {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 10px;
      }
      .guidanceBox {
        display: block;
        margin-top: 10px;
      }
      .guidanceBox textarea {
        width: 100%;
        min-height: 82px;
        resize: none;
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 11px 12px;
        color: var(--ink);
        background: var(--bg);
        font: inherit;
        font-size: 13px;
        line-height: 1.35;
        outline: none;
      }
      .guidanceBox textarea:focus {
        border-color: rgba(91,79,229,.45);
        box-shadow: 0 0 0 3px var(--accent-soft);
      }
      .chip {
        max-width: 100%;
        overflow: hidden;
        padding: 7px 10px;
        border: 1px solid var(--line);
        color: var(--muted);
        background: var(--bg-2);
        border-radius: 999px;
        font-size: 12px;
        font-weight: 800;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .chip.project { background: var(--accent-soft); border-color: transparent; color: var(--accent); }
      .actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        padding: 0 22px 26px;
      }
      .remember {
        display: none;
        align-items: center;
        gap: 8px;
        padding: 0 22px 14px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 600;
      }
      .remember input { accent-color: var(--accent); }
      button {
        min-height: 44px;
        border: 0;
        border-radius: 10px;
        font: inherit;
        font-weight: 900;
        cursor: pointer;
      }
      .ghost { color: var(--danger); background: var(--danger-soft); border: 1px solid rgba(233,78,58,.12); }
      .primary { color: #fff; background: var(--accent); box-shadow: 0 1px 2px rgba(12,12,10,.08); }
      .single { grid-template-columns: 1fr; }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="top">
        <div id="agent" class="agent">AI</div>
        <div class="copy">
          <div class="brand">
            <img src="openleash-icon.png" alt="" />
            <span>OpenLeash</span>
          </div>
          <h1 id="title">Allow this action?</h1>
          <div id="meta" class="meta">Local agent request</div>
        </div>
      </div>
      <div class="body">
        <p id="summary" class="summary"></p>
        <p id="purpose" class="purpose"><span>Why now</span><b></b></p>
        <p id="evidence" class="evidence"></p>
        <p id="leadup" class="leadup"></p>
        <div id="context" class="context"></div>
        <div id="guidanceBox" class="guidanceBox">
          <textarea id="guidance" maxlength="500" placeholder="Tell the agent what to do instead (Optional)"></textarea>
        </div>
      </div>
      <label id="rememberRow" class="remember"><input id="remember" type="checkbox" /> Remember my choice for 5 minutes</label>
      <div id="actions" class="actions"></div>
    </div>
    <script>
      let current = null;
      const agent = document.getElementById("agent");
      const title = document.getElementById("title");
      const meta = document.getElementById("meta");
      const summary = document.getElementById("summary");
      const purpose = document.getElementById("purpose");
      const purposeText = purpose.querySelector("b");
      const evidence = document.getElementById("evidence");
      const leadup = document.getElementById("leadup");
      const context = document.getElementById("context");
      const actions = document.getElementById("actions");
      const rememberRow = document.getElementById("rememberRow");
      const remember = document.getElementById("remember");
      const guidanceBox = document.getElementById("guidanceBox");
      const guidance = document.getElementById("guidance");

      function initials(name) {
        return (name || "AI").split(/\s+/).map((part) => part[0]).join("").slice(0, 2).toUpperCase();
      }

      window.openleash.onNotice((payload) => {
        current = payload;
        agent.innerHTML = "";
        if (payload.agentIcon) {
          const img = document.createElement("img");
          img.src = payload.agentIcon;
          img.alt = "";
          agent.appendChild(img);
        } else {
          agent.textContent = initials(payload.agentName);
        }
        title.textContent = `Allow ${payload.agentName}?`;
        meta.textContent = `${payload.agentName} · ${payload.time}`;
        summary.textContent = payload.summary || `${payload.agentName} wants to continue. Do you want to allow it this time?`;
        purpose.style.display = payload.purpose ? "block" : "none";
        purposeText.textContent = payload.purpose || "";
        evidence.style.display = payload.evidence ? "block" : "none";
        evidence.textContent = payload.evidence ? `“${payload.evidence}”` : "";
        leadup.style.display = payload.contextSummary ? "block" : "none";
        leadup.textContent = payload.contextSummary ? `Earlier: ${payload.contextSummary}` : "";
        if (payload.kind === "sample") {
          title.textContent = "Approval preview";
          meta.textContent = "OpenLeash setup";
          summary.textContent = payload.summary || "This is what an OpenLeash approval looks like.";
          purpose.style.display = "none";
          purposeText.textContent = "";
          evidence.style.display = "none";
          leadup.style.display = "none";
        }
        guidance.value = "";
        guidanceBox.style.display = payload.id ? "block" : "none";

        context.innerHTML = "";
        if (payload.project) {
          const chip = document.createElement("span");
          chip.className = "chip project";
          chip.textContent = `📁 ${payload.project}`;
          context.appendChild(chip);
        }
        if (payload.pluginName) {
          const chip = document.createElement("span");
          chip.className = "chip project";
          chip.textContent = `🧩 ${payload.pluginName}`;
          context.appendChild(chip);
        }

        actions.className = payload.id ? "actions" : "actions single";
        remember.checked = false;
        rememberRow.style.display = payload.id ? "flex" : "none";
        actions.innerHTML = payload.id
          ? '<button class="ghost" data-resolution="deny">Deny</button><button class="primary" data-resolution="allow">Allow</button>'
          : '<button class="ghost" data-dismiss="true">Got it</button>';
        syncGuidanceActions();
      });

      function syncGuidanceActions() {
        const deny = actions.querySelector('[data-resolution="deny"]');
        const allow = actions.querySelector('[data-resolution="allow"]');
        const hasGuidance = Boolean(guidance.value.trim());
        if (deny) deny.textContent = hasGuidance ? "Deny & guide" : "Deny";
        if (allow) {
          allow.disabled = hasGuidance;
          allow.title = hasGuidance ? "Clear guidance to allow the original action." : "";
        }
      }

      guidance.addEventListener("input", syncGuidanceActions);

      actions.addEventListener("click", async (event) => {
        const button = event.target.closest("button");
        if (!button || !current) return;
        if (button.dataset.dismiss) {
          button.disabled = true;
          await window.openleash.dismissNotice();
          return;
        }
        actions.querySelectorAll("button").forEach((item) => item.disabled = true);
        await window.openleash.resolve(current.id, button.dataset.resolution, button.dataset.resolution === "deny" ? guidance.value : "", remember.checked ? 5 * 60 * 1000 : 0);
      });
    </script>
  </body>
</html>
